{ch:"Ch7",s:"WPA Enterprise",q:"What makes WPA-Enterprise different from WPA-PSK?",o:["WPA-Enterprise uses stronger encryption","WPA-Enterprise uses a RADIUS server with INDIVIDUAL user credentials instead of a shared passphrase — each user authenticates uniquely","WPA-Enterprise is less secure than WPA-PSK","WPA-Enterprise requires physical hardware tokens"],a:1,e:"WPA-Enterprise (802.1X): each user has their own credentials (username + password or certificate). Authenticates via RADIUS server. No shared passphrase to crack. Much stronger security model — but still vulnerable via Evil Twin targeting client-side weaknesses."},
{ch:"Ch7",s:"WPA Enterprise",q:"Why do Android devices particularly fail against WPA-Enterprise Evil Twin attacks?",o:["Android has weaker encryption","Android devices often accept invalid/self-signed certificates without user warning — connecting to Evil Twin without alerting the user","Android has no WPA-Enterprise support","Android uses a different EAP method"],a:1,e:"Android's WPA-Enterprise implementation often skips certificate validation by default. Users must manually configure 'validate server certificate' — most don't. Device connects to Evil Twin with self-signed cert = credentials captured."},
{ch:"Ch7",s:"WPA Enterprise",q:"EAP method GTC is especially dangerous in a WPA-Enterprise Evil Twin because:",o:["GTC is easy to brute force","GTC transmits credentials IN CLEARTEXT to the RADIUS server — fake RADIUS captures them immediately without needing to crack anything","GTC uses weak encryption","GTC is deprecated and unsupported"],a:1,e:"GTC (Generic Token Card): EAP method that transmits password to RADIUS server in plaintext (relies on the tunnel for security). Fake RADIUS server sees the plaintext password immediately. No hashing, no cracking required."},
{ch:"Ch7",s:"AP Components",q:"Why does the attacker's DHCP server give them 'full control over network configuration'?",o:["DHCP controls encryption","DHCP assigns IP, gateway, and DNS server — by assigning attacker's own DNS server, all domain lookups are redirected to attacker-controlled addresses","DHCP controls firewall rules","DHCP assigns usernames"],a:1,e:"DHCP assigns DNS server address. If attacker assigns their own DNS IP, ALL victim domain lookups go to attacker's DNS. google.com → attacker's fake Google. bank.com → attacker's fake bank. Full DNS spoofing enabled via DHCP."},
{ch:"Ch7",s:"AP Components",q:"The HTTP server on a rogue AP can inject malicious content into:",o:["HTTPS traffic only","Encrypted VPN traffic","Plain HTTP pages passing through the proxy — JavaScript injection, fake download prompts, credential harvest forms","Email attachments only"],a:2,e:"HTTP server + proxy: since HTTP is unencrypted, the attacker can modify response content in transit. Add malicious JavaScript to every page, replace download links with malware, inject credential-harvesting forms into legitimate pages."},
{ch:"Ch7",s:"Commands",q:"Why must IP forwarding be enabled FIRST before other rogue AP commands?",o:["It starts the wireless adapter","Without IP forwarding, Linux drops victim packets — the internet connection appears broken, victims disconnect immediately","It assigns IP addresses to victims","It starts the DNS service"],a:1,e:"IP forwarding must be first: default Linux drops packets not destined for itself. Without it, victims connect to the Evil Twin but have NO internet — they immediately disconnect. IP forwarding makes Linux route traffic transparently. Must enable before victims connect."},
{ch:"Ch7",s:"Commands",q:"In the command 'dhcpd3 -cf /etc/dhcp3.conf at0', what does 'at0' represent?",o:["The admin terminal","The attacker's IP address","The rogue AP virtual interface created by the wireless tools","The DHCP config file"],a:2,e:"at0: the virtual network interface created by airbase-ng or similar tools when creating a software access point. All rogue AP services (DHCP, DNS, HTTP) bind to this interface — this is the 'network card' of the fake AP."},
{ch:"Ch7",s:"Commands",q:"The '-f dns.hosts' parameter in dnsspoof specifies:",o:["The network interface to listen on","A file containing domain-to-IP mappings — dnsspoof uses this to know what IP to return for each domain query","The log file for captured queries","The frequency to spoof DNS at"],a:1,e:"dns.hosts file: contains mappings like 'attacker_ip *.com' or specific entries 'attacker_ip bank.com'. dnsspoof reads this file and returns the specified IP for any matching domain query from victims."},
{ch:"Ch7",s:"Commands",q:"In 'iptables -t nat -A PREROUTING -p tcp --dport 1:65535 -j DNAT --to-destination 10.0.0.1', what does '--dport 1:65535' mean?",o:["Only redirect port 443 HTTPS traffic","Redirect traffic on ALL TCP ports from 1 to 65535 — captures every protocol, not just web","Redirect only ports above 1024","Limit to 65,535 simultaneous connections"],a:1,e:"--dport 1:65535 = all TCP ports from 1 to 65535 (entire port range). This redirects: HTTP (80), HTTPS (443), FTP (21), SSH (22), SMTP (25), RDP (3389), MySQL (3306) — everything. Every service goes to the attacker's fake servers."},
{ch:"Ch7",s:"Commands",q:"'tcpdump -i at0 -w capture.pcap' — what file format is capture.pcap?",o:["A compressed archive","A text log file","PCAP (Packet Capture) format — can be opened with Wireshark for deep packet inspection and credential extraction","An encrypted database"],a:2,e:"PCAP: standard packet capture format. Contains raw network frames in binary. Open with Wireshark to analyze any protocol. Filter by 'http.request.method == POST' to see form submissions. Extract credentials from HTTP, FTP, SMTP, POP3 traffic."},
{ch:"Ch7",s:"Commands",q:"'msf > spool /root/log.txt' in Metasploit does what?",o:["Uploads a file to the victim","Saves ALL Metasploit console I/O (exploits launched, sessions, captured credentials) to a text file for documentation","Downloads the victim's files","Encrypts captured credentials"],a:1,e:"spool: logs everything in the Metasploit console to a file. All module outputs, captured credentials, session activity, error messages. Used for post-operation documentation and evidence preservation."},
{ch:"Ch7",s:"Fake Servers",q:"A fake MySQL server on a rogue AP captures:",o:["Web login credentials","Database administrator credentials — from applications connecting to remote database servers through the rogue AP","Email passwords","File server credentials"],a:1,e:"Fake MySQL server: when applications running on victim devices try to connect to a remote MySQL database through the rogue AP, they authenticate to the attacker's fake MySQL server instead — username and password captured immediately."},
{ch:"Ch7",s:"Fake Servers",q:"SSLstrip downgrade attack works by:",o:["Breaking SSL encryption","Intercepting the HTTPS redirect and serving HTTP instead — victim's browser uses HTTP while attacker connects to real server via HTTPS, allowing plaintext credential capture","Installing a fake certificate on the victim's device","Blocking HTTPS traffic completely"],a:1,e:"SSLstrip: intercepts HTTPS redirect (302 to https://). Serves plain HTTP to victim instead. Victim's traffic is cleartext to attacker. Attacker connects to real server via HTTPS. Victim may not notice the missing 'S' in the URL."},
{ch:"Ch7",s:"Fake Servers",q:"SIP and H.323 fake servers capture:",o:["Email credentials","Web application credentials","Voice-over-IP authentication credentials and call setup data","Database administrator passwords"],a:2,e:"SIP (Session Initiation Protocol) and H.323: VoIP protocols. Fake servers capture VoIP authentication credentials — usernames and passwords for IP phone systems, video conferencing, and SIP trunks. Also enables call eavesdropping."},
{ch:"Ch7",s:"Scenario",q:"SCENARIO: An attacker at a hotel wants to target a traveling executive. The hotel uses WPA2-PSK. Cracking WPA2 would take too long. What is the BEST attack?",o:["Give up — WPA2 is too strong","Wait for the executive to use hotel business center computers","Deploy Evil Twin with same SSID as hotel WiFi, send deauth frames, capture all traffic when executive reconnects","Install malware on hotel WiFi router"],a:2,e:"Evil Twin: 1) Clone hotel SSID, 2) Stronger signal, 3) Deauth executive from real AP, 4) Executive auto-reconnects, 5) IP forwarding + DHCP + DNS + iptables redirect, 6) Deploy fake servers, 7) Capture all credentials. WPA2 cracking is unnecessary."},
{ch:"Ch7",s:"Scenario",q:"SCENARIO: After deploying an Evil Twin, the attacker notices victims connect but immediately disconnect. What is most likely the cause?",o:["The Evil Twin SSID is wrong","IP forwarding is not enabled — victims have no internet through the rogue AP so they disconnect","The DHCP server is too slow","The DNS server is not running"],a:1,e:"Without IP forwarding (echo 1 > /proc/sys/net/ipv4/ip_forward), Linux drops all victim packets. Victims get an IP from DHCP but cannot reach the internet. Their devices detect 'no internet' and may auto-disconnect or show captive portal warnings."},
{ch:"Ch7",s:"Scenario",q:"SCENARIO: A company uses WPA2-Enterprise. An attacker captures MSCHAPv2 hashes from clients connecting to an Evil Twin. What is the next step?",o:["The hashes are useless — MSCHAPv2 cannot be cracked","Use the hashes directly as Pass-the-Hash tokens","Crack the MSCHAPv2 hashes offline using hashcat with a dictionary/wordlist to recover plaintext credentials","Report the vulnerability to the company"],a:2,e:"MSCHAPv2 hashes: crackable offline with hashcat. GPU acceleration tests millions of passwords per second. Cloud hashcat services can crack common passwords in hours. Once cracked, use credentials for VPN, email, or internal system access."},
{ch:"Ch7",s:"Scenario",q:"SCENARIO: An attacker wants to silently monitor ALL protocols used by victims on a rogue AP without missing anything. Which two commands are essential for full capture?",o:["Only dnsspoof and dhcpd3","tcpdump (capture all raw traffic) AND msfconsole -r servers.rc (protocol-specific fake servers for credential extraction)","Only iptables and ip_forward","Only apache2ctl and dnsspoof"],a:1,e:"Two layers: tcpdump captures ALL raw traffic at packet level (everything). msfconsole fake servers capture PARSED credentials from specific protocols (email, FTP, SSH etc.). Together: complete coverage — raw packets AND extracted credentials."},

// ══════ CH8 ══════
{ch:"Ch8",s:"Hardware SE",q:"What two things does hardware-based social engineering combine?",o:["Email phishing and network scanning","Physical hardware devices AND social engineering (tricking people) — the combination that bypasses software protection","Wireless attacks and password cracking","Physical access and malware development"],a:1,e:"Hardware SE: physical device (looks safe/normal) + social engineering (trick user into connecting it). The combination bypasses software security because antivirus monitors software — it cannot inspect hardware. The attack starts the moment the device is connected."},
{ch:"Ch8",s:"Hardware SE",q:"What evolution made spear phishing more dangerous than email phishing alone?",o:["Better email servers","Attackers now also use physical hardware devices — USB drives, fake cables — not just email links","Faster internet connections","More phishing templates"],a:1,e:"Spear phishing evolution: Email → targeted email → hardware delivery. Hardware phishing = full system compromise risk level. Attacker can physically deliver a Trojan USB to the target's desk, bypassing all email filtering."},
{ch:"Ch8",s:"Hardware Trojans",q:"A modified keyboard Hardware Trojan secretly:",o:["Changes keyboard layout","Records all keystrokes typed — including passwords, messages, and commands","Slows down typing speed","Connects to WiFi networks"],a:1,e:"Modified keyboard: hardware keylogger built into the keyboard itself. Logs every keystroke to internal memory or transmits wirelessly. Completely invisible to software — antivirus cannot scan hardware. Often used in physical access attacks."},
{ch:"Ch8",s:"Hardware Trojans",q:"Supply Chain Chip Trojans are inserted:",o:["After the victim receives the device","By the victim accidentally","Inside devices BEFORE delivery — during manufacturing or shipping","Through software updates"],a:2,e:"Supply chain chip Trojan: malicious silicon inserted during manufacturing or tampered during shipping. Device arrives new and sealed but contains a hidden backdoor. Nation-state level attack — very difficult to detect without specialized hardware analysis."},
{ch:"Ch8",s:"USB Attacks",q:"What makes Rubber Ducky/Teensy attacks effective against ANY computer?",o:["They exploit a specific Windows vulnerability","They work only on Linux systems","Any computer with a USB port recognizes them as a keyboard — a trusted HID device — and executes keystrokes without suspicion","They require internet connectivity to work"],a:2,e:"HID (Human Interface Device) attack: computers implicitly trust keyboards — no driver verification, no security prompt. The OS immediately starts receiving keystrokes. Injection happens faster than any human typist — malware installed in seconds before user can react."},
{ch:"Ch8",s:"USB Attacks",q:"The Rubber Ducky attack flow is:",o:["User sees malware warning → ignores it → malware installs","User plugs USB → Computer recognizes as keyboard → USB types bad commands automatically → Malware installed before user can react","User opens the USB files → Autorun executes → Malware installs","User plugs USB → Virus scan runs → Malware detected"],a:1,e:"Flow: 1) Plug in → 2) OS recognizes as HID keyboard (no prompt) → 3) Pre-programmed keystrokes inject at superhuman speed → 4) Malware installed or backdoor established in 3-30 seconds → 5) User unplugs device — looks like a normal USB."},
{ch:"Ch8",s:"Baiting",q:"The baiting attack's effectiveness relies on which human trait?",o:["Greed — hoping for financial gain","Fear — afraid to ignore a found device","Curiosity — 'What's on this USB?' overrides security training","Authority — the label says it's official"],a:2,e:"Curiosity is the primary driver. Labels like 'Q1 Salary List — CONFIDENTIAL' or 'HR_TERMINATIONS_2026' are irresistible. Even security-trained employees succumb. The label creates a compelling reason to plug it in 'just to check.'"},
{ch:"Ch8",s:"Baiting",q:"Trojaned devices sent as fake IT equipment are effective because:",o:["IT equipment is always trusted","Office employees never check new equipment","They look and function exactly like legitimate equipment — but contain hidden spy tools that operate silently","They arrive with official documentation"],a:2,e:"Trojaned IT equipment: the device (mouse, keyboard, network switch) works perfectly normally. No reason to suspect anything. Meanwhile, hidden hardware logs all activity, opens backdoors, or intercepts network traffic — silently and indefinitely."},
{ch:"Ch8",s:"Cryptography",q:"What is the difference between Confidentiality and Authentication as cryptography goals?",o:["They are the same goal","Confidentiality = only authorized can READ data; Authentication = VERIFY WHO is sending/accessing","Confidentiality uses symmetric; Authentication uses hashing","Authentication is stronger than Confidentiality"],a:1,e:"Confidentiality: data is unreadable to unauthorized parties (encryption). Authentication: proving identity — verifying WHO sent the message or WHO is accessing the system (digital signatures, certificates, MFA)."},
{ch:"Ch8",s:"Cryptography",q:"Non-repudiation means:",o:["Data cannot be changed","Data is encrypted at rest","The sender cannot deny later that they sent the message — it is cryptographically proved","The message cannot be intercepted"],a:2,e:"Non-repudiation: like a signed contract — the sender cannot later claim 'I didn't send that.' Digital signatures provide non-repudiation. Used in legal documents, financial transactions, and software code signing."},
{ch:"Ch8",s:"Cryptography History",q:"The Caesar Cipher works by:",o:["Substituting each letter with a symbol","Shifting each letter by a fixed number (e.g., +3: A→D, B→E, HELLO→KHOOR)","Transposing letters in a grid","Using a keyword to determine shifts"],a:1,e:"Caesar Cipher: shift each letter by a fixed number. With shift +3: A→D, B→E, C→F... HELLO → KHOOR. One of history's simplest ciphers. Easily broken by trying all 25 possible shifts (brute force) or frequency analysis."},
{ch:"Ch8",s:"Cryptography History",q:"Classical ciphers (Vigenère, Playfair) are vulnerable to:",o:["Brute force only","Quantum computing","Frequency analysis — letter frequency patterns in ciphertext reveal the key","Side-channel attacks"],a:2,e:"Frequency analysis: in English, 'E' is the most common letter (~13%). Even substituted, the most frequent symbol in ciphertext reveals 'E'. By analyzing letter frequencies, the substitution pattern can be reverse-engineered."},
{ch:"Ch8",s:"Cryptography History",q:"Lightweight cryptography algorithms (PRESENT, Ascon, SIMON) are designed for:",o:["Military communications","Breaking classical ciphers","IoT and smart devices — where computing power and battery are extremely limited","Quantum-resistant encryption"],a:2,e:"Lightweight cryptography: standard AES-256 is computationally expensive. IoT sensors, smart cards, RFID chips have minimal CPU and battery. Lightweight algorithms provide adequate security with fraction of computational cost."},
{ch:"Ch8",s:"Cryptography Types",q:"In RSA asymmetric encryption, which key encrypts the message and which decrypts it?",o:["Private key encrypts, Public key decrypts","Public key encrypts, Private key decrypts","Both keys can encrypt or decrypt","The same key does both"],a:1,e:"RSA: Sender uses RECIPIENT's PUBLIC key to encrypt. Only recipient's PRIVATE key can decrypt. Public key is shared openly. Private key is never shared. This allows secure communication without prior key exchange — anyone can send a secret only the recipient can read."},
{ch:"Ch8",s:"Cryptography Types",q:"Why is hashing described as 'one-way'?",o:["Hashing can only process one file at a time","The hash algorithm runs only once","The hash value CANNOT be mathematically reversed to recover the original data","Hashing is slower in one direction"],a:2,e:"One-way function: given input → hash is easy to compute. Given hash → input is computationally infeasible to recover. This is why passwords are stored as hashes — even if the database is stolen, attackers cannot get the original passwords (only attempt rainbow tables/brute force)."},
{ch:"Ch8",s:"Cryptography Types",q:"Hybrid encryption (like HTTPS/TLS) combines:",o:["Two hashing algorithms","Two symmetric algorithms","Asymmetric encryption (to securely exchange a key) + Symmetric encryption (for fast bulk data encryption)","Digital signatures and hashing only"],a:2,e:"Hybrid: RSA/ECDH (asymmetric) exchanges a session key securely. Then AES (symmetric) uses that session key for fast encryption of all data. Best of both: security of asymmetric key exchange + speed of symmetric encryption."},
{ch:"Ch8",s:"Crypto Applications",q:"BitLocker (Windows) and FileVault (Mac) use cryptography to:",o:["Encrypt internet traffic","Encrypt the entire hard drive — data is unreadable without the decryption key, even if drive is physically removed","Encrypt email messages","Create digital signatures for files"],a:1,e:"Full Disk Encryption (FDE): encrypts entire storage device. Even if physical drive is stolen or laptop is lost, data is inaccessible without the key. BitLocker uses AES-128 or AES-256. Critical for mobile devices that leave the corporate perimeter."},
{ch:"Ch8",s:"Crypto Applications",q:"Code signing (Windows Update, App Store) uses which cryptographic mechanism?",o:["Symmetric encryption","Hashing only","Digital signatures — proves software is from a legitimate publisher and was not modified with malware after signing","Certificate pinning"],a:2,e:"Code signing: publisher signs software with their private key. OS verifies signature with publisher's public key. If verification fails = software was modified after signing (potentially injected with malware). App Store rejection = bad or missing signature."},
{ch:"Ch8",s:"Crypto Attacks",q:"A brute force attack on encryption tries:",o:["Social engineering the key holder","Finding mathematical weaknesses in the algorithm","All possible keys systematically until one works — defended by using long keys (AES-256)","Intercepting the key exchange"],a:2,e:"Brute force: tries every possible key. AES-128 has 2^128 possible keys (~340 undecillion). At 1 trillion keys/second: would take longer than the age of the universe. AES-256 is essentially impossible to brute force with classical computers."},
{ch:"Ch8",s:"Crypto Attacks",q:"Weak Key Management refers to:",o:["Using encryption algorithms with short keys","Using simple keys or sharing keys incorrectly — making strong encryption useless","Forgetting the encryption password","Encrypting too little data"],a:1,e:"Key management is often the weak point, not the algorithm. Examples: using 'password123' as encryption key, storing keys in plaintext next to encrypted data, sharing keys via unencrypted email, reusing keys across systems. Strong algorithm + weak key = weak security."},
{ch:"Ch8",s:"Authentication",q:"Password-Based authentication is considered the WEAKEST because:",o:["Passwords are too long to remember","Passwords expire too quickly","Passwords can be stolen, guessed, phished, or brute-forced — stolen password = full access","Passwords require network connectivity"],a:2,e:"Password weaknesses: phishable (users enter on fake sites), guessable (common passwords), breachable (database dumps on dark web), reused across sites. A stolen password gives immediate full access with no second factor to block the attacker."},
{ch:"Ch8",s:"Authentication",q:"Biometric authentication (fingerprint, Face ID) is classified as which authentication factor?",o:["Something You Know","Something You Have","Something You Are","Something You Do"],a:2,e:"Something You ARE: inherent biological characteristics — fingerprint, face geometry, iris pattern, voice. Cannot be forgotten (unlike passwords) or lost (unlike tokens). But: cannot be changed if compromised, may have false acceptance rates."},
{ch:"Ch8",s:"Authentication",q:"The FBI first used biometric authentication in:",o:["1950","1924","2001","1980"],a:1,e:"The FBI began using fingerprint-based biometric authentication in 1924. Fingerprints have been used for over 100 years — long predating digital technology. The digital biometric systems on phones are modern implementations of the same concept."},
{ch:"Ch8",s:"Authentication",q:"2FA (Two-Factor Authentication) requires:",o:["Two passwords","Two different TYPES of factors (e.g., password + SMS code = know + have)","Two biometric scans","Two separate login attempts"],a:1,e:"2FA: exactly 2 different factor TYPES. Password (know) + SMS code (have) = 2FA. Two passwords = NOT 2FA (same type twice). Three factors = MFA. The different types requirement is what makes it effective — both must be compromised independently."},
{ch:"Ch8",s:"Access Control",q:"RBAC is best suited for organizations where:",o:["Every user has unique data requirements","Job roles are well-defined and access needs are predictable by role — doctor, nurse, admin each need different data access","Security labels are the primary concern","Time-based access is critical"],a:1,e:"RBAC: permissions assigned to roles, users assigned to roles. Simple to manage at scale. Doctor role = patient records access. Nurse role = treatment records. Receptionist role = appointments only. Works well when job functions are clear and stable."},
{ch:"Ch8",s:"Access Control",q:"MAC (Mandatory Access Control) is primarily used in:",o:["Commercial websites","Healthcare organizations","Military and government — strict label-based (Top Secret, Secret, Confidential) with system-enforced rules users cannot override","Social media platforms"],a:2,e:"MAC: system enforces access based on security clearance labels. Users CANNOT change their own permissions or share access — the system decides everything. Used where data classification is critical: military intelligence, government agencies, classified research."},
{ch:"Ch8",s:"Access Control",q:"ABAC is more flexible than RBAC because:",o:["ABAC uses fewer rules","ABAC allows more users simultaneously","ABAC considers multiple context attributes simultaneously (who, when, where, what device) — enables fine-grained decisions impossible with role alone","ABAC is faster to implement"],a:2,e:"ABAC example: 'Allow access IF user=HR AND time=business_hours AND location=office AND device=company_managed.' Role alone cannot capture time or location context. ABAC is most flexible but most complex to design and maintain."},
{ch:"Ch8",s:"Digital Signatures",q:"A digital signature is created using the sender's:",o:["Public key","Shared symmetric key","Private key — only the sender possesses it, making the signature unique and non-repudiable","Random session key"],a:2,e:"Digital signature: sender signs with their PRIVATE key (only they have it). Receiver verifies with sender's PUBLIC key. If verification succeeds: 1) Data not modified (integrity), 2) Sender is authentic (authentication), 3) Sender cannot deny it (non-repudiation)."},
{ch:"Ch8",s:"Endpoint Security",q:"Device Control software protects against Rubber Ducky attacks by:",o:["Scanning USB drives for malware","Blocking USB ports with physical caps","Whitelisting only approved devices by serial number — unknown HID devices (like Rubber Ducky) are blocked before they can inject keystrokes","Requiring a password to use USB ports"],a:2,e:"Device control: whitelist approach — only pre-approved devices (specific serial numbers) are allowed. Unknown devices = blocked immediately. Rubber Ducky presents as HID keyboard but is not on whitelist → blocked before first keystroke."},
{ch:"Ch8",s:"Endpoint Security",q:"EDR (Endpoint Detection and Response) differs from traditional antivirus in that:",o:["EDR only works on servers","EDR uses signature matching like antivirus","EDR monitors behavior — detecting suspicious process spawning, unusual file access, abnormal network connections — not just known signatures","EDR is cheaper than antivirus"],a:2,e:"EDR: behavioral analysis. Detects: 'Word.exe spawned cmd.exe' (macro attack), 'Unknown process accessing all files rapidly' (ransomware), 'Process making connections to 50 different IPs' (C2 beaconing). Catches attacks that have no signature yet."},
{ch:"Ch8",s:"Supply Chain",q:"The Zero Trust principle applied to supply chain means:",o:["Trust all verified vendors","Distrust all vendors until proven otherwise — verify hardware integrity upon delivery regardless of supplier reputation","Only buy from domestic suppliers","Never update hardware firmware"],a:1,e:"Zero Trust for hardware: 'never trust, always verify.' Even from a trusted supplier, verify hardware integrity upon receipt. Nation-state attackers have compromised trusted supply chains (e.g., NSA intercepting Cisco routers in transit). Reputation ≠ security."},
{ch:"Ch8",s:"Final Recommendations",q:"The 3 protection areas for hardware SE defense are:",o:["Physical, Digital, Human","Technical + Organizational + Human-Centered","Prevention + Detection + Response","Hardware + Software + Network"],a:1,e:"Three areas: Technical (encrypt everything, enable MFA, deploy EDR), Organizational (security policies, incident response plan, regular audits), Human-Centered (security awareness culture, train on social engineering, never trust unknown devices)."},
{ch:"Ch8",s:"Final Recommendations",q:"Which is the MOST important final principle of Chapter 8?",o:["Always encrypt USB drives","Use WPA2 for all wireless","Never trust unknown devices — awareness + technology + good policies is the best defense","Change passwords monthly"],a:2,e:"'Never trust unknown devices!' The textbook's final message. Physical security extends to hardware. An innocent-looking USB, cable, or charger can compromise an entire organization. Physical awareness is as critical as digital security awareness."},
];

const CHS=["All","Ch1-2","Ch3","Ch4","Ch5","Ch6","Ch7","Ch8"];
let aCh="All",ans={},cor=0,wrg=0;

function shuffle(a){let r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
const SQ=shuffle(Q.map((q,i)=>({...q,_i:i})));

function getFilt(){return aCh==="All"?SQ:SQ.filter(q=>q.ch===aCh);}

function buildBar(){
  document.getElementById("chBar").innerHTML=CHS.map(c=>`<button class="ch-btn${c===aCh?" active":""}" onclick="setCh('${c}')">${c}</button>`).join("");
}

function setCh(c){aCh=c;buildBar();render();}

function buildOpts(q,id){
  const L=["A","B","C","D"];
  return q.o.map((opt,i)=>{
    const st=ans[id];
    let cl="option";
    if(st!==undefined){
      cl+=" dis";
      if(i===q.a)cl+=" rc";
      if(i===st&&st!==q.a)cl+=" sw";
      if(i===st&&st===q.a)cl+=" sc";
    }
    const oc=st===undefined?`onclick="doAns(${id},${i})"` :"";
    return `<div class="${cl}" ${oc}><span class="ol">${L[i]}</span>${opt}</div>`;
  }).join("");
}

function render(){
  const qs=getFilt();
  const c=document.getElementById("qC");
  if(!qs.length){c.innerHTML='<div class="no-q">No questions for this chapter.</div>';return;}
  c.innerHTML=qs.map(q=>{
    const id=q._i;
    const st=ans[id];
    const cc=st===undefined?"q-card":st===q.a?"q-card ac":"q-card aw";
    const hasCode=q.q.includes("\n");
    let qHTML="";
    if(hasCode){const parts=q.q.split("\n");qHTML=`<div class="q-text">${parts[0]}</div><div class="q-code">${parts.slice(1).join("\n")}</div>`;}
    else{qHTML=`<div class="q-text">${q.q}</div>`;}
    return `<div class="${cc}" id="c${id}">
<div class="q-meta"><span class="q-tag">${q.ch}</span><span class="q-tag">${q.s}</span></div>
${qHTML}
<div class="options">${buildOpts(q,id)}</div>
<div class="exp${st!==undefined?" show":""}"><strong>Explanation:</strong> ${q.e}</div>
</div>`;
  }).join("");
  upd();
}

function doAns(id,i){
  if(ans[id]!==undefined)return;
  const q=Q[id];
  ans[id]=i;
  if(i===q.a)cor++;else wrg++;
  const card=document.getElementById("c"+id);
  card.className=i===q.a?"q-card ac":"q-card aw";
  card.querySelectorAll(".option").forEach((el,j)=>{
    el.classList.add("dis");el.removeAttribute("onclick");
    if(j===q.a)el.classList.add("rc");
    if(j===i&&i!==q.a)el.classList.add("sw");
    if(j===i&&i===q.a)el.classList.add("sc");
  });
  card.querySelector(".exp").classList.add("show");
  upd();
}

function upd(){
  const tot=Object.keys(ans).length;
  const pct=tot>0?Math.round(cor/tot*100):0;
  document.getElementById("sT").textContent=tot;
  document.getElementById("sC").textContent=cor;
  document.getElementById("sW").textContent=wrg;
  document.getElementById("sS").textContent=pct+"%";
  const all=getFilt().length;
  const done=getFilt().filter(q=>ans[q._i]!==undefined).length;
  document.getElementById("pFill").style.width=all>0?(done/all*100)+"%":"0%";
}

function resetAll(){ans={};cor=0;wrg=0;render();}

buildBar();render();
</script>

<script>
const Q=[
// ══════ CH1-2 ══════
{ch:"Ch1-2",s:"CIA Triad",q:"What does Confidentiality in the CIA Triad mean?",o:["Data is available to all users","Only authorized people can view the data","Data cannot be modified","All connections are encrypted"],a:1,e:"Confidentiality = only authorized people can view data. Breach examples: stolen laptop, shoulder surfing. Fix: encryption, authentication."},
{ch:"Ch1-2",s:"CIA Triad",q:"An attacker changes a bank transfer from $100 to $10,000. Which CIA principle is violated?",o:["Availability","Confidentiality","Integrity","Non-repudiation"],a:2,e:"Integrity = data must not be changed by unauthorized people. Fix: read-only permissions, backups to roll back changes."},
{ch:"Ch1-2",s:"CIA Triad",q:"A DoS attack takes down a company's web server for 6 hours. Which CIA principle is violated?",o:["Confidentiality","Integrity","Availability","Authentication"],a:2,e:"Availability = data must be accessible when needed. Breach: server crash, power failure, DoS. Fix: backups, redundancy, maintenance."},
{ch:"Ch1-2",s:"CIA Triad",q:"Which fix is most appropriate for a Confidentiality breach?",o:["Redundancy and backups","Encryption and authentication","Read-only permissions","Firewalls only"],a:1,e:"Confidentiality breaches are fixed with encryption (making data unreadable) and authentication (ensuring only authorized users can access it)."},
{ch:"Ch1-2",s:"CIA Triad",q:"Which fix is most appropriate for an Integrity breach?",o:["MFA and VPN","Backups and read-only permissions","Encryption only","Rate limiting"],a:1,e:"Integrity is fixed with: read-only permissions (prevent unauthorized changes) and backups (roll back to correct state if data is modified)."},
{ch:"Ch1-2",s:"Attack Equation",q:"What is the Attack Equation?",o:["Attack = Skill + Time + Access","Attack = Motive + Method + Vulnerability","Attack = Hacker + Network + Tools","Attack = Opportunity + Capability + Intent"],a:1,e:"Attack = Motive (why) + Method (how/tools) + Vulnerability (the weakness). All three must exist simultaneously for an attack to succeed."},
{ch:"Ch1-2",s:"Attack Equation",q:"An attacker is motivated by revenge but cannot find any vulnerability. Will an attack succeed?",o:["Yes if they have the right tools","No — all 3 parts of the Attack Equation must be present","Yes if they have enough time","Maybe, depends on the target"],a:1,e:"Attack requires Motive + Method + Vulnerability — all three. Missing even one means no attack. In this case, no vulnerability = no attack regardless of motive."},
{ch:"Ch1-2",s:"5 Phases",q:"What is the correct order of the 5 hacking phases?",o:["Scanning → Recon → Gaining → Maintaining → Clearing","Recon → Scanning → Gaining Access → Maintaining Access → Clearing Tracks","Gaining → Recon → Scanning → Maintaining → Clearing","Clearing → Maintaining → Gaining → Scanning → Recon"],a:1,e:"1. Reconnaissance, 2. Scanning, 3. Gaining Access, 4. Maintaining Access, 5. Clearing Tracks. Must be executed in this order."},
{ch:"Ch1-2",s:"5 Phases",q:"In the Scanning phase, what is the attacker looking for?",o:["Public OSINT about the target","Live machines, open ports, and OS details to choose an exploit","Employee names and phone numbers","Physical building layout"],a:1,e:"Scanning = pre-attack phase. Uses port scanners and network mappers to find: live hosts, open ports, OS/service versions — to know which specific exploit to use."},
{ch:"Ch1-2",s:"5 Phases",q:"Escalation of Privileges occurs in which phase?",o:["Reconnaissance","Scanning","Gaining Access","Maintaining Access"],a:2,e:"Gaining Access = the actual hack. Escalation of Privileges = moving from regular user account to Admin/Root for total control. Methods: password cracking, buffer overflows, session hijacking."},
{ch:"Ch1-2",s:"5 Phases",q:"Installing a rootkit occurs in which phase?",o:["Reconnaissance","Gaining Access","Maintaining Access","Clearing Tracks"],a:2,e:"Maintaining Access = ensuring the attacker can return later. Methods: backdoors, rootkits, Trojans. Goal: continually steal data or use the machine for future attacks (zombie machine)."},
{ch:"Ch1-2",s:"5 Phases",q:"Spoofing an IP address to make an attack appear from a different location is part of which phase?",o:["Reconnaissance","Scanning","Maintaining Access","Clearing Tracks"],a:3,e:"Clearing Tracks = hiding evidence to avoid prosecution. Methods: overwriting system logs, deleting command history, spoofing the IP address."},
{ch:"Ch1-2",s:"Hacker Classes",q:"Which hacker type is hired legally to improve an organization's security?",o:["Black Hat","Gray Hat","White Hat","Hacktivist"],a:2,e:"White Hat (Security Analyst): uses same skills as Black Hats but with permission. Hired to find and fix vulnerabilities. Also called ethical hacker or penetration tester."},
{ch:"Ch1-2",s:"Hacker Classes",q:"A Gray Hat hacker is best described as:",o:["A government-sponsored attacker","Someone who hacks without permission but reports the bug instead of exploiting it","A highly skilled criminal hacker","An unskilled attacker who uses downloaded tools"],a:1,e:"Gray Hat: works both offensively and defensively. Hacks without permission to find bugs, but reports them instead of selling or exploiting them."},
{ch:"Ch1-2",s:"Hacker Classes",q:"Which hacker type is considered the MOST dangerous insider?",o:["Script Kiddie","Hacktivist","Insider Threat","Cyber Terrorist"],a:2,e:"Insider Threat: trusted employee or contractor with privileged access who violates trust. Most dangerous because they already have authorized access to critical systems — no need to break through perimeter defenses."},
{ch:"Ch1-2",s:"Hacker Classes",q:"State-Sponsored hackers are characterized by:",o:["Low technical skill","Working for financial gain only","Unlimited time and funding for intelligence gathering or cyber warfare","Targeting only individuals, not organizations"],a:2,e:"State-Sponsored: government-employed, unlimited resources and time. Goals: intelligence gathering (espionage) and damaging enemy infrastructure. Example: Stuxnet creators."},
{ch:"Ch1-2",s:"Hacker Classes",q:"A Hacktivist's most common tactic is:",o:["Ransomware deployment","ATM skimming","Web Defacement — changing homepage to show a political message","Selling stolen data on dark web"],a:2,e:"Hacktivist: hacks to promote a political or social agenda. Common tactic: web defacement (replacing a website's homepage with a political statement). Example: Anonymous."},
{ch:"Ch1-2",s:"Hacker Classes",q:"A Script Kiddie is dangerous because:",o:["They have advanced skills","They have no fear of consequences","They can use tools without understanding them — low barrier to attack","They have government backing"],a:2,e:"Script Kiddie: unskilled, cannot write code. Downloads and runs tools made by real hackers. Dangerous because modern attack tools require minimal skill to use — low barrier to causing damage."},
{ch:"Ch1-2",s:"Hacker Classes",q:"Which hacker type is NOT afraid of jail or legal consequences?",o:["Script Kiddie","Suicide Hacker","Hacktivist","Industrial Spy"],a:1,e:"Suicide Hacker: hacks for a cause and is willing to accept all consequences including imprisonment. Dangerous because legal deterrents are ineffective against them."},
{ch:"Ch1-2",s:"Real World",q:"Stuxnet was the first known cyberweapon to:",o:["Steal credit card data from millions","Physically destroy industrial equipment (nuclear centrifuges)","Shut down the internet for 24 hours","Crash the global stock market"],a:1,e:"Stuxnet (Operation Olympic Games): nation-state worm using 4 zero-day exploits. Targeted Siemens industrial controllers in Iran's nuclear facility. Physically destroyed centrifuges by making them spin incorrectly."},
{ch:"Ch1-2",s:"Real World",q:"How many Zero-Day vulnerabilities did Stuxnet use?",o:["1","2","4","7"],a:2,e:"Stuxnet used 4 zero-day vulnerabilities — all unknown at the time. This made it unstoppable by any patching strategy. It was unprecedented in sophistication."},
{ch:"Ch1-2",s:"Real World",q:"Chris Chaney (Hollywood Hacker) had which level of technical skill?",o:["Expert — wrote his own hacking tools","Intermediate — used common hacking scripts","Zero — used Forgot Password and guessed security questions","Basic — used a keylogger"],a:2,e:"Chris Chaney had ZERO technical skill. He used 'Forgot Password' features and guessed security question answers (pet names, birthplaces) using publicly available information found online about celebrities."},
{ch:"Ch1-2",s:"Social Engineering",q:"What is the difference between Tailgating and Piggybacking?",o:["They are identical techniques","Tailgating uses technology, Piggybacking is physical","Tailgating is WITHOUT employee knowledge; Piggybacking is WITH knowledge/permission","Piggybacking targets executives, Tailgating targets all employees"],a:2,e:"Tailgating: follow through secure door without employee's knowledge. Piggybacking: same physical action but employee KNOWS and allows it (may hold door open for attacker carrying boxes)."},
{ch:"Ch1-2",s:"Social Engineering",q:"Shoulder Surfing involves:",o:["Following someone through a secure door","Watching someone type their PIN or password","Searching through trash for sensitive info","Sending fake urgent emails"],a:1,e:"Shoulder Surfing: physically watching someone enter their credentials — at ATMs, login screens, or workstations. Can be done in person or via strategically placed cameras."},
{ch:"Ch1-2",s:"Social Engineering",q:"A Watering Hole attack works by:",o:["Flooding a website with traffic","Infecting a website the target frequently visits","Emailing targets with malicious links","Dropping USB drives in the target's office"],a:1,e:"Watering Hole: attacker identifies a site the target visits regularly, infects that site with malware, and waits for the target to visit and get infected automatically. Named after predators waiting at watering holes."},
{ch:"Ch1-2",s:"Attack Types",q:"Which is an example of an Active Attack?",o:["Sniffing network traffic","Eavesdropping on a conversation","Denial of Service (DoS) attack","Monitoring network traffic patterns"],a:2,e:"Active attacks change data or disrupt communication: DoS, MITM, SQL Injection, Session Hijacking. Passive attacks only watch/listen without changing anything: sniffing, eavesdropping."},
{ch:"Ch1-2",s:"Attack Types",q:"A Close-in Attack requires:",o:["Specialized software tools","Advanced programming skills","Physical proximity to the target","A large botnet"],a:2,e:"Close-in attacks: attacker is physically close to the target. Examples: shoulder surfing, dumpster diving, eavesdropping nearby. Requires physical presence."},
{ch:"Ch1-2",s:"Data States",q:"Data on a USB drive is in which state?",o:["Data in Transit","Data in Process","Data at Rest","Data in Use"],a:2,e:"Data at Rest: stored on hard drives, USBs, or cloud storage. Not currently moving or being processed. Data in Transit = moving across network. Data in Process = currently being used by CPU."},
{ch:"Ch1-2",s:"Data States",q:"An email being sent from one server to another is in which state?",o:["Data at Rest","Data in Transit","Data in Process","Data in Archive"],a:1,e:"Data in Transit: moving across a network (wired or wireless). Examples: email being sent, file being uploaded, web page loading. Protect with encryption (TLS, VPN)."},
{ch:"Ch1-2",s:"Countermeasures",q:"Which is NOT one of the 3 categories of countermeasures?",o:["Technologies (firewalls, AV)","Policies (rules for employees)","Training (educating humans)","Profiling (monitoring employees)"],a:3,e:"The 3 categories: 1) Technologies (firewalls, antivirus, VPN), 2) Policies (rules and guidelines for employees), 3) Training (educating humans — often the weakest link). Profiling is not one of them."},
{ch:"Ch1-2",s:"Security",q:"The Cybersecurity Cube combines:",o:["Firewalls, IDS, and VPN","CIA Triad + Data States + Countermeasures","Red Team, Blue Team, and White Team","Authentication, Authorization, and Accounting"],a:1,e:"Cybersecurity Cube (McCumber Cube): combines the CIA Triad (goals) + 3 Data States (at rest, in transit, in process) + 3 Countermeasures (technology, policy, training)."},

// ══════ CH3 ══════
{ch:"Ch3",s:"APT Definition",q:"What does 'Advanced' mean in APT?",o:["The attack happens very quickly","High skill and resources — uses stealth methods, blends into normal activity","The malware is very large in file size","The attack uses the latest hardware"],a:1,e:"Advanced = high skill and strong resources. APT attackers often use built-in admin tools (LOLBins) so their actions look like normal IT work. They blend in instead of triggering obvious alerts."},
{ch:"Ch3",s:"APT Definition",q:"What does 'Persistent' mean in APT?",o:["The attack happens persistently every day","Long-term access — can return even after partial cleanup using backup access paths","The attacker never changes their methods","The malware runs 24/7 continuously"],a:1,e:"Persistent = long-term access. Attackers create hidden admin accounts, scheduled tasks, and registry keys as backup paths. They can return even after partial remediation."},
{ch:"Ch3",s:"APT Definition",q:"What does 'Threat' mean in APT?",o:["The attack causes physical damage","A real human adversary with goals who adapts when one method fails — not an automated bot","The malware threatens to delete files","The attacker makes threatening phone calls"],a:1,e:"Threat = real human adversary with decision-making ability. Bots repeat the same action. Humans plan and adapt — if phishing fails, they try a vendor account or another approach."},
{ch:"Ch3",s:"APT Definition",q:"What makes a Zero-Day vulnerability especially dangerous?",o:["It targets zero users","No patch exists — even fully patched systems are vulnerable","It only works once","It requires physical access to exploit"],a:1,e:"Zero-Day: software weakness with no patch available yet. Even fully updated systems can be attacked. Defense cannot rely on patching — requires behavior monitoring and anomaly detection."},
{ch:"Ch3",s:"APT Definition",q:"Why can't standard antivirus detect Custom Malware?",o:["Custom malware is encrypted","Custom malware is very small","It is brand new and written for one target — no signature exists in any AV database","Custom malware runs only in RAM"],a:2,e:"Antivirus works by matching known signatures (like a 'wanted poster'). Custom malware has never been seen before — no poster exists. Signature-based detection is completely blind to it."},
{ch:"Ch3",s:"APT Definition",q:"What is Threat Hunting?",o:["Setting up honeypots to catch attackers","Proactively searching for hidden threats even when no alert has fired","Analyzing malware samples in a sandbox","Running vulnerability scans on the network"],a:1,e:"Threat Hunting: defenders actively search for signs of attackers without waiting for an alert. APTs often evade automated detection tools — hunting finds stealthy activity early through behavioral analysis."},
{ch:"Ch3",s:"APT Definition",q:"SolarWinds is an example of which attack type?",o:["Spear phishing","Watering hole","Supply chain attack","WEP cracking"],a:2,e:"SolarWinds: attackers compromised the vendor's update system. Malware arrived via a legitimate software update that organizations installed normally. The attack entered through a trusted door — the supply chain."},
{ch:"Ch3",s:"APT vs PenTest",q:"What is the key difference regarding AUTHORIZATION between APT and pen testing?",o:["Both require authorization","APT has written legal permission; pen testing does not","Pen testing has written legal permission; APT does not","Neither requires authorization"],a:2,e:"Pen testing: requires written legal authorization defining scope and rules. APT: no authorization — actions are illegal. Pen testers report findings; APTs delete evidence and exfiltrate data."},
{ch:"Ch3",s:"APT vs PenTest",q:"Regarding TIME, what advantage does APT have over pen testing?",o:["APT is always faster","APT has unlimited patience — can wait months for one mistake; pen tests have deadlines","Pen testing takes longer because it must be thorough","They have equal time"],a:1,e:"APT can wait months or years — targeting holiday periods or weekends when monitoring is reduced. Pen tests have contracted time limits. This patience is a key APT advantage."},
{ch:"Ch3",s:"Teams",q:"The Red Team's primary role is:",o:["Monitor and respond to security incidents","Simulate real attackers to test whether defenses can detect and stop a realistic attack","Control rules and safety during exercises","Collaborate with Blue Team to improve detections"],a:1,e:"Red Team: simulates real-world attackers. They focus on reaching objectives (stealing data, accessing systems) — not just listing vulnerabilities. They test whether the SOC can detect them."},
{ch:"Ch3",s:"Teams",q:"The Blue Team operates which tools daily?",o:["Metasploit, Aircrack-ng, Nmap","SIEM, EDR, IDS/IPS, and incident response tools","Kismet, Wireshark, Evil Twin AP","theHarvester, Shodan, crt.sh"],a:1,e:"Blue Team: defensive group operating SIEM (log correlation), EDR (endpoint detection), and IDS/IPS. They monitor alerts, investigate incidents, isolate compromised systems, and coordinate containment."},
{ch:"Ch3",s:"Teams",q:"The Purple Team exists to:",o:["Replace both Red and Blue Teams","Control what Red Team is allowed to test","Turn Red Team attack techniques into immediate Blue Team detection improvements","Provide legal authorization for pen tests"],a:2,e:"Purple Team: collaboration between Red and Blue. Red shows the attack technique, Blue immediately creates a detection rule and closes the gap. Turns adversarial exercises into rapid security improvements."},
{ch:"Ch3",s:"Teams",q:"Which team would STOP a test action if it risks crashing a production server?",o:["Red Team","Blue Team","White Team","Purple Team"],a:2,e:"White Team: controls rules, safety, and communication during exercises. Ensures legal and ethical boundaries. Stops test actions that could harm real production systems or cross legal lines."},
{ch:"Ch3",s:"Pen Testing Types",q:"Black Box testing simulates:",o:["An insider threat with full system access","An external attacker with NO internal information — only what is publicly visible","A contractor with partial access","An admin reviewing their own systems"],a:1,e:"Black Box: tester starts with ZERO internal knowledge (no network maps, no credentials). Simulates an external attacker's perspective — tests only what is exposed from outside the organization."},
{ch:"Ch3",s:"Pen Testing Types",q:"Which testing type finds deeper weaknesses faster because the tester has full internal knowledge?",o:["Black Box","White Box","Gray Box","Red Box"],a:1,e:"White Box: tester has FULL internal knowledge — source code, architecture, firewall rules, configurations. Finds deeper weaknesses faster because no time is wasted on reconnaissance."},
{ch:"Ch3",s:"Pen Testing Types",q:"Gray Box testing simulates:",o:["An external attacker with no access","An insider with admin privileges","Stolen employee credentials or an insider-like situation with limited access","A physical intruder"],a:2,e:"Gray Box: tester has LIMITED internal access (normal employee account). Simulates stolen credentials or a malicious insider. Tests whether employee-level access can be escalated or abused."},
{ch:"Ch3",s:"APT Lifecycle",q:"In the Enumeration phase of the APT lifecycle, what does the attacker discover?",o:["Public OSINT data about the organization","Active directory structure, service versions, user accounts, shared resources","Employee email addresses","Physical building access points"],a:1,e:"Enumeration: ACTIVE discovery of technical details. Answers 'exactly what is running and how is it set up?' Discovers: OS versions, service versions, user accounts, shares, group policies."},
{ch:"Ch3",s:"APT Lifecycle",q:"What is Pass-the-Hash (PtH) and when is it used?",o:["Using a stolen password in plain text to log in","Cracking a password hash offline with a dictionary","Using a stolen credential HASH to authenticate without knowing the actual password — used in lateral movement","Hashing a password before sending it over the network"],a:2,e:"Pass-the-Hash: in Windows environments, the NTLM hash can be reused as an authentication token. Attacker steals the hash (not the password) and uses it to authenticate to other systems. Used in lateral movement phase."},
{ch:"Ch3",s:"APT Lifecycle",q:"Why is network segmentation the primary defense against lateral movement?",o:["It encrypts all internal traffic","It limits which systems can communicate — attacker cannot freely move between segments even after compromising one machine","It detects Pass-the-Hash attacks automatically","It prevents VPN access from outside"],a:1,e:"Network segmentation divides the network into zones with controlled traffic between them. Even if one device is compromised, the attacker cannot reach other segments (e.g., lab cannot reach finance servers)."},
{ch:"Ch3",s:"APT Lifecycle",q:"What is DNS Tunneling and why do attackers prefer it for exfiltration?",o:["Poisoning DNS cache to redirect users","Hiding data inside DNS queries — DNS is almost always allowed through firewalls so data flows out undetected","Overloading DNS servers to cause outages","Using DNS to map all internal network hostnames"],a:1,e:"DNS Tunneling: encodes stolen data inside DNS queries/responses. Attackers prefer it because DNS traffic is almost always permitted through firewalls. Detected by: long random subdomains, abnormally high DNS query volume."},
{ch:"Ch3",s:"APT Lifecycle",q:"Steganography is used in exfiltration to:",o:["Encrypt stolen files before sending","Hide data inside normal-looking files like images or audio — bypasses filters that look only for obvious documents","Speed up data transfer","Compress large files for faster exfiltration"],a:1,e:"Steganography: hides data inside normal files (images, audio). A 'cat photo' may contain embedded stolen documents. Bypasses DLP systems that only scan for obvious document types or encrypted archives."},
{ch:"Ch3",s:"APT Lifecycle",q:"RAM-only malware is designed to:",o:["Encrypt the hard drive","Run only in system memory to avoid leaving files on disk — disappears after reboot (but attackers add persistence mechanisms)","Spread via USB automatically","Download additional malware from the internet"],a:1,e:"RAM-only malware: runs in memory only, no disk files = harder to detect. BUT: attackers add persistence (scheduled tasks, registry keys) to reintroduce it after reboot. EDR tools that monitor memory behavior can detect it."},
{ch:"Ch3",s:"APT Lifecycle",q:"FIM (File Integrity Monitoring) defends against which APT phase?",o:["Reconnaissance","Enumeration","Persistence — alerts when startup entries or critical files are modified","Data Exfiltration"],a:2,e:"FIM watches critical system files for unauthorized changes. Persistence mechanisms (registry keys, scheduled tasks, startup entries) MUST modify something in the system — FIM catches this modification early."},
{ch:"Ch3",s:"APT Lifecycle",q:"Log Deletion by an attacker is part of which phase?",o:["Reconnaissance","Exploitation","Lateral Movement","Cleanup / Anti-Forensics"],a:3,e:"Cleanup/Anti-Forensics: attacker deletes or clears system event logs to hide what happened. Defense: remote/centralized logging (SIEM) — local log deletion doesn't affect copies already sent to the SIEM."},
{ch:"Ch3",s:"APT Lifecycle",q:"Timestomping is used to:",o:["Compress files to transfer faster","Change file timestamps so malicious files look older or created at a normal time — confuses investigators","Speed up malware execution","Bypass antivirus signature detection"],a:1,e:"Timestomping: modifies file creation/modification timestamps. A malicious file might show 'created 2020' when it was actually introduced yesterday. Defense: cross-check with SIEM logs and endpoint telemetry."},
{ch:"Ch3",s:"SOC Tools",q:"What is the difference between SIEM and SOAR?",o:["SIEM blocks attacks, SOAR detects them","SIEM collects and correlates logs into alerts; SOAR automates response actions using playbooks","SIEM is used by Red Team, SOAR by Blue Team","They are different names for the same tool"],a:1,e:"SIEM: collects logs from many sources, correlates events into meaningful alerts. Single events look normal — combined they reveal attacks. SOAR: automates responses (auto-block IP, create ticket). Reduces human workload."},
{ch:"Ch3",s:"SOC Tools",q:"MTTD stands for:",o:["Mean Time To Disable","Mean Time To Detect — how long it takes to detect an attack after it begins","Mean Time To Deploy","Maximum Time To Disconnect"],a:1,e:"MTTD (Mean Time To Detect): the time from when an attack begins until it is detected. Lower MTTD = better. Quick detection limits how far attackers can move before defenders act."},
{ch:"Ch3",s:"SOC Tools",q:"Dwell Time measures:",o:["How long a system takes to reboot","How long an attacker remains inside the network undetected","How long an incident response takes","How long before an attack is reported to management"],a:1,e:"Dwell Time: how long the attacker stays inside without being detected. Global average dwell time is weeks to months. Short dwell = strong monitoring. Long dwell = attacker can steal data slowly at night."},
{ch:"Ch3",s:"Blue Team",q:"A SOC Analyst's primary role is:",o:["Proactively hunt for hidden threats","Monitor alerts, triage events, decide what is real, escalate serious incidents","Analyze malware samples in a sandbox","Respond to and contain confirmed attacks"],a:1,e:"SOC Analyst: first line of defense. Monitors security systems, investigates alerts, triages (sorts by severity), and escalates confirmed incidents to incident responders. Reactive — responds to alerts as they appear."},
{ch:"Ch3",s:"Blue Team",q:"A Threat Hunter differs from a SOC Analyst in that:",o:["Threat Hunters only analyze malware","Threat Hunters proactively SEARCH for hidden threats even when no alert has fired","Threat Hunters only work weekends","Threat Hunters manage the SIEM platform"],a:1,e:"SOC Analyst = reactive (responds to alerts). Threat Hunter = proactive (searches for threats that haven't triggered alerts). APTs specifically evade alerting tools — hunting finds what automated systems miss."},
{ch:"Ch3",s:"Blue Team",q:"A Malware Analyst's work benefits the whole SOC because:",o:["They manage all incident response","Their analysis reveals malware's persistence mechanisms and indicators — the SOC can then search all devices for those indicators","They train all employees on phishing","They configure the SIEM rules"],a:1,e:"Malware Analyst: studies malicious code to understand how it works. Finding that 'this malware creates a scheduled task named UpdateCheck' allows the SOC to search ALL devices for that task name — scaling detection across the org."},
{ch:"Ch3",s:"Incident Response",q:"The Containment phase of incident response aims to:",o:["Remove all attacker tools from the system","Restore systems from clean backups","Stop the incident from spreading while preserving evidence","Train employees after the incident"],a:2,e:"Containment: 'stop the bleeding' — isolate infected devices, disable compromised accounts, block malicious traffic. Must preserve evidence for forensics while preventing further spread."},
{ch:"Ch3",s:"Incident Response",q:"Why must Recovery be done carefully and not rushed?",o:["Recovery is expensive","Restoring too quickly can reintroduce the infection if the backup itself is compromised","Recovery requires management approval","Recovery takes too long"],a:1,e:"Recovery: restore from CLEAN backups. If you restore from a backup that was made AFTER the attacker was inside, you reintroduce the infection. Verify backup integrity before restoring."},
{ch:"Ch3",s:"Frameworks",q:"NIST CSF's 5 functions in order are:",o:["Plan, Build, Run, Monitor, Improve","Identify, Protect, Detect, Respond, Recover","Prepare, Prevent, Detect, Contain, Eradicate","Scan, Assess, Patch, Monitor, Report"],a:1,e:"NIST CSF: Identify (know your assets), Protect (safeguards), Detect (identify attacks), Respond (take action), Recover (restore operations). Ensures balanced security — not just prevention."},
{ch:"Ch3",s:"Frameworks",q:"CIS Controls emphasize:",o:["Advanced threat hunting techniques","Penetration testing as primary defense","Strong basics: inventory, patching, secure configuration, access control — prioritized for maximum risk reduction","Zero Trust architecture exclusively"],a:2,e:"CIS Controls: practical prioritized actions. Emphasis on getting the basics right first — you cannot protect what you don't know you have. Start with inventory, patch, configure securely, control access."},
{ch:"Ch3",s:"Defense",q:"Which defense-in-depth layer specifically prevents Pass-the-Hash attacks from succeeding across the network?",o:["Firewalls","Network Segmentation","Endpoint AV","Email Gateway"],a:1,e:"Network Segmentation: even if attacker has a hash from one device, segmentation limits which other devices they can reach with it. They cannot authenticate across segments they are blocked from reaching."},

// ══════ CH4 ══════
{ch:"Ch4",s:"Honeypots",q:"What is a honeypot?",o:["A vulnerability scanner","A decoy system designed to attract and detect attackers — any access is suspicious","A type of IDS signature","A network segmentation tool"],a:1,e:"Honeypot: decoy system with no legitimate use. Since no real user should ever access it, ANY connection = attacker activity. Provides high-confidence alerts with almost no false positives."},
{ch:"Ch4",s:"Honeypots",q:"Low Interaction honeypots differ from High Interaction honeypots in that:",o:["Low interaction uses real OS; High interaction emulates services","Low interaction emulates services without full OS; High interaction uses full OS for comprehensive attacker logging","They are identical in functionality","Low interaction is illegal; High interaction is permitted"],a:1,e:"Low Interaction: emulates services, easy to deploy, lower resources. Detects scans. Tools: Honeyd, Artillery, Cowrie. High Interaction: full OS, complete attacker interaction, used to understand TTPs and analyze APT behavior."},
{ch:"Ch4",s:"Honeypots",q:"Honeytokens are different from traditional honeypots because:",o:["They use more server resources","They are fake data (API keys, credentials) that trigger alerts when accessed — require no infrastructure","They monitor outbound traffic only","They are deployed in the cloud only"],a:1,e:"Honeytokens: fake credentials, API keys, documents that trigger alerts when accessed. No servers required. Example: canary tokens (fake AWS keys). Perfect for detecting insider threats and credential theft."},
{ch:"Ch4",s:"Port Scanning",q:"What does a Snort IDS rule do when it detects 20 SYN packets from one IP within 60 seconds?",o:["Blocks the IP permanently","Generates an alert — indicating port scanning behavior","Resets all connections","Sends an email to the admin"],a:1,e:"The Snort rule detects connection threshold patterns (20+ ports in 60 seconds from one source IP). This pattern strongly indicates automated port scanning. Snort generates an alert for the SOC to investigate."},
{ch:"Ch4",s:"Port Scanning",q:"What do high volumes of RST packets indicate?",o:["A server is overloaded","Active port scanning — closed ports generate RST responses when probed","A successful connection established","DNS zone transfer activity"],a:1,e:"Failed Connection Analysis: RST (Reset) packets are sent by closed ports when probed. High RST volume from one source = active port scanning. The attacker is testing many ports — most are closed and respond with RST."},
{ch:"Ch4",s:"Port Scanning",q:"A coordinated scan pattern involves:",o:["One source scanning ports sequentially","Random port order to evade simple detection","Multiple sources scanning different port ranges simultaneously","A SYN flood attack"],a:2,e:"Coordinated scan: multiple attacker-controlled sources each scan different port ranges simultaneously. Divides the work to stay below per-source thresholds. Harder to detect because no single source triggers the threshold."},
{ch:"Ch4",s:"DNS Detection",q:"An AXFR request against a DNS server should alert defenders because:",o:["AXFR speeds up DNS resolution","AXFR is a zone transfer request — if unauthorized, it reveals ALL DNS records for the domain","AXFR is used for DDoS attacks","AXFR modifies DNS records"],a:1,e:"DNS Zone Transfer (AXFR): legitimate tool for DNS server synchronization. Attackers use unauthorized AXFR to get a complete list of ALL domain records — revealing all subdomains, mail servers, and IPs at once."},
{ch:"Ch4",s:"Web App Detection",q:"Rapid 404 errors from a single IP address indicate:",o:["The web server is misconfigured","Directory enumeration — attacker is systematically guessing file and directory names","A DDoS attack in progress","The user has a slow connection"],a:1,e:"404 Pattern Analysis: automated tools (dirb, gobuster, ffuf) request thousands of paths rapidly. Most return 404 (not found). A single IP generating many 404s in sequence = directory/path enumeration attack."},
{ch:"Ch4",s:"Web App Detection",q:"Which user-agent string in web logs indicates an automated scanning tool?",o:["Mozilla/5.0 Chrome","curl/7.68","nikto","Googlebot/2.1"],a:2,e:"Tools like nikto, dirbuster, sqlmap, gobuster, and ffuf use distinctive user-agent strings. Monitoring for these strings in web server logs reveals automated scanning activity targeting the web application."},
{ch:"Ch4",s:"DLP",q:"What does DLP stand for and what does it prevent?",o:["Data Loss Protocol — prevents data packet loss","Data Leakage Prevention — prevents sensitive information from leaving organizational control","Dynamic Link Protection — protects web links","Deep Level Protection — encrypts all data"],a:1,e:"DLP (Data Leakage Prevention): strategies and technologies to prevent sensitive information from leaving organizational control, whether through malicious action or accidental disclosure."},
{ch:"Ch4",s:"DLP",q:"Which DLP risk channel has the CRITICAL risk level?",o:["Social Engineering","Employee Actions","Third-Party Access","Public Exposure (misconfigured S3 buckets, exposed Git repos)"],a:3,e:"Public Exposure is CRITICAL: misconfigured S3 buckets, exposed Git repositories, public databases. Once exposed publicly, data is accessible to anyone globally. Fix: security configs, access controls, automated scanning."},
{ch:"Ch4",s:"DLP",q:"What is Exact Data Matching (EDM) in DLP?",o:["Comparing file names to a blacklist","Hash-based matching of specific database records — detects exact copies of protected data","Scanning emails for keywords","Blocking all external file transfers"],a:1,e:"EDM: creates hashes of protected data records (like specific customer records). When that exact data appears in an outbound transmission, the hash matches and DLP blocks/alerts. Very precise — low false positive rate."},
{ch:"Ch4",s:"DLP",q:"Data classified as 'Restricted' should be handled how?",o:["Can be freely shared internally","Encrypt external transmission and log access","Block all external sharing, audit all access, multi-person approval, need-to-know only","Manager approval required for external sharing"],a:2,e:"Restricted: trade secrets, PII, health data. Strictest handling: block ALL external sharing, audit EVERY access, require multi-person approval, need-to-know basis only. This is the highest classification level."},
{ch:"Ch4",s:"Email Security",q:"SPF (Sender Policy Framework) prevents:",o:["Email content modification in transit","Domain spoofing — defines which mail servers are authorized to send on behalf of your domain","Emails from reaching spam folders","Brute force attacks on email accounts"],a:1,e:"SPF: DNS TXT record listing authorized mail servers for your domain. Receiving servers check: 'Is this email from an authorized server?' If no, it may be spoofed. Prevents domain impersonation attacks."},
{ch:"Ch4",s:"Email Security",q:"DKIM ensures:",o:["Only authorized servers can send email","The email was not modified in transit — verified by cryptographic signature","All emails are encrypted end-to-end","Spam emails are blocked automatically"],a:1,e:"DKIM: adds cryptographic signature to email headers. Receiving server verifies signature using sender's public key in DNS. If signature is valid = email not modified. If invalid = email was tampered with in transit."},
{ch:"Ch4",s:"Email Security",q:"A DMARC policy of 'quarantine' means:",o:["Block all failing emails completely","Monitor only — do nothing with failing emails","Move emails failing SPF/DKIM to the spam/junk folder","Delete all external emails"],a:2,e:"DMARC policies: none = monitor and report only, quarantine = spam folder, reject = block completely. Quarantine is the middle ground — suspicious emails go to spam while you tune your policies before enforcing reject."},
{ch:"Ch4",s:"OSINT",q:"Certificate Transparency Logs (crt.sh) reveal:",o:["Expired passwords","All SSL/TLS certificates ever issued for a domain — exposing subdomains, internal hostnames, and historical infrastructure","Employee social media profiles","Source code repositories"],a:1,e:"Certificate Transparency: all SSL/TLS certificates are publicly logged. Searching crt.sh for a domain reveals: all subdomains (including internal ones like dev.company.com, vpn.company.com), historical certificates, and infrastructure changes."},
{ch:"Ch4",s:"OSINT",q:"Which Google Dork finds accidentally committed secrets in code repositories?",o:["site:github.com inurl:target","site:target.com filetype:pdf","site:github.com target.com password OR api_key OR secret","cache:target.com"],a:2,e:"GitHub code search with target domain + keywords (password, api_key, secret, credentials) finds accidentally committed secrets. Tools like TruffleHog and GitLeaks automate this search across entire repositories."},
{ch:"Ch4",s:"Social Engineering",q:"What are the 4 phases of a social engineering attack in order?",o:["Research → Exploit → Develop → Select","Research the Target → Select a Target → Develop a Relationship → Exploit the Relationship","Select → Research → Exploit → Cover tracks","Phish → Call → Enter → Steal"],a:1,e:"1. Research the Target (dumpster diving, social media, website). 2. Select a Target (frustrated/naive employees). 3. Develop a Relationship (build rapport). 4. Exploit the Relationship (extract data/credentials)."},
{ch:"Ch4",s:"Social Engineering",q:"Which social engineering type targets senior executives specifically?",o:["Vishing","SMiShing","Whaling","Pretexting"],a:2,e:"Whaling: spear phishing targeting C-level executives (CEOs, CFOs, CIOs). High-value targets with maximum data access and authority to authorize large financial transactions. BEC (Business Email Compromise) often targets CFOs."},
{ch:"Ch4",s:"Defense in Depth",q:"The 'Detection' layer in Defence-in-Depth uses which technologies?",o:["Firewalls and WAF","IDS/IPS, honeypots, SIEM, anomaly detection","Security awareness training","DLP and email gateways"],a:1,e:"Detection layer: IDS/IPS (detect intrusion patterns), honeypots (detect reconnaissance), SIEM (correlate events), anomaly detection (behavior-based). Purpose: identify reconnaissance and attack activity as early as possible."},
{ch:"Ch4",s:"Defense in Depth",q:"Which layer of Defence-in-Depth specifically defends against social engineering?",o:["Information Minimisation","Detection","Prevention","Human Layer"],a:3,e:"Human Layer: security awareness training, verification procedures, phishing simulations. Specifically targets social engineering — the attack vector that bypasses ALL technical controls by targeting humans directly."},

// ══════ CH5 ══════
{ch:"Ch5",s:"Recon Categories",q:"What does OSINT stand for and what are its sources?",o:["Operational Security Intelligence — internal company data","Open Source Intelligence — publicly available information (internet, public records, social media)","Offensive Security Intelligence Network — dark web sources","Organized System Intelligence — network monitoring data"],a:1,e:"OSINT = Open Source Intelligence. Sources: internet, websites, social media, public records, certificate logs, job postings, news. Does NOT require interacting with target systems — completely passive."},
{ch:"Ch5",s:"Recon Categories",q:"HUMINT is collected through:",o:["Scanning network ports","Public government records","Social engineering, phone calls, eavesdropping — from PEOPLE","Analyzing financial reports"],a:2,e:"HUMINT = Human Intelligence. Collected FROM people through direct interaction: social engineering conversations, pretexted phone calls, eavesdropping. Not collected from documents or systems — from humans directly."},
{ch:"Ch5",s:"Recon Categories",q:"GEOINT includes which unexpected data source?",o:["Employee passwords","GPS coordinates embedded in photo EXIF metadata","Network routing tables","Server hostnames"],a:1,e:"GEOINT includes EXIF metadata: smartphones automatically embed GPS coordinates into photos. Published employee photos, blog posts, and social media images may contain precise location data revealing home addresses or office locations."},
{ch:"Ch5",s:"Recon Categories",q:"FININT (Financial Intelligence) sources include:",o:["Employee social media profiles","DNS records and IP ranges","SEC filings, quarterly reports, acquisitions data","Physical building layouts"],a:2,e:"FININT: SEC filings (public companies must file quarterly/annual reports), acquisition announcements, financial press releases, credit ratings. Reveals company health, major investments, and business relationships."},
{ch:"Ch5",s:"Search Engine",q:"What does the Google Dork 'site:target.com filetype:xls intext:password' look for?",o:["Administrator login pages","Excel spreadsheets on the target domain containing the word 'password'","Cached versions of deleted pages","All PDFs on the domain"],a:1,e:"Combined Dork: site:target.com (only on this domain) + filetype:xls (Excel files only) + intext:password (containing the word 'password'). Finds credential spreadsheets accidentally left publicly accessible."},
{ch:"Ch5",s:"Search Engine",q:"The 'intitle:' operator searches for terms in:",o:["The URL path","The page's HTML title tag","The page body content","The server response headers"],a:1,e:"intitle: searches the HTML <title> tag of web pages. Example: intitle:'Confidential' finds pages where 'Confidential' is in the title. Often reveals internal pages that were accidentally indexed."},
{ch:"Ch5",s:"Search Engine",q:"Search Engine Alerts are valuable for attackers because:",o:["They make searches faster","They provide automatic notifications when new content matching their keywords appears online — passive intelligence gathering","They allow automated clicking on search results","They bypass Google's rate limiting"],a:1,e:"Search Alerts (Google Alerts): set up for the target's name → get email whenever new content about them appears. Completely passive — no interaction with target. Reveals press releases, employee mentions, new job postings, news."},
{ch:"Ch5",s:"Search Engine",q:"Scripting searches automates:",o:["Cracking passwords","Opening repetitive search queries from a prepared list file automatically","Sending phishing emails","Scanning ports on target servers"],a:1,e:"Scripting: instead of manually searching 50 terms one by one, a script reads from a list file and opens each query automatically. Combines with operators for targeted results. Saves hours of manual work."},
{ch:"Ch5",s:"HUMINT Personnel",q:"Why is identifying a CFO valuable to an attacker?",o:["CFOs have the most employees to target","CFOs have access to financial systems and authority to authorize wire transfers — primary target for financial fraud","CFOs always have weak passwords","CFOs work remotely making them easier to phish"],a:1,e:"CFO = financial systems access + authority to approve large transfers. Primary target for BEC (Business Email Compromise) attacks where the attacker impersonates the CEO and requests urgent wire transfers to the CFO."},
{ch:"Ch5",s:"HUMINT Personnel",q:"Which C-level role controls ALL information systems and is therefore the highest-value IT target?",o:["CEO","CFO","CIO/CTO","CCO"],a:2,e:"CIO (Chief Information Officer) / CTO (Chief Technology Officer): controls all IT systems and technology decisions. Compromising their credentials or social engineering them gives access to the most sensitive technical infrastructure."},
{ch:"Ch5",s:"Directory Harvesting",q:"What is the purpose of searching a personnel directory with A through Z?",o:["To find admin panel vulnerabilities","To systematically extract ALL employee names — directory returns results based on the letter searched","To enumerate DNS subdomains","To find email server software"],a:1,e:"Alphabet-sweep: many directory search systems return employees whose name starts with the searched letter. By searching A, then B, then C... through Z, attacker systematically extracts the ENTIRE employee list."},
{ch:"Ch5",s:"Directory Harvesting",q:"After extracting directory information, the final output the attacker builds is:",o:["A network topology map","A complete employee spreadsheet (name, title, department, phone, email)","A list of IP addresses","A map of the building layout"],a:1,e:"Final output: structured spreadsheet with: full name, job title, department, phone number, office address, email address. This intelligence feeds spear phishing, vishing, physical SE, and lateral movement planning."},
{ch:"Ch5",s:"Directory Harvesting",q:"Why is a POST-based directory more difficult to harvest than a GET-based one?",o:["POST uses encryption by default","POST parameters are hidden in the request body — require a proxy tool to inspect and replay (not visible in URL)","POST requires authentication always","POST directories have CAPTCHA by default"],a:1,e:"GET: parameters visible in URL (easy to automate — just change URL). POST: parameters in request body (invisible in URL — need Burp Suite or similar proxy to capture and replay with different values). More effort but still automatable."},
{ch:"Ch5",s:"Email Harvesting",q:"What technical intelligence is gained from analyzing a company's MX records?",o:["Employee names","Mail server software and version (via banner grabbing during SMTP handshake)","Physical office locations","VPN gateway addresses"],a:1,e:"MX records reveal which mail servers handle email for the domain. Banner grabbing during SMTP connection reveals mail server software and version — which email security tools the attacker needs to bypass."},
{ch:"Ch5",s:"Email Harvesting",q:"A nondelivery report (NDR/bounce message) tells an attacker:",o:["The email server is down","Which email addresses are valid vs invalid — by different bounce messages for each","The recipient's password policy","The company's spam filter brand"],a:1,e:"NDR analysis: sending emails to guessed addresses and analyzing bounce messages. Different NDRs for 'user does not exist' vs 'mailbox full' vs 'delivery delayed' reveal which addresses are valid. Defense: standardize all error messages."},
{ch:"Ch5",s:"Email Harvesting",q:"The student inquiry pretext works because:",o:["Students have special authority","The email appears completely innocent — generates a reply containing signature, title, phone, and email format","It is sent from an official domain","Students are trusted automatically"],a:1,e:"Pretext: 'Hi, I'm a finance student who found you on LinkedIn seeking job opportunities.' This triggers helpfulness, generates a real reply with full signature data, email format, and who else to contact — all without raising suspicion."},
{ch:"Ch5",s:"Email Harvesting",q:"Disabling SMTP VRFY prevents attackers from:",o:["Sending phishing emails","Enumerating valid email addresses by querying the mail server directly","Reading email content","Intercepting email in transit"],a:1,e:"SMTP VRFY command: some mail servers allow direct query of whether an address exists (VRFY user@domain.com → 250 exists or 550 not found). Disabling VRFY prevents direct email address enumeration."},
{ch:"Ch5",s:"GEOINT",q:"BatchGeo is used by attackers to:",o:["Crack GPS encryption","Upload a list of addresses and generate a visual map showing office locations and employee clusters","Track employee phone locations in real time","Analyze satellite imagery"],a:1,e:"BatchGeo: upload addresses → creates visual pin map. Shows: office locations, employee home regions (from OSINT), partner sites. Helps attackers plan physical intrusion routes and identify remote worker locations."},
{ch:"Ch5",s:"GEOINT",q:"How do attackers find GPS coordinates in employee photos?",o:["By asking employees directly","By reading EXIF metadata embedded in photos taken by smartphones — GPS coordinates are stored automatically","By analyzing photo lighting direction","By checking the photo's filename"],a:1,e:"EXIF metadata: smartphones embed GPS coordinates, device model, and timestamp into every photo by default. Attackers extract this with tools like ExifTool. Defense: strip EXIF before publishing photos."},
{ch:"Ch5",s:"Individual Recon",q:"War dialing is used to:",o:["Hack telephone systems","Enumerate phone numbers by calling them systematically to identify modems, fax machines, or security systems","Eavesdrop on phone conversations","Spoof caller ID"],a:1,e:"War dialing: systematically calling phone numbers to find which ones connect to modems, fax machines, PBX systems, or security equipment. Named after the movie WarGames. Modern equivalent: scanning for open ports."},
{ch:"Ch5",s:"Individual Recon",q:"Why does an attacker focus on frustrated or overworked employees when selecting a target?",o:["They have more data access","They have weaker passwords","They are more susceptible to social engineering — less likely to follow careful verification procedures","They work longer hours making them available"],a:2,e:"Frustrated/overworked employees: less likely to carefully verify unusual requests, more willing to take shortcuts, may be emotionally receptive to sympathy pretexts. They are the path of least resistance."},
{ch:"Ch5",s:"Nontraditional Sources",q:"Government county clerk offices contain which type of useful intelligence?",o:["Network infrastructure data","Employee email addresses","Mortgage records, property deeds, land ownership — reveals home addresses and property values","Corporate financial statements"],a:2,e:"County clerk offices: public records including mortgage documents, property deeds, and ownership records. Reveals home addresses of executives (for targeted physical surveillance or GEOINT), property values, and ownership networks."},
{ch:"Ch5",s:"Nontraditional Sources",q:"Employee-created online forums (watering holes in recon context) are valuable because:",o:["They are always hackable","They contain information the organization doesn't know is public — often internal tech details, complaints, and workarounds","Employees post their passwords there","They reveal network topology"],a:1,e:"These forums/Reddit threads/Slack communities are created by employees without company oversight. They often contain: tech stack details ('we're migrating to Azure next month'), internal complaints ('our IDS is always down'), and security gaps."},
{ch:"Ch5",s:"osintstalker",q:"fbstalker automates collection of which data type?",o:["Network scan results","Social media data — friends, photos, places visited, apps installed, videos","GPS coordinates from images","Email server information"],a:1,e:"fbstalker: collects social media profile intelligence — friends list, photos the target is tagged in, places liked/visited, videos, apps installed. Builds a detailed personal profile for ultra-targeted spear phishing."},
{ch:"Ch5",s:"osintstalker",q:"geostalker enables an attacker to infer:",o:["Network passwords","The target's physical location history and daily routine from GPS metadata in images","Employee hierarchy","Financial account numbers"],a:1,e:"geostalker: extracts GPS metadata from images across multiple platforms, maps all locations, identifies patterns. From this, attacker can infer: home address, workplace, gym, favorite restaurant, daily schedule."},
{ch:"Ch5",s:"Defense",q:"What does robots.txt do in terms of OSINT defense?",o:["Blocks all web traffic to the server","Instructs search engine crawlers not to index specified paths — prevents sensitive pages from appearing in search results","Encrypts web content automatically","Detects web scraping attempts"],a:1,e:"robots.txt: tells search engines which paths not to index. Prevents sensitive pages from appearing in Google search results. However, attackers know to CHECK robots.txt — it often reveals sensitive paths by listing what to exclude."},
{ch:"Ch5",s:"Defense",q:"GitLeaks and TruffleHog are used to:",o:["Scan for network vulnerabilities","Automatically scan code repositories for accidentally committed secrets (API keys, passwords, credentials)","Monitor employee social media","Crack password hashes"],a:1,e:"GitLeaks and TruffleHog: scan Git repositories (GitHub, GitLab, Bitbucket) for accidentally committed secrets. Developers sometimes commit .env files, API keys, passwords. Run these tools regularly on your own repos."},

// ══════ CH6 ══════
{ch:"Ch6",s:"SE Foundation",q:"Social engineering exploits which specific aspect of human behavior?",o:["Physical strength","Technical ignorance only","Human psychology — trust, authority, urgency, fear, reciprocity","Financial motivation only"],a:2,e:"Social engineering exploits psychological triggers hardwired into human behavior. People are unaware of the value of their information and careless about protecting it. These are deeply rooted functions of the human brain."},
{ch:"Ch6",s:"SE Foundation",q:"Why is spear-phishing more dangerous than generic phishing?",o:["It uses more advanced malware","It is sent to more people","It uses real intelligence from reconnaissance — referencing actual names, current projects, real email formats — making it almost impossible to detect","It goes through different email servers"],a:2,e:"Spear phishing uses Ch5 intelligence: real manager names, current project names, actual colleague email format. A generic phishing email is easy to spot. One referencing your manager's real name and your current project is nearly indistinguishable."},
{ch:"Ch6",s:"SE Foundation",q:"Verbal communication conveys the WORDS spoken. What does nonverbal communication convey?",o:["The technical content of the message","Tone, body language, eye contact, posture, facial expressions — the subconscious layer that signals discomfort or dishonesty","The written record of the conversation","The timing of the response"],a:1,e:"Even without hearing words clearly, people sense discomfort or dishonesty through nonverbal cues. A social engineer must control BOTH: the words (pretext) AND the nonverbal signals (confident body language, appropriate eye contact)."},
{ch:"Ch6",s:"8 Strategies",q:"The 'Assumptions' strategy works by:",o:["Making the attacker assume the target is friendly","Exploiting the target's preconceived beliefs about what looks trustworthy, authoritative, or legitimate","Assuming the target will not ask for ID","Making assumptions about which floor the target works on"],a:1,e:"People have pre-built assumptions: uniform = authorized, business card = legitimate, familiar company name = trustworthy. The attacker designs the entire attack persona to satisfy those assumptions — the target fills in the legitimacy gaps themselves."},
{ch:"Ch6",s:"8 Strategies",q:"Strategy 2 'Do What Works for You' requires:",o:["Always using the same attack script","An honest self-assessment of physical, mental, and social strengths and weaknesses — design attacks around YOUR strengths","Doing what other social engineers do","Using only phone-based attacks"],a:1,e:"Know yourself first. If you're not confident face-to-face, phone attacks may work better. If you lack technical knowledge, don't impersonate IT — impersonate a vendor. Design attacks that leverage YOUR natural strengths."},
{ch:"Ch6",s:"8 Strategies",q:"Preparation (Strategy 3) requires preparing which elements before an attack?",o:["Only the story","Story, background, target actions, tone/style, appearance, name references, supporting materials","Only the fake email","Only the clothing to wear"],a:1,e:"Preparation: story (who you are, why you're here), background info (company details from recon), target actions (exactly what you need them to do), tone/style, appearance (uniform, clothing), name drops, supporting materials (fake business cards, emails)."},
{ch:"Ch6",s:"8 Strategies",q:"Why does a more complex story have MORE points of failure than a simple one?",o:["Complex stories take longer to tell","Complex stories require more preparation","More details = more things to remember under pressure, more chance of contradiction, harder to adapt when target goes off-script","Complex stories confuse the target"],a:2,e:"KISS principle: complex stories collapse under pressure. You must remember every detail consistently while simultaneously reading the target's reactions. Simple story = lower cognitive load = more attention to the target."},
{ch:"Ch6",s:"8 Strategies",q:"The 'Don't Get Caught' strategy requires having what prepared BEFORE starting any SE attack?",o:["A backup identity document","A recorded phone conversation","A graceful exit line — so you can walk away without suspicion if the target becomes cautious","A second attacker on standby"],a:2,e:"Exit strategy: 'I'll come back with the authorization form,' 'My colleague is handling this — I'll have them call you directly.' These lines allow a clean exit with no suspicion raised. Never push against a suspicious target."},
{ch:"Ch6",s:"8 Strategies",q:"The 'Don't Lie' strategy prefers incomplete truths because:",o:["Lies are illegal but incomplete truths are not","Incomplete truths require no memorization — just omission. The target's assumptions fill the gaps. Direct lies are easy to contradict.","Incomplete truths are more convincing psychologically","The attacker prefers not to be dishonest"],a:1,e:"Direct lie: 'I'm from Microsoft support.' — Easy to verify and contradict. Incomplete truth: 'I work with systems like yours regularly.' — Technically true. The target assumes you're authorized. No lie to remember or contradict."},
{ch:"Ch6",s:"8 Strategies",q:"'Be Congruent' means ALL of the following must match EXCEPT:",o:["Clothes match claimed role","Car in parking lot matches company level","Technical knowledge matches impersonated role","The attacker's real name matches the fake ID"],a:3,e:"Congruency: everything must be consistent with the story — clothes, technical vocabulary, tone, documents, body language. The attacker uses a FAKE name/ID — their real name doesn't matter. The fake identity must be fully consistent internally."},
{ch:"Ch6",s:"8 Tactics",q:"The 'Like Likes Like' tactic (Tactic 1) works by:",o:["Pretending to like the target's interests","Mirroring the target's clothing style, speech patterns, pace, and vocabulary to build rapid rapport","Liking the target's social media posts before the attack","Using the target's first name frequently"],a:1,e:"Similarity principle: people are naturally more comfortable with those who seem similar to them. Mirroring clothing style, speech pace, vocabulary, and cultural references creates a subconscious sense of familiarity and trust rapidly."},
{ch:"Ch6",s:"8 Tactics",q:"How should an attacker approach a 'Worker Bee' personality type?",o:["Build a long friendship before making a request","Use authority and fear tactics","Get straight to the point — be efficient, make your request feel like a task they can tick off their list","Use sympathy and ask for help"],a:2,e:"Worker Bee: task-focused, head down, wants to finish their work. Don't waste their time. Be brief and efficient. Frame your request as something that will HELP them complete their work faster. They want tasks off their list."},
{ch:"Ch6",s:"8 Tactics",q:"The 'Name Dropping' tactic (Tactic 6) is effective because:",o:["Famous names are always trusted","Using real names of the target's manager or colleagues signals insider status and borrowed authority — only someone legitimate would know these names","It makes the target feel important","Names make the conversation more personal"],a:1,e:"Name dropping: 'David Chen from IT Security asked me to check this before the audit on Thursday.' Real manager names gathered from LinkedIn or directory harvesting signal insider status. The target thinks: 'Only someone authorized would know David's name.'"},
{ch:"Ch6",s:"8 Tactics",q:"The 'Tell Me What I Know' tactic (Tactic 4) builds trust by:",o:["Pretending to know everything about the target","Revealing private information the target knows but thought only insiders would have — demonstrating insider knowledge","Listing the target's publicly available information","Asking questions about the target's work"],a:1,e:"Revealing internal information (project names, team issues, upcoming events) that only an insider should know creates massive trust. 'I know you're running the quarterly audit next week' — the target thinks only a legitimate insider could know this."},
{ch:"Ch6",s:"8 Tactics",q:"Urgency as a psychological trigger works because:",o:["Urgent requests are always legitimate","Urgency creates time pressure that bypasses rational decision-making and causes people to skip verification steps","Urgency signals technical problems that only the attacker can fix","People respond faster to urgent requests online"],a:1,e:"Urgency: 'This has to be resolved in 10 minutes or the server goes down.' Time pressure forces rushed decisions. Humans in a hurry skip the verification steps they would normally take. This is why scams always say 'Act NOW!'"},
{ch:"Ch6",s:"8 Tactics",q:"Using Anger/Threats as a pressure tactic works by:",o:["Threatening legal action against the target","Creating fear of consequences — target complies to avoid conflict and confrontation","Making the target feel guilty","Overwhelming the target with technical information"],a:1,e:"Anger/Threats: 'Do you know who I'm reporting to?' Creates fear of negative professional consequences. Target complies to avoid conflict. Must be used sparingly — over-aggression raises suspicion. Best when combined with authority impersonation."},
{ch:"Ch6",s:"SE Methods",q:"Which spear-phishing method is hardest for a target to scrutinize?",o:["Email","SMS/SMiShing","Physical walk-in — combines appearance, confidence, name-dropping, and legitimacy triggers simultaneously","Social media message"],a:2,e:"Walk-in: combines ALL tactics simultaneously — appearance (uniform), confidence (body language), name-dropping (knows manager's name), legitimacy triggers (business card, badge). The target cannot 'hover over a link' to verify — they must decide in real time."},
{ch:"Ch6",s:"SE Methods",q:"Snail mail (physical letters) works as a spear-phishing method because:",o:["Physical mail cannot be filtered by spam systems","Physical mail is legally protected from inspection","People assume physical mail with company letterhead is legitimate — physical = trustworthy assumption","Physical mail reaches more people"],a:2,e:"Physical mail exploits the assumption that physical = official. A sealed, printed letter with company letterhead is rarely questioned. Used for: USB drive delivery ('IT asset upgrade enclosed'), fake audit notifications, 'prize' notifications."},
{ch:"Ch6",s:"SE Goals",q:"Installing a backdoor is the PREFERRED APT goal because:",o:["Backdoors are undetectable by all tools","Backdoors survive reboots and provide repeated access — even if credentials change, the attacker can still return","Backdoors are easy to install","Backdoors spread automatically to other systems"],a:1,e:"Backdoor: persistent access that survives reboots (via registry keys or scheduled tasks). Even if the victim changes their password, the backdoor still works. This enables long-term silent access — the core APT objective."},
{ch:"Ch6",s:"Pretext Development",q:"The 'Fallback Position' in a well-built pretext is:",o:["A second attacker ready to help","A false identity document","A graceful exit line explaining why the target cannot easily verify the attacker's identity","A backup technical exploit"],a:2,e:"Fallback: answers the question 'How does your story explain why the target can't verify you?' Example: 'I'll come back after you've confirmed with Sarah — but she's in the Chicago meeting all day.' This blocks verification while maintaining legitimacy."},
{ch:"Ch6",s:"Phishing Website",q:"Why is showing HTTPS and a padlock icon NOT proof a website is legitimate?",o:["HTTPS only works on official websites","Anyone can obtain a free TLS certificate — HTTPS means the connection is encrypted, NOT that the website is legitimate","HTTPS websites are verified by governments","Padlock icons cannot be copied by attackers"],a:1,e:"Critical misconception: HTTPS only means the connection between browser and server is encrypted — it says nothing about who owns the server. Attackers get free Let's Encrypt certificates for their phishing domains — victims see padlock and trust it."},
{ch:"Ch6",s:"Phishing Website",q:"After capturing credentials from a phishing website, the attacker redirects the victim to the real site. Why?",o:["To be polite to the victim","So the victim thinks it was a login timeout or error — they try logging into the real site and everything works normally, never suspecting anything was wrong","To avoid leaving evidence","To make the phishing site load faster"],a:1,e:"Seamless redirect: victim submits credentials → attacker captures them → immediately redirects to real login page. Victim thinks 'oh, it timed out' → logs into real site normally → has no idea credentials were stolen. Days pass before they discover."},
{ch:"Ch6",s:"Client-Side Exploit",q:"A file format exploit works by:",o:["Changing the file extension to trick the OS","Creating a file that triggers a vulnerability in the application when it PARSES the file — malicious code runs without the user knowing","Encrypting the file to bypass antivirus","Making the file too large for antivirus to scan"],a:1,e:"File format exploit: exploits a CVE in how a specific application parses a file format. The file looks normal (same icon, same extension). When parsed, the vulnerability triggers, shellcode executes silently. User sees a brief error or nothing."},
{ch:"Ch6",s:"Client-Side Exploit",q:"Which defense is MOST effective against client-side exploits via Office documents?",o:["Blocking all email","Disabling macros by default and deploying EDR","Using only Gmail","Requiring HTTPS everywhere"],a:1,e:"Defense against Office-based exploits: 1) Disable macros by default (users must explicitly enable). 2) Deploy EDR to detect suspicious process spawning from Office apps. 3) Keep Office patched. 4) Application whitelisting."},
{ch:"Ch6",s:"Custom Trojan",q:"The phrase 'signature-based AV is like a wanted poster' means:",o:["AV only works in criminal investigations","AV can only detect malware it has seen before — custom malware has no poster, so it passes undetected","AV works like law enforcement","Wanted posters are used to find hackers"],a:1,e:"Signature-based AV: matches files against a database of known malware signatures. Custom malware is brand new and target-specific — it has no signature in any database yet. No poster = no match = not detected."},
{ch:"Ch6",s:"Custom Trojan",q:"Why is a Trojan bundled with pirated software especially effective?",o:["Pirated software is always infected","The victim chose to run the installer themselves — they bypass their own security instincts by actively installing the software","Pirated software disables antivirus","Pirated software runs with admin privileges"],a:1,e:"Pirated software delivery: the victim WANTS the software and CHOOSES to run it. They bypass their own skepticism. Even if antivirus warns, they may override it to get the cracked application. The victim is an unwitting accomplice."},
{ch:"Ch6",s:"Countermeasures",q:"Callback protocols protect against vishing by:",o:["Recording all phone calls","Requiring the caller to verify through a separate channel — call back on a KNOWN number, not one provided by the caller","Blocking all inbound calls","Using call screening software"],a:1,e:"Callback protocol: don't act on requests from inbound callers. Instead, hang up and call back using a number from your own records (official website, HR directory). This defeats impersonation — the real person at that number will deny making the call."},
{ch:"Ch6",s:"Countermeasures",q:"What makes MFA effective even when credentials are stolen through phishing?",o:["MFA makes passwords stronger","Even with correct credentials, attacker cannot complete the second factor (phone approval, hardware token) they don't possess","MFA encrypts the stolen password","MFA detects phishing websites automatically"],a:1,e:"MFA: attacker has the password but cannot complete the authentication without the second factor (phone, hardware token, biometric). Phishing captures credentials but cannot capture the hardware token or biometric. Stolen passwords become useless."},

// ══════ CH7 ══════
{ch:"Ch7",s:"Remote Recon",q:"What makes remote workers particularly vulnerable to wireless attacks?",o:["They work longer hours","They use personal devices, consumer-grade routers, and unsecured home/public WiFi — outside enterprise security perimeter","They have weaker passwords","They store more data locally"],a:1,e:"Remote workers: personal devices lack enterprise MDM, home routers lack enterprise security (no IDS, no DLP), public WiFi has no protection. They are beyond corporate perimeter controls — the attacker has direct access to their traffic."},
{ch:"Ch7",s:"Remote Recon",q:"How does an attacker profile a target's travel patterns for wireless attack planning?",o:["By hacking the airline's database","By analyzing social media posts, LinkedIn updates, conference registrations, and travel booking sites","By installing GPS tracking devices","By intercepting corporate travel emails"],a:1,e:"Social media/conference schedule analysis: 'Speaking at RSA Conference 2026 in San Francisco.' Attacker knows target will be in San Francisco at that hotel — sets up Evil Twin at the hotel WiFi. Location + timing = attack window."},
{ch:"Ch7",s:"Wireless Phases",q:"In Phase 2 (Attack Access Points), which attack targets WPS's design flaw?",o:["WEP IV collection attack","WPA handshake capture","Reaver WPS PIN attack — exploits the fact that the 8-digit PIN is verified in two halves reducing combinations to ~11,000","Evil Twin AP attack"],a:2,e:"WPS PIN attack (Reaver): the 8-digit WPS PIN is verified in two halves. This reduces maximum guesses from 10^8 (100 million) to ~11,000. Tool: Reaver. Can crack WPS in hours. Disabled by default on modern routers."},
{ch:"Ch7",s:"Wireless Phases",q:"Why is Phase 3 (Attack Wireless Clients) often more effective than Phase 2 (Attack Access Points)?",o:["Phase 3 uses faster hardware","Phase 3 is illegal so attackers prefer it","Users are the weakest link — easier to exploit than hardened WPA2 infrastructure","Phase 3 requires less equipment"],a:2,e:"Modern WPA2 with strong passphrase is computationally infeasible to crack in reasonable time. But users automatically connect to strongest signal matching a known SSID — making Evil Twin attacks highly effective regardless of encryption strength."},
{ch:"Ch7",s:"Wireless Tools",q:"What does Airodump-ng capture?",o:["HTTPS traffic","Raw 802.11 frames — used for WEP/WPA cracking and client enumeration","Voice over IP calls","Bluetooth communications"],a:1,e:"Airodump-ng (part of Aircrack-ng suite): captures raw 802.11 frames from the air. Collects: BSSID, SSID, channel, encryption type, connected clients (with MACs). Used to capture WEP IVs or WPA handshakes for offline cracking."},
{ch:"Ch7",s:"Wireless Tools",q:"What is Airgeddon used for?",o:["Passive network monitoring","Automated Evil Twin framework — handles AP creation, deauthentication, captive portals, and credential capture in one tool","WPS PIN brute forcing only","Bluetooth attacks"],a:1,e:"Airgeddon: automated Evil Twin attack framework. Integrates: rogue AP creation, deauth attack, captive portal setup, and credential capture. Automates what would otherwise require multiple separate tools configured manually."},
{ch:"Ch7",s:"Wireless Tools",q:"A high-gain directional (Yagi) antenna is used in wireless attacks to:",o:["Improve home WiFi coverage","Block legitimate AP signals","Extend attack range to hundreds of meters — attack from a car, adjacent building, or parking lot without physical entry","Encrypt wireless communications"],a:2,e:"Directional antenna: focuses radio energy in one direction with high gain. Allows wireless attacks from hundreds of meters away — from a car in the parking lot or an adjacent building. No physical entry required."},
{ch:"Ch7",s:"Wireless Recon",q:"A BSSID is the:",o:["Network password","Network name (SSID) in binary format","Unique MAC address of an access point — used to fingerprint vendor and firmware version","IP address of the router"],a:2,e:"BSSID (Basic Service Set Identifier): the MAC address of the access point hardware. Format: XX:XX:XX:XX:XX:XX. First 3 bytes = OUI (manufacturer identifier). Attackers use BSSID to identify AP vendor and look up known firmware vulnerabilities."},
{ch:"Ch7",s:"Wireless Recon",q:"Client devices reveal hidden SSIDs through:",o:["Sending admin requests to the hidden AP","Probe Requests — devices automatically broadcast names of networks they've previously connected to, even when those networks have hidden SSIDs","Analyzing the 802.11 beacon frame content","Checking the router's broadcast settings"],a:1,e:"Probe Requests: clients constantly broadcast 'Are you there, NetworkName?' for every network in their saved list. An attacker in monitor mode captures these and learns the hidden SSID — then can create an Evil Twin with the correct name."},
{ch:"Ch7",s:"Wireless Recon",q:"What information from wireless reconnaissance determines which attack to use in Phase 2?",o:["The AP's serial number","The Encryption type (WEP/WPA-PSK/WPA-Enterprise/Open) — each requires a different attack approach","The AP's MAC address","The number of connected clients"],a:1,e:"Encryption determines attack path: WEP → IV collection + aircrack, WPA-PSK → handshake capture + offline dictionary, WPA-Enterprise → Evil Twin with fake RADIUS, Open → direct MitM with no cracking required."},
{ch:"Ch7",s:"Active Attacks",q:"WEP cracking typically requires collecting how many IVs?",o:["100-500","1,000-5,000","40,000-85,000","1,000,000+"],a:2,e:"WEP cracking: needs 40,000-85,000 IVs (Initialization Vectors) for statistical analysis. In a busy network, these can be collected in minutes. In a quiet network, attackers inject ARP packets to speed up IV generation. Tool: aircrack-ng."},
{ch:"Ch7",s:"Active Attacks",q:"WPA/WPA2 brute force works by:",o:["Trying all possible passwords in real-time against the router","Capturing the 4-way EAPOL handshake and cracking it OFFLINE using GPU-accelerated tools like hashcat","Exploiting a WPA protocol bug","Sending deauth packets until the router reveals the key"],a:1,e:"WPA cracking: capture 4-way EAPOL handshake (by waiting or forcing reconnection via deauth). Run offline dictionary/brute force attack with hashcat (GPU acceleration tests millions of passwords per second). Router never sees the attack."},
{ch:"Ch7",s:"Active Attacks",q:"Vendor vulnerabilities in access points include all EXCEPT:",o:["Weak default passwords","Predictable WPS PINs derived from MAC address","WPA3 encryption being obsolete","Known CVEs in outdated firmware"],a:2,e:"Vendor vulnerabilities: weak default passwords, predictable WPS PINs derived from MAC OUI, known CVEs in outdated firmware, debug interfaces left open. WPA3 is NOT obsolete — it's the current strongest standard."},
{ch:"Ch7",s:"Evil Twin",q:"An Evil Twin AP needs to match which property of the legitimate AP to be most effective?",o:["IP address","SSID (and optionally BSSID/MAC address) — devices connect to familiar network names automatically","Router model number","DNS server address"],a:1,e:"Evil Twin: must match SSID exactly. Optionally clone BSSID (MAC spoofing) for stricter clients. The 802.11 standard allows clients to have multiple APs with the same SSID — they connect to the strongest signal. No authentication of AP identity."},
{ch:"Ch7",s:"Evil Twin",q:"In the APT28 'Nearest Neighbor Attack,' how was physical proximity overcome?",o:["They used satellite communications","They compromised nearby businesses' WiFi first, then daisy-chained through dual-homed devices to reach the target's wireless network","They used a drone with a wireless adapter","They paid an insider to set up the Evil Twin"],a:1,e:"APT28 Nearest Neighbor Attack: breached nearby companies' WiFi → found devices connected to BOTH the neighboring WiFi AND the target's enterprise WiFi → used these dual-homed devices as stepping stones to reach target's network. No physical proximity needed."},
{ch:"Ch7",s:"Getting Clients",q:"Signal Enticement works automatically because:",o:["Users prefer to connect to stronger networks manually","The 802.11 protocol automatically connects clients to the access point with the strongest signal matching a known SSID — no user action required","Users trust stronger signals as more secure","Strong signals indicate newer routers"],a:1,e:"802.11 roaming: clients automatically prefer strongest signal. Attacker broadcasts higher power than legitimate AP → all nearby devices silently roam to Evil Twin without user doing anything. Users may not notice — connection just 'improves.'"},
{ch:"Ch7",s:"Getting Clients",q:"Fake open WiFi networks ('Free Airport WiFi') are effective because:",o:["Airports have weak security","Users in public spaces expect open networks and connect without caution — especially when they appear familiar","Open networks are technically superior","Airports cannot block rogue APs"],a:1,e:"Social context: in airports, hotels, cafes, people EXPECT free open WiFi and connect without scrutinizing the network name. Familiar names ('Starbucks WiFi', 'Hotel Guest') lower suspicion further. No password required = no verification step."},
{ch:"Ch7",s:"Getting Clients",q:"A Captive Portal attack on a rogue AP captures credentials by:",o:["Intercepting HTTPS traffic","Presenting a convincing fake login page after connection — victims enter real credentials thinking it's the hotel portal or corporate SSO","Brute forcing the victim's password","Intercepting the WPA handshake"],a:1,e:"Captive Portal: after connecting, victim's browser is redirected to a fake login page (hotel portal clone, corporate SSO clone). Victim enters real credentials → immediately captured. Works especially well with corporate BYOD devices conditioned to SSO portals."},

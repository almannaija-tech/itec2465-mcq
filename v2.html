<!DOCTYPE html>
<html>
<head>
<style>
body{background:#0f0f1a;color:#e0e0e0;font-family:Arial;display:flex;justify-content:center;padding:2rem}
.card{background:#1a1a2e;border-radius:10px;padding:1.5rem;max-width:500px;width:100%}
.q{font-weight:bold;margin-bottom:1rem}
.opt{padding:.6rem 1rem;margin:.4rem 0;border-radius:7px;border:1px solid #2a2a4a;background:#12122a;cursor:pointer;display:block;width:100%}
.opt:hover{border-color:#4a4aaa}
.opt.correct{border-color:#2ecc71;background:#0d2e1a;color:#2ecc71}
.opt.wrong{border-color:#e63946;background:#2e0d0d;color:#e63946}
.exp{margin-top:1rem;padding:.7rem;background:#0a0a20;border-left:3px solid #e63946;display:none;font-size:.85rem}
.exp.show{display:block}
</style>
</head>
<body>
<div class="card">
  <div class="q">1 + 1 = ?</div>
  <button class="opt" onclick="answer(this,false)">A) 1</button>
  <button class="opt" onclick="answer(this,true)">B) 2</button>
  <button class="opt" onclick="answer(this,false)">C) 4</button>
  <button class="opt" onclick="answer(this,false)">D) -2</button>
  <div class="exp" id="exp">The answer is 2. 1+1=2.</div>
</div>
<script>
function answer(el,correct){
  document.querySelectorAll('.opt').forEach(o=>o.disabled=true);
  el.classList.add(correct?'correct':'wrong');
  if(!correct){document.querySelectorAll('.opt').forEach(o=>{if(o.onclick.toString().includes('true'))o.classList.add('correct')});}
  document.getElementById('exp').classList.add('show');
}
</script>
</body>
</html>

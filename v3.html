{ch:"Ch6",s:"SE Foundation",q:"Why is spear phishing significantly more dangerous than generic phishing?",o:["Spear phishing uses more sophisticated malware than generic phishing","Spear phishing is sent to larger numbers of targets simultaneously","Spear phishing uses real intelligence (manager names, current projects, email formats) making it nearly indistinguishable from legitimate communication","Spear phishing bypasses email filters while generic phishing does not"],a:2,e:"Personalization: generic phishing 'Dear Customer' → easy to dismiss. Spear phishing 'Hi Sarah, James from Finance asked me to forward this Q3 report for your review' using real names from Ch5 recon. Victim has no reason to question it — context matches reality."},
{ch:"Ch6",s:"SE Foundation",q:"Nonverbal communication signals that a social engineer must control include all EXCEPT:",o:["Eye contact level and direction when making requests","Body posture and orientation toward the target","The font size used in fake business email communications","Vocal tone, pace, and confidence during phone interactions"],a:2,e:"Font size is a written/digital element — not nonverbal communication. Nonverbal: eye contact (looking away = insecurity), posture (slouching = lack of authority), vocal tone (hesitation = nervousness), pace (too fast = rehearsed, too slow = uncertain). Control all simultaneously."},
{ch:"Ch6",s:"8 Strategies",q:"The Assumptions strategy works most effectively when the attacker:",o:["Contradicts the target's existing beliefs to create cognitive dissonance","Designs the attack persona to match what the target expects an authorized person to look like","Directly challenges the target's verification procedures","Creates completely new beliefs in the target's mind from scratch"],a:1,e:"Assumptions strategy: identify what the target expects and BE that. Target expects IT auditors to have business casual dress, a clipboard, and know technical terminology → attacker matches those expectations exactly. The target's own brain validates the legitimacy."},
{ch:"Ch6",s:"8 Strategies",q:"'Do What Works for You' (Strategy 2) requires the attacker to honestly assess their:",o:["The target organization's security policies and procedures","Their own physical appearance, social confidence, technical knowledge, and acting ability under pressure","The number of employees in the target organization","The specific technical vulnerabilities in the target's systems"],a:1,e:"Self-assessment: physically imposing? Use authority approach. Good phone voice and confident? Vishing works. Tech-savvy? Impersonate IT convincingly. Shy in person? Email/SMS attacks. Attacks leveraging genuine strengths outperform forcing yourself into uncomfortable roles."},
{ch:"Ch6",s:"8 Strategies",q:"A well-prepared social engineering attack includes 'Verification Blockers' in the story. What is this?",o:["Electronic devices that block the target from making verification phone calls","Fake credentials that prevent security tools from flagging the attack","Story elements that explain why the target cannot easily verify the attacker's identity without disrupting the attack","Malware that disables the target's email communication during the attack"],a:2,e:"Verification blocker example: 'You can confirm with Sarah Chen but she's traveling in Chicago all week for the merger meetings.' This blocks verification while sounding completely legitimate. Attacker used real name from recon and real business context (merger from SEC filings)."},
{ch:"Ch6",s:"8 Strategies",q:"The KISS strategy is especially critical during unplanned interactions because:",o:["Simple stories are approved by management before deployment","Complex stories require expensive supporting documentation","When the target goes off-script, simple stories are easier to adapt on the fly without contradicting yourself","Simple stories take less time reducing the window of detection"],a:2,e:"Improvisation: complex story with 20 details → target asks question that contradicts detail #7 → attacker must remember all 20 details AND construct a consistent answer under pressure. Simple story: one or two key facts to maintain. Much easier to pivot and adapt."},
{ch:"Ch6",s:"8 Strategies",q:"The 'Don't Get Caught' strategy advises walking away from a suspicious target rather than pushing harder because:",o:["Pushing harder always triggers security alarms in the building","Walking away prevents the attacker from wasting time on resistant targets","Pushing against suspicion confirms the target's doubts — graceful retreat preserves future attempts and avoids exposure","The attacker should never make more than one attempt per target"],a:2,e:"Tactical retreat: pushing against a suspicious person signals desperation and confirms their doubts. Graceful exit: 'No problem, I'll come back when [manager] is available.' Target relaxes — no incident reported. Attacker returns later or targets a different person."},
{ch:"Ch6",s:"8 Strategies",q:"Incomplete truth in social engineering means the attacker:",o:["Provides only 50% of the information the target needs to make a decision","Intentionally omits key context allowing the target's assumptions to complete the picture favorably","Lies about half the facts while being truthful about the other half","Uses technical jargon the target cannot fully understand"],a:1,e:"Incomplete truth: 'I work with enterprise security systems regularly — we see this configuration issue frequently.' OMITTED: the attacker doesn't work FOR the company. Target ASSUMES they're an authorized security consultant. Assumption fills the gap. No lie told."},
{ch:"Ch6",s:"8 Strategies",q:"Congruency failure occurs when a social engineer's story contradicts their:",o:["Target's actual name and contact information","Appearance, knowledge level, documentation, or behavior — any inconsistency triggers suspicion","Technical understanding of the target's specific software systems","Knowledge of the target's organizational hierarchy"],a:1,e:"Congruency check: impersonating IT auditor but wearing a t-shirt and sandals → incongruent. Using IT terminology incorrectly → incongruent. Business card says 'Senior Auditor' but driving a beat-up 1990 car → incongruent. Any inconsistency gives the target's subconscious a warning signal."},
{ch:"Ch6",s:"8 Tactics",q:"The 'Like Likes Like' tactic involves mirroring the target's communication style because:",o:["Matching style confuses the target making them more compliant","People are subconsciously more comfortable with and trusting of people who seem similar to themselves","Mirroring prevents the target from concentrating on verification","Similar communication style bypasses security training"],a:1,e:"Similarity principle: subconscious trust mechanism. Attacker observes target (formal vocabulary, slow pace, conservative dress) → mirrors those traits → target feels inexplicable comfort and rapport. Mirroring done subtly feels like genuine connection."},
{ch:"Ch6",s:"8 Tactics",q:"A 'Suspicious' personality type is best handled by:",o:["Applying maximum authority and urgency pressure to overwhelm their resistance","Engaging in extended friendly conversation to overcome their natural distrust","Using extra legitimacy triggers, having documentation ready, or targeting a different more cooperative person","Pretending to leave then returning with a different pretext"],a:2,e:"Suspicious personality: questioning everything signals strong security awareness. Pushing back validates their suspicion. Better: deploy maximum legitimacy triggers (real business card, official envelope, knowing insider details) OR abort and find a more cooperative target."},
{ch:"Ch6",s:"8 Tactics",q:"'Tell Me What I Know' (Tactic 4) is effective because:",o:["Repeating information the target knows proves the attacker has a good memory","Revealing private information the target knows but thinks is secret proves insider status — only authorized people should know this","Asking the target what they know about the company creates confusion","Demonstrating knowledge of public information builds credibility"],a:1,e:"Private info revelation: 'I understand you're running the access log audit before next week's compliance review.' Target thinks: 'How does this person know about the audit? Management briefed them. They must be authorized.' The confidential detail = instant credibility."},
{ch:"Ch6",s:"8 Tactics",q:"'Name Dropping' is most effective when the attacker drops the name of:",o:["Famous cybersecurity researchers the target has heard of","Senior executives who the target has never personally met","The target's direct manager or a trusted close colleague — someone the target knows personally","External vendors the company works with regularly"],a:2,e:"Effective name drops: use names the target knows personally and trusts. 'Ahmed asked me to...' (direct manager) or 'I was just meeting with Fatima from your team...' (known colleague). Names from LinkedIn/directory. Stranger's name = no trust transfer. Known person = instant credibility."},
{ch:"Ch6",s:"8 Tactics",q:"The Urgency pressure tactic is especially effective against non-technical users because:",o:["Non-technical users are more financially motivated to comply quickly","Urgency triggers a stress response that causes people to rely on habitual compliance rather than careful analysis","Non-technical users have been specifically trained not to ask verification questions","Technical users are immune to urgency while non-technical users are not"],a:1,e:"Urgency + stress: 'The server will go down in 10 minutes!' creates cognitive overload. Stressed brain shortcuts to habitual compliance ('just do what the technical person says'). Bypasses the careful thinking that verification requires. Works across all employee types but especially effective on those who defer to technical authority."},
{ch:"Ch6",s:"8 Tactics",q:"The Authority psychological trigger works differently from Urgency because:",o:["Authority only works on managers while Urgency works on all employees","Authority creates time pressure; Urgency creates fear of consequences","Authority exploits deference to perceived power; Urgency exploits time pressure to bypass verification","They are functionally identical triggers with different names"],a:2,e:"Authority: human tendency to defer to perceived power figures without questioning. 'I'm calling from IT Security Director's office...' Target complies to avoid conflict with higher authority. Urgency: time pressure prevents careful thinking. Often combined: authority figure + urgent request = double pressure."},
{ch:"Ch6",s:"SE Methods",q:"Vishing (voice phishing) has which advantage over email phishing?",o:["Voice calls bypass all email security gateways and spam filters","Attackers can use voice changers making detection impossible","Real-time conversation means the target cannot hover over links or fact-check — attacker adapts to responses instantly","Phone calls are legally protected and cannot be traced or recorded"],a:2,e:"Vishing advantage: real-time. Attacker hears victim's hesitation → immediately provides reassurance. Email = victim can close tab and think. Phone = continuous pressure, no pause to verify, cannot 'hover' to check sender's real identity. Must make decisions in real-time."},
{ch:"Ch6",s:"SE Methods",q:"Physical walk-in social engineering combines which elements simultaneously?",o:["Email, SMS, and voice communication in a coordinated multi-channel attack","All SE strategies and tactics at once — appearance, confidence, legitimacy triggers, name-dropping, personality adaptation","Only verbal communication and written documentation","Technical exploitation and social manipulation in equal parts"],a:1,e:"Walk-in: fullest SE deployment. Appearance (uniform = legitimacy trigger), confidence (body language = congruency), name-dropping (insider knowledge), adapting to whoever answers (personality type), KISS story, exit plan ready. All 8 strategies and 8 tactics deployed simultaneously."},
{ch:"Ch6",s:"SE Methods",q:"Sending a USB drive in physical mail labeled as a 'software update from IT' is effective because:",o:["USB drives cannot be scanned by antivirus until they are plugged in","Physical mail bypasses all email security scanning completely","The legitimacy of physical mail + official labeling + authority reference ('from IT') creates a perfect combination of trust triggers","USB drives are always trusted by Windows without security prompts"],a:2,e:"Physical mail trust: sealed envelope from 'IT Department' with familiar logo → physical = official assumption. USB labeled 'VPN Client v3.2 - Install Required' → urgency + authority. Many employees plug it in. Bypasses email security entirely — USB attacks arrive outside all digital defenses."},
{ch:"Ch6",s:"SE Goals",q:"Credential theft through a phishing website is preferred by APT groups for initial access because:",o:["Phishing websites are faster to build than custom malware","Credential theft gives attacker access as a LEGITIMATE USER — bypassing perimeter security and blending with normal traffic","Stolen credentials can be sold on dark web for financial gain","Phishing websites are undetectable by all security monitoring tools"],a:1,e:"Legitimate access: attacker with real credentials = normal authenticated user. No malware signatures, no exploit shellcode, no anomalous process. Just 'user logs in from VPN with correct password.' Extremely hard to detect. This is why credential theft is the #1 APT initial access method."},
{ch:"Ch6",s:"SE Goals",q:"Installing a backdoor is the preferred APT persistence goal because:",o:["Backdoors are completely invisible to all EDR systems","Once installed, backdoors automatically exfiltrate all data without manual operation","Backdoors survive credential changes and reboots — attacker can return repeatedly even if initial access vector is closed","Backdoors spread automatically to other systems creating multiple access points"],a:2,e:"Backdoor persistence: victim changes password → attacker still has backdoor access. IT re-images one machine → backdoor already copied to others. Credentials expire → backdoor still active. Multiple persistence mechanisms = redundant return paths. Core APT goal: long-term quiet access."},
{ch:"Ch6",s:"Phishing Website",q:"Registering 'company-secure-login.com' instead of 'company.com' exploits which vulnerability?",o:["A DNS vulnerability allowing domain hijacking","A browser vulnerability that misreads domain names","The human tendency to scan domain names quickly rather than verifying character by character","An SSL certificate verification weakness in browsers"],a:2,e:"Visual similarity attack: humans read URLs quickly, especially under urgency. 'company-secure-login.com' looks 'official' to a stressed employee. Unicode lookalike attacks: 'compаny.com' uses Cyrillic 'а' vs Latin 'a' — looks identical but is a different domain."},
{ch:"Ch6",s:"Phishing Website",q:"After victim submits credentials, redirecting them to the real website serves which attacker purpose?",o:["The redirect deletes the phishing website to prevent forensic analysis","The redirect gives the attacker time to change the victim's password","The victim believes it was a login error — has no indication of compromise — meaning they may not report the incident for days","The redirect automatically logs the victim into the real system using their stolen credentials"],a:2,e:"Silent compromise: victim → phishing page → submits creds → auto-redirect to real site. Victim sees normal login page → enters creds again → logs in successfully → thinks nothing happened. Attacker uses stolen credentials in parallel. Victim discovers breach days later (if ever)."},
{ch:"Ch6",s:"Phishing Website",q:"The back-end of a phishing website captures all EXCEPT which data point?",o:["Username and password entered in the login form","One-time passwords or MFA codes if victim enters them","The victim's browser type, IP address, and login timestamp","The victim's other account passwords stored in their browser's password manager"],a:3,e:"Browser password manager: not submitted to the form → not captured by backend. Phishing backend captures what the FORM sends: credentials entered, OTP if requested, security question answers. Browser-stored passwords for OTHER sites are not automatically transmitted."},
{ch:"Ch6",s:"Client-Side Exploit",q:"A client-side exploit specifically targets software vulnerabilities on the victim's computer rather than the server because:",o:["Server-side vulnerabilities are always fully patched in large organizations","Client software is always more vulnerable than server software","The client machine is inside the corporate network — compromise gives attacker internal network access and credentials","Client-side exploits are legal while server-side exploits are not"],a:2,e:"Client-side advantage: server → external internet. Client → INSIDE the network. Compromising a client gives: internal network access, domain credentials, access to file shares, ability to pivot to other internal systems. The client is the inside bridge."},
{ch:"Ch6",s:"Client-Side Exploit",q:"A file format exploit works even when the document file extension appears completely normal because:",o:["The attack is embedded in the file's encryption making it invisible","Antivirus tools do not scan documents — only executables","The malicious payload is in the document's parsing logic — legitimate-looking file contains malformed data that triggers a vulnerability when the application parses it","Document files are automatically trusted by operating systems"],a:2,e:"File format exploit: attacker crafts file that appears normal (correct extension, normal icon, opens in correct app) but contains malformed data structures. When the application parses the malformed section, buffer overflow or memory corruption occurs → shellcode executes → victim sees error or nothing."},
{ch:"Ch6",s:"Custom Trojan",q:"What specific characteristic makes a CUSTOM Trojan more dangerous than commodity RATs purchased on dark web?",o:["Custom Trojans are always larger making them harder to detect","Custom Trojans are written in programming languages antivirus cannot scan","No signature exists — custom code written for one target has never been seen by any AV vendor's research team","Custom Trojans automatically update themselves when signatures are created"],a:2,e:"Freshness = invisibility: AV vendors analyze malware samples to create signatures. Custom code written this week for this target has never been submitted to any AV vendor. Zero-day status: pristine, unknown, undetected. Until it's discovered and submitted, every AV shows 'clean.'"},
{ch:"Ch6",s:"Custom Trojan",q:"Bundling a Trojan with pirated software is effective because the victim:",o:["Pirated software websites are not monitored by cybersecurity companies","Antivirus software cannot scan pirated software downloads","The victim's desire for free software overrides security caution — they actively install and may override AV warnings","Pirated software always requires disabling antivirus to install correctly"],a:2,e:"Social engineering via greed: victim wants free software badly enough to: download from untrusted source, override AV warning ('it's a false positive'), run installer with admin rights. The victim's own desire becomes the attack vector. No phishing needed — they come to the malware."},
{ch:"Ch6",s:"Custom Trojan",q:"Network pivoting enabled by a custom Trojan backdoor means:",o:["The Trojan automatically moves from computer to computer across the network","The attacker uses the compromised machine as a relay point to attack other internal systems not directly accessible from the internet","The Trojan creates a hidden network tunnel for faster data exfiltration","The Trojan duplicates itself to multiple machines simultaneously"],a:1,e:"Pivoting: victim PC is inside the network → attacker uses it as a jumping point → attack internal servers unreachable from internet. From victim's PC: scan internal network (from trusted IP), access file shares (authenticated as victim), attack internal web apps. External becomes internal."},
{ch:"Ch6",s:"Custom Trojan",q:"File sharing services (Dropbox, Google Drive) are used for Trojan delivery because:",o:["These platforms have no malware scanning capability","Corporate firewalls cannot block access to cloud storage services","Corporate firewalls often whitelist cloud storage services — malware hosted there bypasses email gateway scanning","Cloud storage platforms automatically encrypt uploaded files hiding the malware"],a:2,e:"Cloud whitelist bypass: security teams whitelist Dropbox.com and drive.google.com in firewalls (employees need them). Attacker hosts Trojan on Dropbox → shares link in spear phishing email → victim clicks → downloads from trusted cloud platform → email gateway sees legitimate cloud domain → passes through."},
{ch:"Ch6",s:"Countermeasures",q:"Phishing simulation programs train employees most effectively when:",o:["Employees who fail are publicly identified and disciplined to create deterrence","Only the security team knows about the simulation keeping it realistic","Failed employees receive immediate just-in-time training with no blame or punishment","Simulations use the same template every time building consistent recognition"],a:2,e:"Effective simulation: immediate feedback when employee clicks → explanation of what the indicators were → what they should have done. No blame = employees report mistakes quickly (crucial for fast incident response). Punishment = employees hide mistakes = delayed response = more damage."},
{ch:"Ch6",s:"Countermeasures",q:"Out-of-band verification when receiving an unusual request means:",o:["Verifying the request using a different employee's account","Checking the request against written security policies before complying","Calling back using a number from your own verified records — NOT the number provided by the caller","Escalating the request to management before taking any action"],a:2,e:"Out-of-band: attacker calls, gives their number as callback. Victim calls that number → attacker answers → attack continues. Defense: hang up → find the REAL phone number (company directory, official website) → call that number → real employee either confirms or denies ever making the call."},
{ch:"Ch6",s:"Countermeasures",q:"Strict access controls using the Principle of Least Privilege limit the damage from a successful social engineering attack because:",o:["Attackers who gain access find the target has insufficient permissions to steal anything","Least privilege makes systems run faster preventing attackers from operating efficiently","Even if an attacker gains a compromised employee's credentials, they inherit only that employee's limited permissions","Least privilege automatically detects and blocks social engineering attempts"],a:2,e:"Blast radius limitation: attacker gains receptionist credentials → receptionist has: appointment scheduling, visitor log access. NOT: financial systems, HR records, server access. Least privilege contains the damage to whatever that specific account can access. Limits what can be stolen even with valid credentials."},
{ch:"Ch6",s:"Targets",q:"Finance staff are specifically targeted for Business Email Compromise (BEC) attacks because:",o:["Finance staff have the weakest security awareness training","Finance systems have the most outdated and vulnerable software","Finance staff have authority to authorize wire transfers — one successful BEC = potentially millions transferred to attacker","Finance departments always use personal email for work making phishing easier"],a:2,e:"BEC against Finance: attacker impersonates CEO → emails CFO 'urgent wire transfer needed for merger, confidential, transfer $500K today.' CFO complies → money gone. FBI reports BEC has cost organizations over $50 billion globally. Finance + authority + urgency = maximum financial impact."},

// ══ CH7 (52+14Scenario) ══
{ch:"Ch7",s:"Remote Recon",q:"Why are remote workers specifically targeted for wireless attacks rather than on-site employees?",o:["Remote workers have higher privileges than on-site employees","Remote workers are less technically skilled making them easier to fool","Remote workers use personal devices and unsecured networks outside corporate perimeter protection","Remote workers are more motivated by financial incentives to cooperate"],a:2,e:"Remote worker exposure: home WiFi (consumer router, no IDS), personal device (no MDM, no EDR), public WiFi (coffee shop, airport). All outside corporate perimeter. Security team cannot see their traffic, cannot enforce policies, cannot monitor for attacks in real-time."},
{ch:"Ch7",s:"Remote Recon",q:"Policy Analysis during remote presence reconnaissance involves studying:",o:["The target's personal social media privacy settings","The attacker's legal exposure when conducting wireless attacks","The organization's VPN requirements, BYOD rules, and remote access policies — to find gaps exploitable from outside","The target employee's medical and insurance policies"],a:2,e:"Policy analysis: VPN policy says 'VPN required for accessing internal systems' BUT 'employees may use personal devices for email without VPN.' Gap found: target checks email on personal device without VPN → email traffic is unprotected → Evil Twin captures email credentials."},
{ch:"Ch7",s:"Wireless Phases",q:"Phase 1 (Wireless Reconnaissance) must be completed before Phase 2 (Attack APs) because:",o:["Legal requirements mandate reconnaissance before any active testing","Phase 2 tools require reconnaissance data to function correctly","You need to know what networks exist, their encryption types, and connected clients before choosing which attack to use","Phase 1 takes much longer than Phase 2 so it must start first"],a:2,e:"Recon first: knowing encryption (WEP/WPA/WPA2/Enterprise) determines which Phase 2 attack is applicable. WEP → IV attack. WPA-PSK → handshake capture. WPA-Enterprise → Evil Twin with fake RADIUS. No recon = no information for attack selection."},
{ch:"Ch7",s:"Wireless Tools",q:"Why does wireless attack hardware require an EXTERNAL wireless adapter instead of the built-in laptop WiFi?",o:["External adapters have stronger encryption than built-in adapters","Built-in adapters use proprietary drivers that antivirus tools monitor","External adapters support Monitor Mode (passive capture) and Packet Injection (active attacks) — built-in laptop adapters do not support these modes","External adapters have longer range than built-in adapters in all cases"],a:2,e:"Monitor Mode: listen to ALL wireless traffic regardless of destination — not just traffic addressed to your device. Built-in adapters only receive traffic addressed to them. Packet Injection: transmit arbitrary frames (deauth, fake APs). Built-in adapters cannot inject arbitrary frames. Both capabilities are essential for wireless attacks."},
{ch:"Ch7",s:"Wireless Tools",q:"Kismet operates in passive mode which means it:",o:["Passively decrypts WPA traffic without transmitting probe packets","Never transmits any wireless signals — only receives and analyzes existing transmissions","Only monitors traffic on channels it is configured to watch","Requires the attacker to be within 10 meters of the target access point"],a:1,e:"Passive monitoring: Kismet switches adapter to monitor mode, cycles through channels, captures all wireless frames. Completely silent — no beacons, no probes, no association requests. Standard wireless IDS cannot detect passive-mode Kismet because it never transmits. Ideal for covert reconnaissance."},
{ch:"Ch7",s:"Wireless Tools",q:"Airgeddon automates which multi-step wireless attack process?",o:["WPS PIN brute forcing against all nearby access points simultaneously","The complete Evil Twin attack chain: AP creation, deauthentication, captive portal, credential capture — all from one interface","Full wireless network forensic analysis and evidence collection","Simultaneous WEP cracking against multiple target networks"],a:1,e:"Airgeddon automation: menu-driven interface handles: select target AP → clone AP → configure captive portal → send deauth → monitor for connections → display captured credentials. Automates what would require 6+ separate tools configured manually. Lowers skill barrier significantly."},
{ch:"Ch7",s:"Wireless Tools",q:"EAPHammer specifically targets which wireless security configuration?",o:["WEP networks using initialization vector weaknesses","WPA-PSK networks through 4-way handshake capture","WPA2-Enterprise 802.1X networks by impersonating the RADIUS authentication server","Open networks requiring no authentication at all"],a:2,e:"EAPHammer target: WPA2-Enterprise. Creates evil twin with identical SSID + fake RADIUS server (hostapd-wpe based). When enterprise clients reconnect, EAPHammer captures: cleartext credentials (GTC method) or MSCHAPv2 hashes (PEAP method). Specifically designed for enterprise wireless compromise."},
{ch:"Ch7",s:"Wireless Recon",q:"During wireless reconnaissance, client probe requests reveal which information?",o:["The client device's encryption keys and passwords","The RADIUS server configuration for WPA-Enterprise networks","The SSIDs of networks the device has previously connected to — including hidden networks","The client's web browsing history and DNS queries"],a:2,e:"Probe requests: client devices constantly broadcast 'Is [NetworkName] here?' for all saved networks. In public, your phone might probe for 'Home_WiFi', 'Work_Network', 'Hotel_London_Guest', 'Starbucks' — revealing travel history and which networks to clone for Evil Twin."},
{ch:"Ch7",s:"Wireless Recon",q:"BSSID information collected during reconnaissance is used to:",o:["Determine the network's encryption passphrase length","Identify the access point vendor for firmware vulnerability research and for cloning the AP's MAC address in an Evil Twin","Map the physical location of all connected client devices","Calculate the network's maximum data throughput capacity"],a:1,e:"BSSID (MAC of AP): First 3 bytes = OUI → manufacturer (00:50:F2 = Microsoft, 00:1A:2B = some vendor). Look up vendor → research their firmware CVEs. Also: clone BSSID in Evil Twin to make it more convincing to strict clients that validate MAC address."},
{ch:"Ch7",s:"Active Attacks",q:"WEP cracking does not require the network password to be guessed because:",o:["WEP has a backdoor installed by regulators for law enforcement access","WEP uses the same key for all packets making brute force trivial","WEP's RC4 implementation with predictable IVs allows mathematical key recovery from captured traffic — no guessing required","WEP passwords are transmitted in plaintext during authentication"],a:2,e:"WEP mathematical weakness: RC4 stream cipher with predictable IVs creates statistical patterns. With enough IVs (40,000-85,000), statistical analysis recovers the key directly — not by guessing but by mathematical computation. Takes minutes regardless of password complexity."},
{ch:"Ch7",s:"Active Attacks",q:"WPA2-PSK offline cracking is performed after capturing the handshake because:",o:["Online cracking would lock the target out of their own network","Offline cracking allows use of GPU acceleration testing millions of passwords per second without router involvement","The handshake contains the password in an easily extracted format","WPA2 routers automatically provide the password after 3 incorrect attempts"],a:1,e:"Offline cracking advantage: capture 4-way EAPOL handshake (router never sees the cracking). Run hashcat on GPU cluster: RTX 4090 tests ~400,000 passwords/second for WPA2. Cloud cracking services test billions. Password 'password123' cracked in seconds. Strong random 20+ char passphrase = computationally infeasible."},
{ch:"Ch7",s:"Active Attacks",q:"The WPS PIN design flaw reduces the keyspace from 100,000,000 to approximately 11,000 because:",o:["WPS removes digits from the PIN making it shorter","WPS transmits half the PIN before full authentication allowing separate brute force of each half","The WPS PIN is verified in two halves independently (4+3 digits with 1 checksum) creating two smaller independent problems","WPS reuses the same PIN for every connection attempt"],a:1,e:"WPS verification: router checks first 4 digits (10,000 possibilities) → if correct, checks next 3 digits (1,000 possibilities) + 1 checksum digit. Effectively: 10,000 + 1,000 = ~11,000 total guesses maximum. Reaver exploits this: brute forces each half independently. Tool reduced 100 million → 11,000."},
{ch:"Ch7",s:"Evil Twin",q:"The 802.11 standard's roaming behavior makes Evil Twin attacks inherently effective because:",o:["802.11 encrypts management frames preventing detection of fake APs","Devices authenticate access points using digital certificates by default","802.11 clients automatically connect to the strongest signal with a known SSID — no AP authentication mechanism validates AP legitimacy","802.11 requires manual user approval before connecting to any new network"],a:2,e:"802.11 design flaw: no AP authentication. Client authenticates to network (password) but AP doesn't prove it's legitimate. Any device can broadcast any SSID. Strongest signal wins. WPA3 with Protected Management Frames and 802.1X with certificate validation partially address this, but most networks remain vulnerable."},
{ch:"Ch7",s:"Evil Twin",q:"Cloning the BSSID (MAC address) of the legitimate AP makes the Evil Twin more convincing because:",o:["Identical MAC addresses prevent the legitimate AP from operating in the area","Corporate security tools cannot detect two APs with the same MAC address","Strict client configurations that validate MAC addresses cannot distinguish the fake from the real AP","Identical MAC addresses increase the signal strength of the Evil Twin"],a:2,e:"BSSID cloning: some enterprise clients check BSSID consistency. If your Evil Twin has a different MAC than the legitimate AP, they may reject it. Clone the BSSID → client sees familiar SSID AND familiar MAC → no mismatch → connects without warning. Tools: airbase-ng -a [real BSSID]."},
{ch:"Ch7",s:"Getting Clients",q:"Deauthentication attacks exploit which 802.11 management frame vulnerability?",o:["Management frames are transmitted on a different channel than data frames","WPA2 encryption does not apply to management frames — deauth frames can be forged by anyone","Deauth frames contain the network password in cleartext","Management frames require admin authentication before they are processed"],a:1,e:"Unprotected management frames: 802.11 deauthentication frames are NOT encrypted and NOT authenticated in WPA2. Any device can send a forged deauth frame claiming to be the legitimate AP. Client accepts it, disconnects, reconnects to strongest available signal (Evil Twin). WPA3 with PMF addresses this partially."},
{ch:"Ch7",s:"Getting Clients",q:"Open network Evil Twins ('Free Airport WiFi') are particularly effective in airports because:",o:["Airport security prevents legitimate WiFi from operating","Airport travelers are always using VPNs reducing their caution about networks","Travelers expect free open WiFi in airports and connect quickly without verifying the network — security urgency is lower when away from corporate oversight","Airport networks never use any encryption making attacks easier"],a:2,e:"Social context exploitation: travelers in airports are: stressed (running late), tired, need internet urgently. Familiar network name = immediate connection without thought. Away from IT department supervision = less cautious. Public expectation of open networks = no suspicion. Perfect attack environment."},
{ch:"Ch7",s:"Getting Clients",q:"A captive portal on an Evil Twin captures credentials when:",o:["The attacker breaks HTTPS encryption on the portal connection","Corporate VPN software automatically submits credentials to any available network","After connecting, the victim's browser is redirected to a fake login page where they enter real credentials believing it's the hotel or corporate portal","The captive portal captures credentials from the victim's browser's autofill feature"],a:2,e:"Captive portal flow: device connects to Evil Twin → DNS spoofed so ALL domains resolve to attacker IP → browser opens ANY page → redirected to convincing fake portal (hotel, corporate SSO, WiFi terms) → victim enters real username/password → credentials captured → real internet provided after → victim unaware."},
{ch:"Ch7",s:"WPA Enterprise",q:"Why does WPA-Enterprise's per-user credential model paradoxically create a new attack surface?",o:["Per-user credentials are weaker than shared passphrases","RADIUS servers are always misconfigured in real deployments","Clients must authenticate to the RADIUS server — if a fake RADIUS server is substituted, client credentials flow to the attacker instead","Per-user credentials require more complex password policies that employees resist"],a:2,e:"Client authentication paradox: WPA-Enterprise's strength (unique per-user credentials) becomes its attack surface. Authentication requires client → RADIUS. Attacker substitutes fake RADIUS. Client authenticates to attacker's server. Strength of RADIUS is irrelevant if client connects to wrong server."},
{ch:"Ch7",s:"WPA Enterprise",q:"Which EAP method provides attackers with immediate plaintext credential access when used with a fake RADIUS server?",o:["EAP-TLS which uses certificate-based authentication","PEAP-MSCHAPv2 which uses hashed credentials requiring offline cracking","EAP-GTC (Generic Token Card) which transmits credentials in plaintext to the RADIUS server","EAP-TTLS which wraps credentials in an encrypted tunnel"],a:2,e:"GTC direct credential access: GTC sends password directly to RADIUS server in cleartext (relies on tunnel encryption for security). Attacker's fake RADIUS receives plaintext password immediately — no cracking needed. Perfect for immediate VPN or email access using captured credentials."},
{ch:"Ch7",s:"WPA Enterprise",q:"Android devices are specifically vulnerable to WPA-Enterprise Evil Twin attacks because:",o:["Android devices use weaker encryption than iOS devices","Android's kernel has known vulnerabilities in WiFi driver implementation","Android's WPA-Enterprise implementation often does not warn users about invalid certificates — devices connect silently","Android devices broadcast their credentials during initial WPA-Enterprise setup"],a:2,e:"Android certificate blindness: iOS and Windows show prominent warnings for invalid certificates. Android's default behavior (varies by version) often connects silently or with minimal warning that users dismiss. This behavioral difference makes Android devices significantly more vulnerable to WPA-Enterprise Evil Twins."},
{ch:"Ch7",s:"AP Components",q:"Controlling the DNS server assigned via DHCP gives the attacker complete control over:",o:["The encryption keys used for all HTTPS connections","The routing of all network traffic through specific internet paths","All domain name resolution — any website the victim visits can be silently redirected to attacker-controlled pages","The victim's authentication tokens and session cookies directly"],a:2,e:"DNS control = web control: victim types bank.com → DNS query goes to attacker's DNS → attacker returns their own IP → victim gets fake bank page → enters credentials. Every website, every service, every domain. Victim cannot detect this without checking actual DNS server configuration."},
{ch:"Ch7",s:"AP Components",q:"The HTTP server on a rogue AP enables all EXCEPT which capability?",o:["Serving fake captive portal pages to capture WiFi or corporate login credentials","Delivering malware through fake software update download prompts","Breaking WPA2 encryption keys to capture pre-connection authentication data","Injecting malicious JavaScript into unencrypted HTTP pages passing through the proxy"],a:2,e:"HTTP server capabilities: serve fake portals, deliver malware, inject JS into HTTP content. It CANNOT break WPA2 encryption — that requires the handshake and offline cracking (aircrack-ng/hashcat). WPA2 encrypted traffic from the AP itself is separate from HTTP traffic served by the fake server."},
{ch:"Ch7",s:"AP Components",q:"Auth Services component on a rogue AP specifically intercepts which credential type?",o:["Local Windows account credentials stored on victim laptops","Wireless pre-shared keys from connecting client devices","RADIUS, SSO, captive portal, and certificate-based authentication credentials","Browser-saved passwords from Chrome and Firefox installations"],a:2,e:"Auth Services: fake RADIUS (hostapd-wpe) captures WPA-Enterprise credentials, fake captive portal captures WiFi portal credentials, fake SSO intercepts SAML/OAuth tokens. Browser-saved passwords are not transmitted to the network unless the user actively submits them in a form."},
{ch:"Ch7",s:"Commands",q:"IP forwarding must be enabled before victims connect to the Evil Twin because:",o:["IP forwarding initializes the wireless adapter in attack mode","Without IP forwarding enabled first, subsequent commands fail to execute","Without IP forwarding, victim traffic is dropped by Linux — no internet = devices immediately disconnect or refuse to connect","IP forwarding assigns IP addresses to connecting devices"],a:2,e:"Timing matters: device connects → tries internet → if forwarding off → packets dropped → 'No Internet' shown → device may auto-disconnect or user manually disconnects. Enable forwarding FIRST so internet works immediately on connection → victim stays connected → attacker captures all traffic."},
{ch:"Ch7",s:"Commands",q:"The DHCP configuration file (/etc/dhcp3.conf) defines which parameters for victims?",o:["The victim's WPA2 passphrase and encryption keys","The victim's username and password for network authentication","IP address range to assign, subnet mask, default gateway, and DNS server (pointing to attacker)","The victim's MAC address whitelist for network access"],a:2,e:"DHCP config: defines the network information given to every connecting client: IP pool (192.168.1.10-200), subnet (255.255.255.0), default gateway (192.168.1.1 = attacker's IP), DNS server (192.168.1.1 = attacker's DNS). Client gets configured automatically — routes all traffic through attacker."},
{ch:"Ch7",s:"Commands",q:"The dns.hosts file used with dnsspoof contains entries in which format?",o:["IP address → domain → TTL value in DNS record format","Domain name → encryption key → redirect destination","Attacker's IP address mapped to target domain names — any queried domain returns attacker's IP","Domain names with wildcard entries blocking resolution of security sites"],a:2,e:"dns.hosts format: '10.0.0.1 *.com' (all .com domains → attacker) or '10.0.0.1 bank.com' (specific). When victim queries bank.com → dnsspoof intercepts → returns 10.0.0.1 → victim reaches attacker's fake bank page. Configure specific high-value domains or wildcard all domains."},
{ch:"Ch7",s:"Commands",q:"The DNAT iptables rule redirects ALL TCP traffic. Which protocol is notably NOT covered by this TCP rule?",o:["HTTP web traffic on port 80","HTTPS web traffic on port 443","UDP-based DNS traffic on port 53","FTP file transfer on port 21"],a:2,e:"Protocol gap: iptables -p tcp only redirects TCP traffic. DNS uses UDP port 53 — NOT covered by the TCP DNAT rule. DNS spoofing is handled separately by dnsspoof (which handles UDP/DNS). Two separate tools for two different protocols: iptables for TCP, dnsspoof for UDP/DNS."},
{ch:"Ch7",s:"Commands",q:"tcpdump saves to PCAP format specifically because:",o:["PCAP format compresses captured data reducing storage requirements","PCAP is encrypted protecting captured credentials from discovery","PCAP is the standard packet capture format readable by Wireshark for deep protocol analysis and credential extraction","PCAP format is required for legal evidence admissibility in court"],a:2,e:"PCAP (Packet Capture): universal format for raw network frames. Wireshark opens PCAP → filter 'http.request.method == POST' → see all form submissions → extract credentials. Filter 'ftp' → see FTP credentials in plaintext. All major network analysis tools support PCAP format."},
{ch:"Ch7",s:"Commands",q:"'msfconsole -r servers.rc' deploys fake servers using Metasploit auxiliary modules. What does the '-r' flag specify?",o:["The RADIUS server configuration for WPA-Enterprise attacks","A resource script file containing commands to automatically execute — loads all fake server modules at once","The rogue AP interface name for server binding","The rate limit for capturing credentials from clients"],a:1,e:"Resource script: -r flag loads a file containing Metasploit commands to execute automatically. servers.rc contains: 'use auxiliary/server/capture/smtp', 'set SRVHOST 10.0.0.1', 'run', then same for FTP, SSH, RDP, MySQL, etc. One command → all fake servers start simultaneously."},
{ch:"Ch7",s:"Fake Servers",q:"An attacker's fake FTP server captures credentials when:",o:["Employees try to access the company's file server from home and the DNS resolution is spoofed to the fake server","FTP automatically transmits all local file names to any connected FTP server","The fake FTP server brute forces the victim's FTP password from captured traffic","FTP is deprecated so this never actually captures credentials"],a:0,e:"FTP capture: victim on rogue AP tries to access company FTP server (DNS spoofed to attacker IP) → authenticates to fake FTP server → username + password captured in plaintext. FTP sends credentials unencrypted by design. Metasploit auxiliary/server/capture/ftp handles this automatically."},
{ch:"Ch7",s:"Fake Servers",q:"SSLstrip attack on a rogue AP works against websites that:",o:["Use HTTPS exclusively and never served HTTP at any point","Implement HSTS (HTTP Strict Transport Security) headers preventing downgrade","Initially serve content over HTTP and redirect to HTTPS — SSLstrip intercepts the redirect before HTTPS loads","Use certificate pinning validating the server's specific certificate fingerprint"],a:2,e:"SSLstrip targets HTTP→HTTPS redirect: victim requests http://bank.com → server sends 302 redirect to https://bank.com → SSLstrip intercepts redirect → serves victim HTTP version → victim never gets HTTPS → attacker reads plaintext. HSTS and certificate pinning defeat SSLstrip."},
{ch:"Ch7",s:"Fake Servers",q:"A fake SMTP server captures email credentials. What additional data beyond username/password may be captured?",o:["The victim's browser history and locally stored passwords","The encrypted TLS keys used for other secure connections","Email content of messages the victim attempts to send through the rogue SMTP server","The victim's Active Directory group memberships"],a:2,e:"SMTP interception: fake SMTP server = full email proxy. Capture: login credentials, email recipients, email subject and body, attachments. Intelligence from intercepted emails: business relationships, ongoing deals, sensitive information sent to partners, internal communications."},
{ch:"Ch7",s:"Scenario: Coffee Shop",q:"An attacker profiles a remote employee who works from a coffee shop every Tuesday. The shop uses WPA2-PSK. Which attack is fastest and most effective?",o:["Crack WPA2-PSK using aircrack-ng and a wordlist","Deploy Evil Twin with same SSID, send deauth frames, intercept all traffic when victim reconnects","Wait for the victim to leave their laptop unattended","Install a keylogger on the coffee shop router"],a:1,e:"WPA2 cracking can take days with a strong password. Evil Twin is immediate — clone SSID, stronger signal, deauth victim, they auto-reconnect to your AP. No cracking needed."},
{ch:"Ch7",s:"Scenario: Coffee Shop",q:"After the victim connects to the Evil Twin, they have no internet and immediately disconnect. What is the most likely cause?",o:["The Evil Twin SSID is spelled incorrectly","The deauth attack is still running","IP forwarding was not enabled — Linux drops victim packets so they have no internet connection","The DHCP server assigned a wrong IP"],a:2,e:"echo 1 > /proc/sys/net/ipv4/ip_forward must be run BEFORE victims connect. Without it Linux drops all forwarded packets — victims get an IP but cannot reach internet and disconnect immediately."},
{ch:"Ch7",s:"Scenario: Coffee Shop",q:"The victim is now connected to the Evil Twin with full internet. The attacker wants to capture their email and banking credentials. What is the correct sequence?",o:["iptables → dnsspoof → tcpdump → msfconsole","dhcpd3 → ip_forward → iptables → dnsspoof → tcpdump → msfconsole","ip_forward → dhcpd3 → dnsspoof → iptables DNAT → tcpdump → msfconsole","msfconsole → tcpdump → ip_forward → dhcpd3"],a:2,e:"Correct order: 1) ip_forward (route traffic), 2) dhcpd3 (assign IPs/DNS), 3) dnsspoof (redirect domains), 4) iptables DNAT (redirect all ports), 5) tcpdump (capture raw packets), 6) msfconsole (fake servers for credential extraction)."},
{ch:"Ch7",s:"Scenario: Coffee Shop",q:"The attacker captures the victim's bank login but the site uses HTTPS. How does the attacker read the credentials in plaintext?",o:["HTTPS cannot be intercepted under any circumstance","The attacker uses SSLstrip to downgrade HTTPS to HTTP — victim's browser uses HTTP while attacker connects to real bank via HTTPS","The attacker brute forces the SSL certificate","The attacker installs a root certificate on the victim's device remotely"],a:1,e:"SSLstrip intercepts the HTTPS redirect and serves plain HTTP to the victim instead. Victim's credentials travel in cleartext to the attacker's proxy. The attacker forwards them to the real bank over HTTPS. Victim may not notice the missing S."},
{ch:"Ch7",s:"Scenario: WPA-Enterprise",q:"A company uses WPA2-Enterprise with RADIUS. An attacker parked outside cannot crack RADIUS directly. What is the correct attack path?",o:["Brute force the RADIUS server password over the network","Create Evil Twin with fake RADIUS server, send deauth frames, capture EAP credentials when clients reconnect","Jam all WiFi signals until employees call IT and reveal credentials","Use aircrack-ng to capture and crack the WPA-Enterprise handshake"],a:1,e:"RADIUS cannot be directly attacked. Target the CLIENT side: 1) Clone SSID, 2) Configure fake RADIUS (hostapd-wpe), 3) Deauth clients, 4) Clients reconnect to Evil Twin, 5) Fake RADIUS captures GTC plaintext or MSCHAPv2 hash."},
{ch:"Ch7",s:"Scenario: WPA-Enterprise",q:"A client connects to the Evil Twin and uses EAP-GTC. What does the attacker capture and what do they do with it?",o:["An encrypted hash that must be cracked with hashcat over several days","The plaintext password immediately — no cracking required, use directly for VPN or email access","Only the username — GTC does not transmit passwords","A session token that expires after 30 minutes"],a:1,e:"GTC (Generic Token Card) transmits the password to the RADIUS server in plaintext inside the EAP tunnel. Fake RADIUS sees it immediately in cleartext. No cracking needed — attacker uses credentials directly for VPN, email, or internal systems."},
{ch:"Ch7",s:"Scenario: WPA-Enterprise",q:"The attacker captures MSCHAPv2 hashes instead of GTC plaintext. What is the next step?",o:["Discard — MSCHAPv2 cannot be cracked","Use the hash directly as a Pass-the-Hash token on internal systems","Crack offline with hashcat using GPU acceleration and a wordlist, then use recovered plaintext credentials","Wait for the victim to reconnect and try again with GTC"],a:2,e:"MSCHAPv2 hashes are crackable offline with hashcat. GPU acceleration tests millions of passwords per second. Common passwords crack in minutes to hours. Cloud hashcat services available for harder passwords. Recovered plaintext used for VPN/email."},
{ch:"Ch7",s:"Scenario: Conference Rogue AP",q:"At a cybersecurity conference, an attacker wants to harvest credentials from ALL attendees at once. What hardware setup maximizes coverage?",o:["A standard laptop with built-in WiFi card","A laptop with an Alfa external adapter and a high-gain directional antenna for extended range across the conference hall","A smartphone running Kali NetHunter","A Raspberry Pi with internal WiFi only"],a:1,e:"Alfa adapter: supports monitor mode and packet injection (built-in WiFi cannot). High-gain directional antenna extends range across large spaces. Together they cover an entire conference hall from one position without moving."},
{ch:"Ch7",s:"Scenario: Conference Rogue AP",q:"The attacker broadcasts 'Conference_FreeWiFi' as an open network. Many attendees connect. Which command assigns them valid IP addresses and routes their DNS through the attacker?",o:["iptables -t nat -A PREROUTING -p tcp --dport 80 -j DNAT","dhcpd3 -cf /etc/dhcp3.conf at0 — assigns IP, gateway, and attacker's DNS server to all connecting victims","dnsspoof -i at0 -f dns.hosts — this handles both IP assignment and DNS","airbase-ng -e 'Conference_FreeWiFi' at0"],a:1,e:"dhcpd3 assigns: IP address, subnet mask, default gateway, AND the DNS server address. By specifying attacker's IP as DNS server, all victim domain lookups go to attacker's dnsspoof — enabling full DNS spoofing across all connected devices."},
{ch:"Ch7",s:"Scenario: Conference Rogue AP",q:"An attendee connects and opens their corporate email in a browser. The site is HTTPS. The attacker also wants to capture credentials from their FTP client and SSH session running simultaneously. What single command deploys all necessary fake servers?",o:["apache2ctl start — handles all protocols","dnsspoof -i at0 -f dns.hosts — intercepts all traffic","msfconsole -r servers.rc — launches all fake protocol servers simultaneously (SMTP, FTP, SSH, RDP, HTTP)","tcpdump -i at0 -w capture.pcap — captures everything needed"],a:2,e:"msfconsole -r servers.rc: resource script launches all Metasploit auxiliary fake server modules at once. Fake SMTP, FTP, SSH, RDP, MySQL, HTTP servers all running simultaneously. Each captures credentials for that protocol transparently."},
{ch:"Ch7",s:"Scenario: Remote Worker",q:"An attacker discovers via LinkedIn that a CFO works from home on Fridays using personal WiFi. The home router uses WPA2-PSK with a strong 20-character random password. What is the most practical attack?",o:["Crack WPA2 with hashcat — 20 characters is still crackable","Drive to the CFO's neighborhood and deploy Evil Twin targeting the CFO's device specifically using deauth and BSSID cloning","Send a phishing email instead — wireless attack is impractical here","Use EAPHammer to attack the home network's RADIUS server"],a:1,e:"20-character random WPA2 = computationally infeasible to crack. Evil Twin with BSSID cloning: clone exact MAC of home router, stronger signal, deauth CFO's device, it reconnects to Evil Twin. Combined with Ch6 spear phishing to direct CFO to fake VPN login."},
{ch:"Ch7",s:"Scenario: Remote Worker",q:"The attacker successfully intercepts the remote CFO's traffic. The CFO connects to the corporate VPN. What does the attacker capture and how?",o:["VPN traffic is always fully encrypted — nothing can be captured","The VPN connection establishment reveals the VPN server address only","If VPN uses certificate-based auth, nothing useful. If password-based, fake servers capture VPN username and password before the VPN tunnel is established","The attacker can decrypt VPN traffic using the captured session key"],a:2,e:"Timing matters: credentials are entered BEFORE the VPN tunnel is established. Fake HTTP server serves a clone of the VPN login portal. CFO enters username/password → captured. VPN tunnel itself is encrypted — but the pre-tunnel credential entry is vulnerable."},
{ch:"Ch7",s:"Scenario: Deauth Attack",q:"An attacker sends deauthentication frames to disconnect clients from a legitimate AP. Why can't the AP or client detect these as fake?",o:["Deauth frames are encrypted so they cannot be inspected","The 802.11 standard has no authentication for management frames — any device can send deauth frames and they will be accepted","The AP trusts all frames from the same frequency channel","Deauth frames use a special trusted MAC address"],a:1,e:"802.11 management frames (including deauth) are NOT authenticated in WPA2. Any device can forge a deauth frame with the AP's BSSID as source. Client receives it, thinks AP is requesting disconnection, disconnects. This is a fundamental 802.11 protocol weakness."},
{ch:"Ch7",s:"Scenario: Full Attack Chain",q:"An attacker completes a full wireless attack. Which sequence correctly represents the COMPLETE attack chain from start to finish?",o:["Deauth → Evil Twin → DHCP → Crack WPA → Capture","Wireless Recon (Kismet/airodump) → Evil Twin deploy → Deauth → Victim connects → ip_forward + DHCP + DNS + iptables → Fake servers → Credential capture","ip_forward → Deauth → DHCP → Evil Twin → Capture → Recon","Crack WPA → Deploy AP → Deauth → Capture → Recon"],a:1,e:"Complete chain: 1) Recon (Kismet/airodump — identify targets), 2) Deploy Evil Twin (clone SSID), 3) Deauth (force disconnection), 4) Victim connects, 5) Infrastructure (ip_forward, DHCP, DNS, iptables), 6) Fake servers (msfconsole), 7) Capture (tcpdump), 8) Extract credentials."},  

// ══ CH8 (42) ══
{ch:"Ch8",s:"Hardware SE",q:"Hardware-based social engineering bypasses software security because:",o:["Hardware attacks are too sophisticated for antivirus software to understand","Hardware attacks occur too quickly for security tools to respond","Antivirus and endpoint security tools monitor software behavior — physical hardware modifications are invisible to software-based security","Hardware attacks always come from trusted supply chain sources that security tools whitelist"],a:2,e:"Software blind spot: AV, EDR, IDS monitor software processes, network traffic, file behavior. A modified keyboard logging keystrokes or a USB device injecting commands is transparent to software. The hardware operates at a level below what software security can observe."},
{ch:"Ch8",s:"Hardware SE",q:"The three main categories of hardware-based social engineering attacks are:",o:["Email, wireless, and physical access attacks","Malicious USB devices, hardware Trojans, and trojanized IT equipment","Keyloggers, screen recorders, and network sniffers","Supply chain, insider threats, and nation-state attacks"],a:1,e:"Hardware SE categories: 1) Malicious USB (Rubber Ducky, Teensy, infected drives). 2) Hardware Trojans (modified chips, keyboards, supply chain implants). 3) Trojanized IT equipment (delivered devices with hidden spy hardware). All exploit physical trust assumptions."},
{ch:"Ch8",s:"Hardware SE",q:"The evolution from email phishing to hardware phishing represents an escalation because:",o:["Hardware phishing is always more expensive to defend against than email phishing","Email filtering has become so effective that hardware delivery is now the only effective method","Hardware phishing enables full system compromise that bypasses all email security completely — the attack arrives physically","Hardware phishing is legally permitted in more jurisdictions than email phishing"],a:2,e:"Escalation: email phishing risk = steal passwords. Hardware phishing risk = full system compromise (rootkit, backdoor, keylogger). Email security (sandboxing, URL filtering) has improved significantly. Hardware delivery bypasses ALL email security — no email gateway can scan a physical USB drive."},
{ch:"Ch8",s:"Hardware Trojans",q:"Hardware Trojans are described as operating 'in silence' because:",o:["They disable system speakers preventing audio alerts","They encrypt all communications making them invisible to network monitoring","The device functions completely normally — no performance impact, no error messages, no detectable behavioral change","They only activate when the computer is idle preventing detection during normal use"],a:2,e:"Silent operation: Hardware Trojan keyboard types normally. Hardware Trojan USB functions as storage. Hardware Trojan network chip routes traffic normally. WHILE ALSO: logging keystrokes, opening backdoors, creating covert channels. No software difference from legitimate device. Complete stealth."},
{ch:"Ch8",s:"Hardware Trojans",q:"Supply chain chip Trojans are the most difficult to detect because:",o:["They use military-grade encryption preventing analysis","They are installed by trusted government contractors who cannot be investigated","Detection requires specialized X-ray analysis or electron microscopy of physical chip architecture — not feasible for routine security checks","They automatically erase themselves when scanning tools are detected"],a:2,e:"Detection challenge: software analysis cannot find hardware-level modifications. Visual inspection won't reveal a modified silicon die. Proper detection: X-ray imaging of PCB, electron microscopy of chips, network traffic analysis looking for covert channels. Extremely resource-intensive — typically only nation-state level actors can do this."},
{ch:"Ch8",s:"USB Attacks",q:"The Rubber Ducky's effectiveness compared to a human typing the same commands is based on:",o:["Rubber Ducky uses a wireless connection making it faster","Rubber Ducky has higher RAM than standard keyboard controllers","Keystroke injection speed of 1,000+ keystrokes per second — malware installed before human reaction time can occur","Rubber Ducky bypasses keyboard input validation in Windows"],a:2,e:"Speed = success: human reaction time ~250ms. Rubber Ducky injects full attack sequence in ~3 seconds. Before user can: see what's happening → understand it → react → unplug device → the malware is already installed. Speed is the primary defensive challenge."},
{ch:"Ch8",s:"USB Attacks",q:"How does the OS misidentify Rubber Ducky as a legitimate input device?",o:["Rubber Ducky spoofs the device serial number of a known safe USB drive","It exploits a Windows vulnerability allowing any USB to claim administrator privileges","It presents itself as a HID (Human Interface Device) keyboard — OS trusts all HID keyboards without authentication","It uses a legitimate keyboard firmware that was legally purchased"],a:2,e:"HID trust: OS design assumes keyboards are safe. All HID keyboards get unconditional trust — direct input to running system. No security prompt. No driver verification. The OS cannot distinguish Rubber Ducky from a legitimate keyboard at the HID protocol level. This is by design — requiring keyboard authentication would break all keyboards."},
{ch:"Ch8",s:"Baiting",q:"Why is 'CONFIDENTIAL - HR_TERMINATIONS_2026.xlsx' a more effective baiting label than 'Software Update v2.1'?",o:["Confidential labels bypass USB security controls in corporate environments","Employees are required to open HR documents they find for compliance reasons","The label exploits both curiosity AND self-interest simultaneously — employees fear their name might be on the termination list","HR document labels bypass antivirus scanning on USB devices"],a:2,e:"Dual psychological exploitation: curiosity ('what does this list contain?') + self-preservation ('is MY name on this list?'). This combination is extremely powerful — the emotional stakes are high enough to override security training completely. The threat to self overrides rational security behavior."},
{ch:"Ch8",s:"Baiting",q:"Trojaned keyboards sent as 'new IT equipment upgrades' are effective because:",o:["IT equipment purchases are never verified against purchase orders","Employees test all new keyboards before using them","Employees plug in new office equipment without suspicion — it arrived through normal channels and looks completely legitimate","Keyboards cannot be scanned by network security tools"],a:2,e:"Trust exploitation: new equipment arrives → IT packaging → looks legitimate → functions normally → employee uses it. The social engineering is in the DELIVERY context. 'New keyboard from IT' triggers office supply trust assumption. The keyboard logs every keystroke including passwords."},
{ch:"Ch8",s:"Cryptography",q:"The four goals of cryptography address which security requirement not covered by the CIA Triad?",o:["Integrity — ensuring data is not modified","Availability — ensuring data is accessible when needed","Non-repudiation — ensuring a sender cannot deny having sent a message","Confidentiality — ensuring only authorized parties can read data"],a:2,e:"Non-repudiation: absent from CIA Triad. Digital signatures provide: the sender used their private key → only they have it → mathematically proves they signed it → they cannot later deny it. Critical for: legal documents, financial transactions, software publishing, email authentication (S/MIME)."},
{ch:"Ch8",s:"Cryptography",q:"The Caesar Cipher with shift +3 encrypts 'ATTACK' as:",o:["DWWDFN — each letter shifted forward by 3 positions","XQQXZH — each letter shifted backward by 3 positions","BGGBDL — each letter shifted forward by 2 positions","BSSAAI — vowels shifted, consonants unchanged"],a:0,e:"Caesar +3: A→D, T→W, T→W, A→D, C→F, K→N → DWWDFN. Simple substitution, easily broken by trying all 25 possible shifts or frequency analysis. Historical importance: Julius Caesar used it for military communications. Modern equivalent requires computational infeasibility, not just obscurity."},
{ch:"Ch8",s:"Cryptography",q:"Classical ciphers (Vigenère, Playfair) improved on Caesar by:",o:["Using computers for faster encryption and decryption processes","Requiring physical hardware devices to encrypt and decrypt messages","Using a keyword to create variable shifts — reducing frequency analysis vulnerability compared to simple substitution","Implementing public/private key pairs for secure key exchange"],a:2,e:"Vigenère improvement: Caesar has one fixed shift (easy frequency analysis). Vigenère uses a keyword (CRYPTO) — each plaintext letter gets a different shift based on keyword. 'A' in position 1 shifts by C(2), position 2 shifts by R(17). More complex frequency analysis required — still breakable but harder."},
{ch:"Ch8",s:"Cryptography",q:"AES (Advanced Encryption Standard) is classified as which type of encryption?",o:["Asymmetric encryption requiring public and private key pairs","Hashing algorithm producing fixed-length output that cannot be reversed","Symmetric encryption using one secret key for both encryption and decryption","Hybrid encryption combining multiple algorithm types simultaneously"],a:2,e:"AES = symmetric block cipher. Same key encrypts and decrypts. Very fast (hardware-accelerated in modern CPUs). Used for: WiFi (WPA2), full disk encryption (BitLocker), VPN data channels, file encryption. Key exchange problem (sharing the key) is solved by asymmetric RSA/ECDH during setup."},
{ch:"Ch8",s:"Cryptography",q:"Why is RSA used for key exchange rather than bulk data encryption?",o:["RSA produces larger ciphertext making storage inefficient","RSA is only approved for key exchange by NIST standards","RSA is computationally expensive — 100-1000x slower than AES — making bulk encryption impractical","RSA key sizes are too small for secure bulk data encryption"],a:2,e:"Performance asymmetry: RSA-2048 can encrypt ~245 bytes per operation. AES-256 encrypts gigabytes per second (hardware accelerated). Hybrid solution: RSA encrypts a random 256-bit AES session key (small data) → AES encrypts all actual data (fast). Best of both: RSA security + AES speed."},
{ch:"Ch8",s:"Cryptography",q:"Hashing passwords before storage (rather than encrypting them) is preferred because:",o:["Hashing is faster than encryption for large databases","Hashed passwords take less storage space than encrypted passwords","If the database is stolen, attackers cannot reverse hashes to get original passwords — encryption could be reversed if encryption key is also stolen","Hashing automatically salts passwords preventing rainbow table attacks"],a:2,e:"Hashing irreversibility advantage: encrypted passwords → steal DB + steal key → decrypt all passwords. Hashed passwords → steal DB → cannot reverse hashes. Attacker must crack each hash individually. Note: salting (adding random data before hashing) prevents rainbow table attacks. bcrypt/Argon2 are preferred over SHA-256 for passwords."},
{ch:"Ch8",s:"Cryptography",q:"HTTPS uses hybrid encryption in which order?",o:["AES first for key exchange, then RSA for data encryption","Both RSA and AES simultaneously in parallel for maximum security","RSA/ECDH to securely exchange a session key, then AES to encrypt all page data using that session key","SHA-256 to verify data integrity, then AES for confidentiality"],a:2,e:"TLS handshake: Browser → Server certificate (RSA public key). Browser generates random session key → encrypts with server's RSA public key → sends to server. Server decrypts with RSA private key → both have same AES session key. All subsequent HTTP data encrypted with AES. Fast + secure."},
{ch:"Ch8",s:"Cryptography",q:"Code signing in software distribution prevents which specific attack?",o:["Attackers intercepting software licenses and reselling them","Users downloading legitimate software from unofficial mirrors with modified names","Attackers modifying legitimate software to add malware after it was signed by the publisher — signature verification fails","Software companies claiming falsely that their code is proprietary"],a:2,e:"Code signing protection: publisher signs binary with private key → user's OS verifies with publisher's public key → any modification of binary after signing invalidates signature → OS warns user. Supply chain attack: if attacker modifies SolarWinds.exe AFTER signing → signature invalid. UNLESS they compromised the signing key (SolarWinds DID have their key compromised)."},
{ch:"Ch8",s:"Cryptography",q:"A brute force attack on AES-256 is considered computationally infeasible because:",o:["AES-256 uses a self-modifying key that changes every millisecond","Legal restrictions prevent the computational resources needed for brute force","2^256 possible keys would require more energy than the sun produces in its lifetime to test exhaustively","AES-256 automatically blocks IP addresses attempting brute force"],a:2,e:"AES-256 keyspace: 2^256 ≈ 1.16 × 10^77 keys. At 10^18 attempts/second (state-of-the-art): would take 3.67 × 10^51 years. Universe is ~1.38 × 10^10 years old. Quantum computers (Grover's algorithm) could reduce to 2^128 — still infeasible. AES-256 provides quantum-resistant security margins."},
{ch:"Ch8",s:"Authentication",q:"Hardware security keys (FIDO2/WebAuthn) are the strongest form of MFA because:",o:["They generate one-time passwords that expire in 30 seconds","They require biometric authentication in addition to the physical key","They use public key cryptography — the private key never leaves the device and cannot be phished because domain verification is built in","They are the only MFA method that works without an internet connection"],a:2,e:"FIDO2 advantage: private key never transmitted → cannot be stolen. Domain binding: key only responds to the exact registered domain → phishing sites get no response even if user clicks. Eliminates both credential theft AND phishing simultaneously. Google's internal deployment eliminated 100% of account compromises."},
{ch:"Ch8",s:"Authentication",q:"SMS-based 2FA is considered weaker than authenticator app 2FA because:",o:["SMS messages are shorter than authenticator app codes","SMS codes expire faster than authenticator app codes","SMS is vulnerable to SIM swapping attacks where attacker transfers victim's phone number to their own SIM","SMS codes are transmitted unencrypted allowing interception"],a:2,e:"SIM swapping: attacker social engineers mobile carrier ('I lost my phone, transfer number to this SIM') → carrier transfers victim's number → attacker receives all SMS including 2FA codes → bypasses 2FA. Authenticator app codes are generated locally on device → SIM swap doesn't help attacker."},
{ch:"Ch8",s:"Authentication",q:"Biometric authentication was first deployed by a major organization in which year?",o:["2001 — when fingerprint scanners became commercially available","1980 — military installations began using iris recognition","1924 — FBI first used fingerprint identification as an authentication system","1960 — when IBM first developed computer-based fingerprint analysis"],a:2,e:"FBI 1924: fingerprint-based biometric identification. The FBI Identification Division established 1924 using fingerprints for criminal identification. Modern digital biometrics (Apple Touch ID 2013, Face ID 2017) are digital implementations of this 100-year-old concept."},
{ch:"Ch8",s:"Access Control",q:"RBAC is most appropriate for organizations where:",o:["Every employee has unique data access requirements needing individual configuration","Access decisions must consider time of day and device location dynamically","Job roles are clearly defined and access needs are predictable by role — making role-based assignment scalable","Security classification labels (Top Secret, Confidential) are the primary access determinant"],a:2,e:"RBAC fit: 1000 employees → 20 defined roles → manage 20 permission sets (not 1000 individual profiles). Doctor role = EHR access. Nurse role = treatment records. Billing role = financial data. Receptionist role = scheduling only. Role-based scales easily — add employee, assign role, permissions follow."},
{ch:"Ch8",s:"Access Control",q:"MAC (Mandatory Access Control) is used in classified government environments because:",o:["Government systems have too many users for other access control models","MAC provides the fastest access decisions of any access control model","Users cannot override MAC decisions — the system enforces strict label-based rules preventing even high-level users from sharing classified data incorrectly","MAC is the only model compatible with government IT infrastructure standards"],a:2,e:"MAC enforcement: even a general cannot grant a private access to TOP SECRET files if private's clearance is CONFIDENTIAL. System enforces it regardless of human instruction. Prevents classified data leakage through well-intentioned but unauthorized sharing. Bell-LaPadula model: no read up, no write down."},
{ch:"Ch8",s:"Access Control",q:"ABAC's 'attribute-based' decisions can incorporate which conditions that RBAC cannot?",o:["User's job title and department assignment","User's physical location, time of access, and device security posture","The sensitivity classification of the data being accessed","The user's authentication method and credential strength"],a:1,e:"ABAC context: 'Allow IF: role=HR AND time=8AM-6PM AND location=office_IP_range AND device=MDM_enrolled.' Pure RBAC: 'Allow IF: role=HR.' ABAC can enforce: after-hours access denied even for HR, VPN access only from managed devices, geographic restrictions. Dynamic context-aware decisions."},
{ch:"Ch8",s:"Access Control",q:"The Principle of Least Privilege is violated when:",o:["An employee is given exactly the permissions needed for their current role","An employee's access is reviewed quarterly and adjusted as roles change","A system administrator account is used for routine email and web browsing","Employees are required to use MFA for all system access"],a:2,e:"Least privilege violation: sysadmin using admin account for daily activities (email, browsing). Compromise of that browsing session = admin compromise. Correct: separate accounts — admin account ONLY for admin tasks, standard account for daily use. Admin accounts should be used minimally and monitored intensively."},
{ch:"Ch8",s:"Endpoint Security",q:"Device control software whitelisting prevents Rubber Ducky attacks by:",o:["Scanning USB devices for malware signatures before allowing connection","Requiring a password before any USB device can be used","Only allowing pre-approved devices (specific serial numbers/VID:PID) — unknown HID devices are blocked before keystroke injection begins","Limiting USB data transfer speed preventing rapid keystroke injection"],a:2,e:"Whitelist approach: corporate-approved keyboard has specific VID:PID in whitelist. Rubber Ducky presents as keyboard (HID) but has different VID:PID → not on whitelist → blocked instantly → no keystrokes injected. Even at Rubber Ducky's 1000+ keystroke/second speed, it injects zero keystrokes if blocked at connection."},
{ch:"Ch8",s:"Endpoint Security",q:"EDR (Endpoint Detection and Response) detects hardware-based attacks through:",o:["Scanning physical USB hardware for modifications to chip architecture","Analyzing network traffic patterns from compromised devices","Behavioral monitoring — detecting anomalous processes, unusual file access patterns, and suspicious network connections that hardware attacks create","Reading hardware-level registry entries that malicious devices create"],a:2,e:"EDR behavioral approach: Rubber Ducky injects: opens cmd.exe → downloads payload → executes. EDR sees: cmd.exe spawned from HID input → downloads executable from external URL → executes. Behavioral chain = suspicious. Flag and alert regardless of whether the keyboard is 'legitimate.' Actions matter, not device identity."},
{ch:"Ch8",s:"Supply Chain",q:"Zero Trust applied to hardware procurement means:",o:["Refusing to purchase hardware from all foreign suppliers","Only accepting hardware donations from verified government agencies","Verifying hardware integrity upon receipt regardless of supplier reputation — never assuming new equipment is safe","Keeping all hardware purchases secret from employees to prevent insider threats"],a:2,e:"Zero Trust hardware: 'Never trust, always verify.' Even from a long-trusted supplier, verify upon receipt. Establish hardware integrity baselines. Monitor for unexpected network traffic from new devices. Inspect critical hardware before deployment. Nation-states have intercepted hardware in transit — even trusted suppliers are not immune."},
{ch:"Ch8",s:"Supply Chain",q:"Security awareness training is described as 'stronger than any software or firewall' because:",o:["Trained employees can patch software vulnerabilities faster than vendors","Human decisions are the final gateway to most attacks — a trained employee makes the right decision that no technical tool could force","Security training creates legally enforceable accountability for security breaches","Trained employees cost less than security software licenses"],a:1,e:"Human as final defense: all technical controls have bypass paths. Phishing bypasses email filters (if sophisticated enough). USB bypasses network security. Social engineering bypasses all software. But a trained employee who: recognizes the bait, doesn't plug in the USB, reports the suspicious visitor — blocks all of these. Human awareness = ultimate defense."},
{ch:"Ch8",s:"Final",q:"The recommended 'never trust unknown devices' principle applies to all EXCEPT which scenario?",o:["A USB drive found in the company parking lot","A new keyboard delivered in a plain box without IT knowledge","A known colleague's personal laptop temporarily borrowed for a presentation","A company-issued laptop from the IT department following standard provisioning procedures"],a:3,e:"Company-provisioned equipment: follows established procurement, imaging, and security configuration procedures. IT department maintains chain of custody. All other scenarios: found USB (baiting), unexpected delivery (supply chain), personal device (no MDM) — all require suspicion and verification before use."},
];

const CHS=["All","Ch1-2","Ch3","Ch4","Ch5","Ch6","Ch7","Ch8"];
let aCh="All",ans={},cor=0,wrg=0;
function shuffle(a){let r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
const SQ=shuffle(Q.map((q,i)=>({...q,_i:i})));
function getFilt(){return aCh==="All"?SQ:SQ.filter(q=>q.ch===aCh);}
function buildBar(){document.getElementById("chBar").innerHTML=CHS.map(c=>`<button class="ch-btn${c===aCh?" active":""}" onclick="setCh('${c}')">${c}</button>`).join("");}
function setCh(c){aCh=c;buildBar();render();}
function buildOpts(q,id){
  const L=["A","B","C","D"];
  return q.o.map((opt,i)=>{
    const st=ans[id];let cl="option";
    if(st!==undefined){cl+=" dis";if(i===q.a)cl+=" rc";if(i===st&&st!==q.a)cl+=" sw";if(i===st&&st===q.a)cl+=" sc";}
    const oc=st===undefined?`onclick="doAns(${id},${i})"` :"";
    return `<div class="${cl}" ${oc}><span class="ol">${L[i]}</span>${opt}</div>`;
  }).join("");
}
function render(){
  const qs=getFilt();const c=document.getElementById("qC");
  if(!qs.length){c.innerHTML='<div class="no-q">No questions for this chapter.</div>';return;}
  c.innerHTML=qs.map(q=>{
    const id=q._i;const st=ans[id];
    const cc=st===undefined?"q-card":st===q.a?"q-card ac":"q-card aw";
    const hasCode=q.q.includes("\n");let qHTML="";
    if(hasCode){const parts=q.q.split("\n");qHTML=`<div class="q-text">${parts[0]}</div><div class="q-code">${parts.slice(1).join("\n")}</div>`;}
    else{qHTML=`<div class="q-text">${q.q}</div>`;}
    return `<div class="${cc}" id="c${id}"><div class="q-meta"><span class="q-tag">${q.ch}</span><span class="q-tag">${q.s}</span></div>${qHTML}<div class="options">${buildOpts(q,id)}</div><div class="exp${st!==undefined?" show":""}"><strong>Explanation:</strong> ${q.e}</div></div>`;
  }).join("");
  upd();
}
function doAns(id,i){
  if(ans[id]!==undefined)return;const q=Q[id];ans[id]=i;
  if(i===q.a)cor++;else wrg++;
  const card=document.getElementById("c"+id);
  card.className=i===q.a?"q-card ac":"q-card aw";
  card.querySelectorAll(".option").forEach((el,j)=>{
    el.classList.add("dis");el.removeAttribute("onclick");
    if(j===q.a)el.classList.add("rc");
    if(j===i&&i!==q.a)el.classList.add("sw");
    if(j===i&&i===q.a)el.classList.add("sc");
  });
  card.querySelector(".exp").classList.add("show");upd();
}
function upd(){
  const tot=Object.keys(ans).length;const pct=tot>0?Math.round(cor/tot*100):0;
  document.getElementById("sT").textContent=tot;document.getElementById("sC").textContent=cor;
  document.getElementById("sW").textContent=wrg;document.getElementById("sS").textContent=pct+"%";
  const all=getFilt().length;const done=getFilt().filter(q=>ans[q._i]!==undefined).length;
  document.getElementById("pFill").style.width=all>0?(done/all*100)+"%":"0%";
}
function resetAll(){ans={};cor=0;wrg=0;render();}
buildBar();render();
</script>

<script>
const Q=[
// ══ CH1-2 (35) ══
{ch:"Ch1-2",s:"CIA Triad",q:"Which CIA principle is violated when an unauthorized user reads confidential employee salary records?",o:["Availability — data was not accessible when needed","Integrity — data was modified without permission","Confidentiality — data was accessed by unauthorized person","Non-repudiation — sender denied accessing the data"],a:2,e:"Confidentiality = only authorized people can view data. Unauthorized reading violates confidentiality. Fix: encryption, authentication, access controls."},
{ch:"Ch1-2",s:"CIA Triad",q:"An attacker modifies a student's grade in the university database from F to A. Which CIA principle is violated?",o:["Availability — the grade system became unavailable","Confidentiality — the grade was exposed to unauthorized users","Integrity — data was changed by an unauthorized person","Authentication — the attacker bypassed login"],a:2,e:"Integrity = data must not be changed by unauthorized people. Unauthorized modification violates integrity. Fix: read-only permissions, audit logs, backups to restore correct state."},
{ch:"Ch1-2",s:"CIA Triad",q:"A ransomware attack encrypts a hospital's patient database making it inaccessible. Which CIA principle is primarily violated?",o:["Confidentiality — patient data was leaked to the public","Integrity — patient records were modified by attackers","Availability — critical data is inaccessible when needed","Non-repudiation — doctors cannot verify who accessed records"],a:2,e:"Availability = data must be accessible when needed. Ransomware denying access violates availability. Fix: offline backups, redundancy, tested recovery procedures."},
{ch:"Ch1-2",s:"CIA Triad",q:"Which countermeasure addresses a Confidentiality breach?",o:["Deploying redundant servers to ensure uptime","Installing read-only file permissions on databases","Implementing encryption and strong authentication controls","Running daily backup jobs to cloud storage"],a:2,e:"Confidentiality breach fix = encryption (makes data unreadable to unauthorized parties) + authentication (ensures only authorized users can access it). Redundancy fixes Availability; backups fix Integrity."},
{ch:"Ch1-2",s:"Attack Equation",q:"An attacker has strong motive and effective methods but cannot find any vulnerability in the target. What happens?",o:["Attack succeeds because motive and method are sufficient","Attack partially succeeds causing minor damage","Attack fails because all three elements must be present simultaneously","Attack is delayed until vulnerability is found"],a:2,e:"Attack = Motive + Method + Vulnerability. All three MUST exist simultaneously. No vulnerability = no attack regardless of how strong the motive or method is. This is why patching is so effective."},
{ch:"Ch1-2",s:"Attack Equation",q:"A company has unpatched software (vulnerability) and an attacker has tools ready (method) but no reason to attack (no motive). What is the result?",o:["Attack still occurs because tools and vulnerabilities exist","Attack is unlikely — motive is what drives an attacker to act","Attack occurs automatically through automated scanning","Vulnerability alone triggers an attack without human involvement"],a:1,e:"Without motive (financial gain, revenge, curiosity, political agenda), an attacker has no reason to act. Motive is the driving force. All three elements must converge for an attack."},
{ch:"Ch1-2",s:"5 Phases",q:"What is the primary goal of the Reconnaissance phase?",o:["Find and exploit vulnerabilities in target systems","Establish persistent access after initial compromise","Gather as much information as possible before any direct attack","Clear evidence of previous unauthorized access attempts"],a:2,e:"Reconnaissance = information gathering phase. Passive: public sources (news, social media, websites). Active: direct interaction (calling helpdesk). Goal: build complete picture of target before any technical attack begins."},
{ch:"Ch1-2",s:"5 Phases",q:"During the Scanning phase, an attacker runs Nmap against a target. What is Nmap identifying?",o:["Email addresses of employees at the target organization","Public documents and press releases about the target","Live machines, open ports, and running services for exploit selection","Login credentials for target employee accounts"],a:2,e:"Scanning uses technical tools (port scanners, network mappers) to identify: live hosts, open ports, service versions, OS type. This information determines which specific exploit to use in the Gaining Access phase."},
{ch:"Ch1-2",s:"5 Phases",q:"Privilege escalation in the Gaining Access phase means:",o:["Gaining access to multiple systems simultaneously","Moving a regular user account to administrator or root level for total system control","Accessing encrypted files using stolen keys","Bypassing network firewalls to reach internal systems"],a:1,e:"Privilege escalation = elevating from limited user account to admin/root. Admin = full control: install software, modify system files, create new accounts, access all data. Methods: exploiting OS vulnerabilities, password attacks, misconfigured sudo."},
{ch:"Ch1-2",s:"5 Phases",q:"Which method is used in the Maintaining Access phase to ensure re-entry even after a system reboot?",o:["Collecting more passive OSINT data about the target","Performing additional port scans to find new open services","Installing backdoors or rootkits that survive system reboots","Deleting logs to hide previous unauthorized activity"],a:2,e:"Maintaining Access: backdoors and rootkits persist through reboots. Rootkits modify OS kernel to hide processes and files. Backdoors create alternative entry points. Goal: become a 'zombie machine' for ongoing data theft or future attacks."},
{ch:"Ch1-2",s:"5 Phases",q:"Clearing Tracks involves all of the following EXCEPT:",o:["Overwriting system event logs to remove evidence","Spoofing the source IP address to redirect blame elsewhere","Running additional port scans to find more vulnerabilities","Deleting command history to hide executed commands"],a:2,e:"Clearing Tracks = hiding evidence: delete/overwrite logs, spoof IP, delete command history. Running more port scans is part of Scanning or Maintaining Access — not clearing tracks. Tracks are cleared AFTER achieving goals."},
{ch:"Ch1-2",s:"Hacker Classes",q:"Which hacker class uses tools created by others without understanding the underlying techniques?",o:["Black Hat — skilled criminal hacker with malicious intent","White Hat — ethical hacker with explicit authorization","Script Kiddie — unskilled attacker using pre-made tools","Gray Hat — works both offensively and defensively"],a:2,e:"Script Kiddie: downloads ready-made tools and scripts without coding ability. Low skill but can cause significant damage using powerful tools. Not sophisticated but numerous — automated tools make attacks accessible to anyone."},
{ch:"Ch1-2",s:"Hacker Classes",q:"Which hacker class is most dangerous because legal deterrents have no effect on them?",o:["Black Hat — motivated by financial gain","Industrial Spy — motivated by stealing trade secrets","Nation-State — backed by unlimited government resources","Suicide Hacker — willing to accept all legal consequences for their cause"],a:3,e:"Suicide Hacker: hacks for an ideological cause and accepts jail/punishment. Legal deterrents are ineffective because they don't care about consequences. Makes them extremely unpredictable and difficult to deter."},
{ch:"Ch1-2",s:"Hacker Classes",q:"A Hacktivist group replaces a government website's homepage with a political protest message. This tactic is called:",o:["SQL injection — exploiting database vulnerabilities","Web defacement — replacing homepage content with political messaging","DDoS attack — overwhelming servers with traffic","Data exfiltration — stealing sensitive government files"],a:1,e:"Web defacement: replacing a website's homepage with a political message. Classic hacktivist tactic. Groups like Anonymous used this against governments and corporations they disagreed with politically or ethically."},
{ch:"Ch1-2",s:"Hacker Classes",q:"Industrial Spies differ from regular criminal hackers because:",o:["They always work alone without organization support","They target individuals rather than corporations","They steal intellectual property (trade secrets, blueprints, formulas) to benefit competitors","They only conduct physical attacks not digital ones"],a:2,e:"Industrial Spies: steal intellectual property (R&D data, product formulas, manufacturing processes, customer lists) for competitors or foreign governments. Economic espionage costs companies billions annually. Often nation-state sponsored."},
{ch:"Ch1-2",s:"Real World",q:"Stuxnet targeted which specific type of industrial system?",o:["Financial trading systems at major stock exchanges","Military satellite communication networks","Siemens programmable logic controllers in nuclear centrifuge facilities","Power grid distribution control systems in Europe"],a:2,e:"Stuxnet targeted Siemens S7 PLCs controlling uranium enrichment centrifuges at Iran's Natanz facility. It made centrifuges spin at wrong speeds while reporting normal operation to operators. First known cyberweapon to cause physical destruction."},
{ch:"Ch1-2",s:"Real World",q:"Chris Chaney's celebrity hacking method required which technical skill level?",o:["Advanced — custom exploit development and network penetration","Intermediate — SQL injection and password hash cracking","Basic — using publicly available scanning and phishing tools","Zero — only used Forgot Password and public information to guess answers"],a:3,e:"Zero skill: Chaney used 'Forgot Password' and guessed security question answers (pet names, mother's maiden name, hometown) using public information. Proves that social engineering and OSINT beat technical skill when humans are the weakest link."},
{ch:"Ch1-2",s:"Social Engineering",q:"What is the critical difference between Tailgating and Piggybacking?",o:["Tailgating is digital; Piggybacking requires physical presence","Tailgating targets executives; Piggybacking targets all employees","Tailgating occurs without the employee's knowledge; Piggybacking occurs with their knowledge and permission","Tailgating uses disguises; Piggybacking requires stolen badges"],a:2,e:"Tailgating: follow through secure door WITHOUT employee knowing. Piggybacking: same physical entry but employee KNOWS and allows it (holds door open for attacker carrying equipment boxes). Both bypass physical access controls."},
{ch:"Ch1-2",s:"Social Engineering",q:"A Dumpster Diving attack recovers information from:",o:["Unsecured wireless networks in target area","Discarded documents, storage media, and hardware in trash bins","Unencrypted database backups on public servers","Cached browser history on shared computers"],a:1,e:"Dumpster Diving: searching through trash for: printed documents (org charts, financial reports), old hard drives, sticky notes with passwords, employee directories. Defense: shred all documents, wipe all storage media before disposal."},
{ch:"Ch1-2",s:"Social Engineering",q:"A Watering Hole attack differs from a direct phishing attack because:",o:["Watering Hole targets executives; phishing targets all users","Watering Hole uses SMS; phishing uses email","Watering Hole infects a site the target visits regularly and waits; phishing delivers malware directly to the target","Watering Hole requires physical access; phishing is purely digital"],a:2,e:"Watering Hole: identify a site the target regularly visits (industry forum, news site) → compromise that site → wait for target to visit and get infected. Indirect attack — the target comes to the malware rather than receiving it directly."},
{ch:"Ch1-2",s:"Attack Types",q:"Sniffing and eavesdropping on network traffic are classified as Passive Attacks because:",o:["They use passive scanning tools rather than active exploits","The attacker does not modify data or disrupt communication — only observes silently","Passive attacks are only possible on wireless networks","They require less technical skill than active attacks"],a:1,e:"Passive Attack = attacker observes only, makes no changes. Data flows normally — attacker just intercepts copies. Victim has no indication of compromise. Examples: packet sniffing, traffic analysis, shoulder surfing."},
{ch:"Ch1-2",s:"Attack Types",q:"Which attack type requires the attacker to be physically near the target?",o:["Supply chain attack compromising vendor before delivery","Nation-state sponsored remote intrusion operation","Close-in attack like shoulder surfing or dumpster diving","Phishing campaign sent to thousands of email addresses"],a:2,e:"Close-in Attack: physical proximity required. Examples: shoulder surfing (watching someone type), dumpster diving (searching trash), eavesdropping (listening to conversations). Defender can counter with clean desk policy and shredding."},
{ch:"Ch1-2",s:"Data States",q:"An employee's laptop hard drive containing customer records is classified as:",o:["Data in Transit — moving between the employee and the company","Data in Process — being actively used by running applications","Data at Rest — stored on physical media not currently being transmitted","Data in Use — currently open and being edited by the employee"],a:2,e:"Data at Rest: stored on hard drives, SSDs, USB drives, cloud storage — not currently moving or being processed. Protect with: full disk encryption, physical access controls, secure disposal when decommissioning."},
{ch:"Ch1-2",s:"Data States",q:"A password being processed by a CPU during login verification is in which state?",o:["Data at Rest — stored in the password database","Data in Transit — traveling across the network to the server","Data in Process — currently being actively used by the CPU","Data in Archive — backed up for compliance purposes"],a:2,e:"Data in Process: currently being used/processed by the CPU or application. Also called 'Data in Use.' Examples: open files, running calculations, decrypted data in memory. Protect with: memory encryption, secure coding, process isolation."},
{ch:"Ch1-2",s:"CIA",q:"The Cybersecurity Cube (McCumber Cube) combines which three dimensions?",o:["Red Team, Blue Team, and Purple Team activities","Prevention, Detection, and Response capabilities","CIA Triad goals + Three Data States + Three Countermeasure types","Firewalls, IDS systems, and VPN technologies"],a:2,e:"McCumber Cube: 3D model combining CIA Triad (Confidentiality, Integrity, Availability) + Data States (at rest, in transit, in process) + Countermeasures (technology, policy, training). Security program must address all 27 combinations."},
{ch:"Ch1-2",s:"Motives",q:"Which attack motive focuses on making a competitor lose market share by damaging their reputation?",o:["Financial gain — directly stealing money or valuable data","Disrupting business continuity — stopping the company from operating","Reputation damage — embarrassing the target so customers lose trust","Creating fear — disrupting critical national infrastructure"],a:2,e:"Reputation damage motive: leak embarrassing data, deface website, publish false information, or disrupt services publicly. Customers see negative news → lose trust → switch to competitor. Can destroy years of brand building."},
{ch:"Ch1-2",s:"Motives",q:"State-Sponsored hackers primarily differ from criminal hackers in their:",o:["Higher level of technical sophistication only","Exclusive focus on financial gain through data theft","Unlimited time, funding, and focus on intelligence gathering or infrastructure sabotage","Preference for physical attacks over digital ones"],a:2,e:"State-Sponsored: government-employed, unlimited resources and patience. Primary goals: intelligence gathering (espionage), sabotage (like Stuxnet), or geopolitical disruption. Financial gain is secondary — national interest is the priority."},
{ch:"Ch1-2",s:"Countermeasures",q:"Which countermeasure category addresses the human element by educating staff about security risks?",o:["Technology — firewalls, antivirus, and encryption systems","Policy — written rules and acceptable use guidelines","Training — educating employees who are often the weakest security link","Physical — locks, cameras, and access control systems"],a:2,e:"Training: humans are the weakest security link. Social engineering bypasses all technology. Training teaches employees: recognize phishing, verify unusual requests, report suspicious activity, handle data properly. Often most cost-effective defense."},
{ch:"Ch1-2",s:"Security",q:"Why does 100% security not exist?",o:["Security vendors have not developed sufficient technology yet","Budget constraints prevent organizations from implementing all controls","New vulnerabilities, zero-days, and human error create an ever-changing attack surface that cannot be fully closed","Government regulations prevent organizations from implementing strong security"],a:2,e:"100% security is impossible: new vulnerabilities are discovered daily, zero-days exist that no patch can fix, humans make mistakes, and attackers continuously evolve techniques. Security is about risk REDUCTION, not elimination. Balance usability with security."},
{ch:"Ch1-2",s:"Hacker Classes",q:"An Insider Threat is most dangerous because:",o:["They have better hacking tools than external attackers","They work in groups making detection harder","They already have authorized access — no need to bypass perimeter defenses","They always have financial motivation making their actions predictable"],a:2,e:"Insider Threat: trusted employee or contractor with existing authorized access. No need to hack through firewalls or phish anyone. They already have legitimate credentials. Can operate undetected for extended periods. Hardest threat to defend against."},
{ch:"Ch1-2",s:"Attack Vectors",q:"Which attack vector exploits the software supply chain to reach the target?",o:["Email — phishing links and malicious attachments sent directly","Direct Access — physically touching the server hardware","Supply Chain — compromising a trusted vendor whose software/updates the target installs","Wireless — attacking unsecured WiFi networks near the target"],a:2,e:"Supply Chain: compromise a vendor → their software/update is delivered to all their customers. Target installs 'legitimate' update → malware arrives. Bypasses email filters and firewalls because the source is trusted. Example: SolarWinds."},
{ch:"Ch1-2",s:"Impacts",q:"Data Exfiltration differs from Data Loss in that:",o:["Data Exfiltration destroys data; Data Loss copies it","Data Exfiltration involves data being stolen and sent to attackers; Data Loss involves data being destroyed or corrupted","Data Exfiltration is accidental; Data Loss is always intentional","Data Exfiltration only affects individuals; Data Loss affects organizations"],a:1,e:"Data Exfiltration: data is STOLEN and transmitted to attacker (customer lists sold on dark web). Data Loss: data is DESTROYED or corrupted (ransomware deleting backups, accidental deletion). Both have severe consequences but different remediation paths."},
{ch:"Ch1-2",s:"Social Engineering",q:"Which psychological trigger creates time pressure forcing the victim to skip verification steps?",o:["Authority — compliance with perceived power figures","Reciprocity — obligation to return a favor done previously","Urgency — time pressure that bypasses rational decision-making and verification","Social Proof — following what the majority appears to be doing"],a:2,e:"Urgency: 'Your account will be locked in 10 minutes.' Time pressure prevents careful thinking. The victim acts immediately without verifying the request. Phone scams always use urgency ('Act NOW or lose access') because it works."},
{ch:"Ch1-2",s:"Social Engineering",q:"Hoax attacks in social engineering involve:",o:["Physical break-ins disguised as routine maintenance visits","Fake virus warnings or alerts designed to frighten users into taking harmful actions","Intercepting communications between two parties in real time","Installing hardware keyloggers on target computers"],a:1,e:"Hoax: fake security warning ('Your computer is infected! Call this number immediately!'). Creates fear → victim calls fake tech support → pays money or gives remote access. Scareware variant shows fake scan results with hundreds of 'viruses found.'"},
{ch:"Ch1-2",s:"Attack Types",q:"A Man-in-the-Middle attack is classified as an Active Attack because:",o:["It only monitors traffic without interfering with the communication","It requires physical access to the network infrastructure","It intercepts and can modify data in real-time between sender and receiver","It uses passive analysis of captured network packets"],a:2,e:"MITM is Active: attacker intercepts communication AND can read, modify, or inject data. Both parties think they're communicating directly but the attacker sits in the middle. Example: intercepting HTTPS by downgrading to HTTP or using fake certificates."},
{ch:"Ch1-2",s:"Security Challenges",q:"BYOD (Bring Your Own Device) creates security challenges because:",o:["Personal devices always have malware installed on them","IT cannot enforce security policies, updates, and monitoring on personal devices employees use for work","Personal devices have stronger encryption than corporate devices","BYOD increases network bandwidth consumption causing slowdowns"],a:1,e:"BYOD: personal devices fall outside corporate MDM (Mobile Device Management). IT cannot enforce: encryption, app whitelisting, remote wipe, patch management. One compromised personal device = access to corporate resources."},

// ══ CH3 (38) ══
{ch:"Ch3",s:"APT",q:"Why do APT attackers prefer using built-in system administration tools instead of custom malware?",o:["Built-in tools are more powerful than custom malware","Built-in tools are free reducing the attacker's operational costs","Actions using legitimate admin tools appear as normal IT activity making detection extremely difficult","Built-in tools automatically spread to other systems"],a:2,e:"Living off the Land (LOLBins): PowerShell, WMI, PsExec, certutil are legitimate tools. When attackers use them, SIEM sees 'admin running PowerShell' not 'malware executing.' Behavioral analysis must detect abnormal USE of legitimate tools."},
{ch:"Ch3",s:"APT",q:"Custom Malware provides attackers with which primary advantage over commodity malware?",o:["Custom malware spreads faster across networks than commodity malware","Custom malware is always free to develop unlike commercial exploit kits","No antivirus signature exists — evades all signature-based detection completely","Custom malware automatically updates itself when detected"],a:2,e:"Signature-based AV: matches files against database of known malware. Custom malware is brand new and target-specific — has never been seen before. No signature = no detection. EDR behavioral analysis is needed since signatures fail here."},
{ch:"Ch3",s:"APT",q:"The SolarWinds attack demonstrates which APT characteristic?",o:["APT groups prefer direct network intrusion over indirect methods","APT groups never target software vendors — only end-user organizations","APT groups use supply chains because a trusted vendor update bypasses all recipient security controls","APT groups always announce their attacks immediately after completion"],a:2,e:"SolarWinds: Russian SVR compromised SolarWinds' build system → trojanized Orion update sent to 18,000+ customers → all installed normally. Bypassed email filters, firewalls, endpoint security because source was trusted. Classic supply chain patience."},
{ch:"Ch3",s:"APT vs PenTest",q:"How does an APT differ from a penetration test regarding SCOPE?",o:["APTs respect the same scope boundaries as authorized pen tests","Pen tests target everything valuable with no limits on scope","APTs have no scope restrictions and target anything valuable; pen tests have defined boundaries to protect operations","APTs are scoped by the nation-state while pen tests have no limits"],a:2,e:"Pen test scope: defined contract limiting which systems can be tested and which actions are permitted. Protects production. APT scope: unlimited — they target payroll, customer data, source code, executive email — whatever has value. No contract limits them."},
{ch:"Ch3",s:"APT vs PenTest",q:"Which statement correctly describes the TIME dimension difference between APT and pen testing?",o:["Both APT and pen tests operate within identical time constraints","APT groups must complete operations within 72 hours; pen tests take months","Pen tests have contracted deadlines; APT groups have unlimited patience and may wait months for one opportunity","APT groups work faster than pen testers because they use automation"],a:2,e:"Time asymmetry: pen test = contracted period (days/weeks). APT = unlimited. APT28 waited months, targeted during holidays/weekends when monitoring was weaker. This patience allows them to find and exploit opportunities pen tests would miss."},
{ch:"Ch3",s:"Teams",q:"The Purple Team approach improves security faster than separate Red and Blue operations because:",o:["Purple Team has more members than Red and Blue teams combined","Purple Team replaces both Red and Blue teams with a single unified group","Red Team shows attack techniques directly to Blue Team who immediately create detection rules and close gaps","Purple Team only focuses on external threats unlike Red and Blue"],a:2,e:"Purple Team: collaborative exercise where Red demonstrates technique → Blue immediately builds detection → gap is closed in real time. Traditional Red vs Blue: report delivered weeks later → recommendations implemented months later → attacker has the advantage."},
{ch:"Ch3",s:"Teams",q:"Which team ensures a penetration test does not accidentally crash production systems?",o:["Red Team — they control what systems are tested","Blue Team — they monitor for production impact during testing","White Team — they control rules, boundaries, and stop dangerous test actions","Purple Team — they coordinate between offense and defense"],a:2,e:"White Team: referees of security exercises. Write the rules of engagement, monitor for production risk, stop actions that could cause outages, ensure legal compliance. They protect the organization while allowing realistic testing to occur."},
{ch:"Ch3",s:"Pen Testing Types",q:"Gray Box testing is most effective for simulating which real-world threat scenario?",o:["An external attacker with no knowledge of internal systems","A nation-state with full intelligence about the target's infrastructure","A malicious employee or contractor with normal user-level access","A physical intruder who has broken into the server room"],a:2,e:"Gray Box: tester has limited access (regular employee account). Simulates: stolen credentials from phishing, malicious insider, contractor abuse. Tests whether standard user access can be escalated to admin. Most realistic scenario for many organizations."},
{ch:"Ch3",s:"Pen Testing Types",q:"White Box testing finds weaknesses fastest because:",o:["White Box uses more powerful attack tools than other test types","White Box testers have more experience than Black or Gray Box testers","Full internal knowledge eliminates reconnaissance time — testers go directly to critical weaknesses","White Box tests are performed simultaneously by multiple testers"],a:2,e:"White Box: full knowledge (source code, architecture, configurations) means no time wasted on discovery. Testers focus directly on code logic, configuration errors, and architecture flaws. Finds deepest vulnerabilities but doesn't test detection capabilities."},
{ch:"Ch3",s:"APT Lifecycle",q:"What distinguishes Enumeration from Reconnaissance in the APT lifecycle?",o:["Enumeration is passive while Reconnaissance is active","Reconnaissance gathers public information; Enumeration actively probes systems for technical details like service versions and user accounts","They are identical phases with different names","Enumeration happens after data exfiltration; Reconnaissance happens before"],a:1,e:"Reconnaissance: passive/active info gathering (OSINT, people, org structure). Enumeration: active technical discovery of specific system details (service versions, user accounts, shares, group memberships). Enumeration answers 'exactly what is running.'"},
{ch:"Ch3",s:"APT Lifecycle",q:"Pass-the-Hash attacks are used in which APT phase?",o:["Reconnaissance — gathering credential hashes from public sources","Exploitation — using hash to gain initial access from outside","Lateral Movement — using stolen hash to authenticate to other internal systems without cracking the password","Data Exfiltration — encoding stolen data as hash values"],a:2,e:"Lateral Movement: attacker extracts NTLM hash from one compromised machine → uses that hash directly to authenticate to other Windows systems → moves from low-value to high-value systems. Never needs to crack the password."},
{ch:"Ch3",s:"APT Lifecycle",q:"Why is centralized remote logging (SIEM) critical against attackers who delete local logs?",o:["Remote logging encrypts all data automatically preventing tampering","SIEM is stored on a different network segment that attackers cannot access","Logs are already forwarded to SIEM before deletion — attacker deletes only local copies, SIEM retains the evidence","Remote logging is faster than local logging enabling real-time detection"],a:2,e:"Remote logging: logs are sent to SIEM in real-time as events occur. By the time attacker deletes local logs, SIEM already has copies. Attacker would need to compromise both the target AND the SIEM — much harder. Always log remotely."},
{ch:"Ch3",s:"APT Lifecycle",q:"Steganography is used in data exfiltration to bypass:",o:["Firewall port blocking rules","DLP systems that scan for obvious document types, keywords, or encrypted archives","IDS signature detection of known malware","Antivirus scanning of executable files"],a:1,e:"Steganography: hides data inside normal files (images, audio). DLP scanning for 'confidential' keywords or encrypted ZIP files misses a JPEG with embedded text. The file looks completely normal — same file size, same format, opens normally."},
{ch:"Ch3",s:"APT Lifecycle",q:"A defender finds a scheduled task that runs nightly and was not created by IT. This is evidence of which APT phase?",o:["Reconnaissance — attacker is still gathering information","Enumeration — attacker is discovering system configurations","Persistence — attacker created a mechanism to maintain access through reboots","Data Exfiltration — attacker is scheduling data transfers"],a:2,e:"Persistence: scheduled tasks, registry run keys, startup folder entries are common persistence mechanisms. Any unauthorized scheduled task should be investigated immediately. FIM (File Integrity Monitoring) detects these changes as they occur."},
{ch:"Ch3",s:"APT Lifecycle",q:"Timestomping helps attackers during forensic investigations by:",o:["Speeding up malware execution to complete before investigators arrive","Spreading malware to multiple systems simultaneously to confuse investigators","Making malicious files appear to have existed before the attack — confusing the timeline of events","Encrypting file metadata so investigators cannot read timestamps"],a:2,e:"Timestomping: change file creation/modification time to a past date. Investigator sees 'file created 2020' — might dismiss it as legitimate. Defense: cross-reference file timestamps with SIEM event logs which cannot be timestomped."},
{ch:"Ch3",s:"SOC Tools",q:"A SIEM detects an attack that individual security tools missed. This demonstrates which SIEM capability?",o:["SIEM has more powerful scanning engines than individual tools","SIEM automatically patches vulnerabilities that individual tools miss","SIEM correlates events across multiple sources — patterns invisible in individual logs become visible when combined","SIEM uses machine learning to predict future attacks"],a:2,e:"Log correlation: single events look normal in isolation. SIEM combines: unusual VPN login + suspicious PowerShell execution + large file access = high-confidence alert. This pattern across three tools would not trigger alerts individually."},
{ch:"Ch3",s:"SOC Tools",q:"SOAR reduces analyst workload by:",o:["Replacing SOC analysts with AI systems completely","Generating reports automatically for management review","Automating repetitive response actions using playbooks — auto-block IP, create ticket, isolate endpoint","Scanning networks faster than human analysts can"],a:2,e:"SOAR automation: when malicious IP detected → SOAR automatically blocks it in firewall, creates incident ticket, sends alert to analyst, logs all actions. What took analyst 15 minutes now happens in seconds. Analyst focuses on complex decisions."},
{ch:"Ch3",s:"SOC Tools",q:"High MTTD (Mean Time To Detect) is dangerous because:",o:["It indicates the SOC team is understaffed","Long detection time allows attackers to move laterally, establish persistence, and exfiltrate data before defenders act","It means the SIEM is generating too many false positives","High MTTD indicates better security monitoring capabilities"],a:1,e:"High MTTD = attacker operates undetected for longer. In that time: establish multiple persistence mechanisms, move to high-value systems, exfiltrate large amounts of data. Every minute undetected = more damage. Goal: minimize MTTD to minutes."},
{ch:"Ch3",s:"Blue Team",q:"A Threat Hunter's approach differs from waiting for SIEM alerts because:",o:["Threat Hunters use different tools than SOC Analysts","APT groups specifically design their techniques to avoid triggering SIEM rules — hunting finds what automation misses","Threat Hunters have higher security clearance than SOC Analysts","SIEM alerts are always wrong requiring human verification"],a:1,e:"APTs study SIEM rules and specifically design behavior to stay below thresholds. Threat Hunter: 'What if an APT is already inside? What would their activity look like?' → searches for subtle indicators like abnormal login times, unusual process chains."},
{ch:"Ch3",s:"Blue Team",q:"An Incident Responder's first priority during an active breach is:",o:["Immediately eradicating all attacker tools from affected systems","Notifying management and preparing legal documentation","Containing the breach to prevent spread while preserving evidence for investigation","Restoring affected systems from the most recent backup"],a:2,e:"Containment first: isolate affected systems, block malicious traffic, disable compromised accounts. 'Stop the bleeding' before anything else. Evidence preservation is critical — rushing to eradicate destroys forensic data needed to understand the full scope."},
{ch:"Ch3",s:"Blue Team",q:"A Malware Analyst discovers that a sample creates a registry key named 'WindowsUpdateHelper' at startup. How does this help the SOC?",o:["The SOC can now crack the malware's encryption","The SOC searches all endpoints for that specific registry key — scaling detection across the entire organization","The SOC can automatically remove the malware using antivirus","The SOC can identify which attacker created the malware"],a:1,e:"IOC (Indicator of Compromise) sharing: one malware analysis → one registry key name → SOC queries all endpoints for that key. If 50 machines have it, they're all infected. Malware analysis scales — one analyst's finding protects all endpoints."},
{ch:"Ch3",s:"Incident Response",q:"Why is the Preparation phase of Incident Response performed BEFORE an incident occurs?",o:["Preparation is optional and can be done during an incident","Regulations require preparation documents before incidents happen","Having plans, tools, playbooks, and contacts ready beforehand makes response faster and more organized during the crisis","Preparation only involves buying security tools in advance"],a:2,e:"Pre-incident preparation: during an actual breach, there is no time to think calmly. Pre-built playbooks, pre-designated roles, pre-configured tools, and pre-established communication channels allow immediate effective response when every second counts."},
{ch:"Ch3",s:"Incident Response",q:"The Lessons Learned phase transforms an incident into:",o:["A reason to fire the security team","Legal evidence for prosecution of attackers","A security improvement — defenses are strengthened based on exactly what the attacker exploited","A reason to purchase new security tools immediately"],a:2,e:"Lessons Learned: 'What happened? How did attacker get in? What detection failed? What slowed response?' → improve those specific gaps. Each incident makes the organization stronger. Skip this phase and you're vulnerable to the same attack again."},
{ch:"Ch3",s:"Frameworks",q:"NIST CSF's 'Recover' function ensures:",o:["All attacker access is completely removed from systems","All future attack attempts are blocked automatically","Systems are restored to normal operation safely after an incident with monitoring to confirm attacker did not return","Management receives a full report of the incident details"],a:2,e:"Recover: restore systems from CLEAN backups, patch exploited vulnerabilities, verify integrity before returning to production, implement additional monitoring. Recovery done too quickly = risk of reintroducing compromise if backup was made after attacker entered."},
{ch:"Ch3",s:"Frameworks",q:"CIS Controls prioritize which foundational security action above all others?",o:["Deploying advanced threat hunting capabilities first","Implementing zero-trust network architecture before anything else","Knowing what assets you have — you cannot protect what you don't know exists","Conducting annual penetration tests as the primary security activity"],a:2,e:"CIS Control #1: Hardware Asset Inventory. Unknown assets = unmanaged assets = unpatched assets = attack surface. Before deploying any defense, know exactly what systems exist. 'Shadow IT' and forgotten servers are prime attack targets."},
{ch:"Ch3",s:"Defense",q:"Network segmentation limits lateral movement by:",o:["Encrypting all traffic between network segments","Requiring re-authentication when crossing segment boundaries","Controlling which systems can communicate with which — attacker cannot freely reach all segments after compromising one device","Blocking all inbound traffic from external networks"],a:2,e:"Segmentation: VLANs, firewalls between zones. Student lab cannot reach finance servers. HR cannot reach R&D. Attacker compromises one segment → blocked at boundary → cannot reach high-value targets. Limits blast radius significantly."},
{ch:"Ch3",s:"Defense",q:"The 'Assume Breach' mindset changes security design by:",o:["Accepting that all attacks will succeed so defenses are unnecessary","Focusing exclusively on perimeter defense to keep attackers out","Designing internal controls for detection and containment assuming attackers will eventually get past the perimeter","Reducing security budgets because breaches are inevitable anyway"],a:2,e:"Assume Breach: perimeter will eventually fail (phishing, insider, zero-day). Design internal controls: micro-segmentation, privileged access management, comprehensive logging, behavioral analytics. Focus on LIMITING DAMAGE when breach occurs, not just prevention."},
{ch:"Ch3",s:"Defense",q:"Proactive threat hunting operates under which assumption?",o:["The SIEM has already detected all active threats in the environment","No attacker is currently inside the network based on lack of alerts","An attacker may already be operating inside the network undetected by current alerting systems","Threat hunting is only needed after a confirmed breach is detected"],a:2,e:"Assume breach mindset applied to hunting: 'If an APT is already inside and evading our tools, what would their activity look like?' Hunt for: unusual admin tool usage, abnormal authentication times, unexpected outbound connections. Don't wait for alerts."},
{ch:"Ch3",s:"Defense",q:"FIM (File Integrity Monitoring) generates an alert when:",o:["A user attempts to access a file they are not authorized to read","Network traffic patterns deviate from established behavioral baselines","A protected system file, configuration file, or startup entry is modified without authorization","An attacker scans network ports from an external IP address"],a:2,e:"FIM: monitors hash values of critical files. System files, configs, scheduled tasks, registry run keys — if their hash changes → alert. Persistence mechanisms MUST modify something. FIM catches that modification regardless of how stealthy the attacker is."},
{ch:"Ch3",s:"APT",q:"The term 'Dwell Time' in cybersecurity refers to:",o:["How long it takes to deploy security patches after release","How long the SIEM retains log data for forensic analysis","How long an attacker remains inside the network undetected before discovery","How long an incident response engagement typically lasts"],a:2,e:"Dwell Time: attacker time inside network without detection. Industry average historically: 100+ days. During this time attacker: maps the network, escalates privileges, finds sensitive data, establishes multiple persistence mechanisms. Shorter dwell = less damage."},
{ch:"Ch3",s:"APT",q:"RAM-only malware presents a unique detection challenge because:",o:["RAM operates faster than disk storage preventing normal scanning","RAM-based malware automatically spreads to all connected devices","It leaves no files on disk — traditional file-based antivirus has nothing to scan","RAM malware uses encryption that current tools cannot break"],a:2,e:"Fileless malware: runs entirely in memory. AV scans files on disk — there are none to scan. EDR with memory scanning detects suspicious processes and behavior. Rebooting clears RAM (temporary) but persistence mechanisms reintroduce the malware."},

// ══ CH4 (32) ══
{ch:"Ch4",s:"Honeypots",q:"Why does any connection to a honeypot generate a high-confidence alert with almost no false positives?",o:["Honeypots use advanced AI to distinguish legitimate from malicious traffic","Honeypots are protected by the strongest encryption making only attackers attempt access","No legitimate user or system has any reason to interact with a honeypot — any access is by definition suspicious","Honeypots contain fake credentials that only attackers would try to use"],a:2,e:"Honeypot guarantee: it serves no legitimate business purpose. No authorized user should ever connect to it. Therefore ANY connection = attacker activity with near-zero false positive rate. High signal-to-noise ratio makes honeypots extremely valuable for detection."},
{ch:"Ch4",s:"Honeypots",q:"A High Interaction honeypot is preferred over a Low Interaction honeypot when the goal is:",o:["Quickly deploying detection across many network segments with minimal resources","Understanding exactly how APT attackers behave — what tools they use and how they move","Detecting basic port scans from external IP addresses","Identifying which employees are accessing unauthorized resources"],a:1,e:"High Interaction: full OS, complete attacker interaction. APT spends hours or days operating — analyst observes every command, tool, and technique. Builds threat intelligence about specific attacker TTPs. Low Interaction: detects scan/probe but attacker quickly realizes it's fake."},
{ch:"Ch4",s:"Honeypots",q:"A Honeytoken is discovered when an attacker uses a fake API key found in a document. What does this reveal?",o:["The attacker's location and identity","Specifically which document the attacker accessed and when — enables precise detection of data theft","The encryption algorithm the attacker used to exfiltrate data","Which network segment the attacker entered from"],a:1,e:"Honeytoken precision: when fake credential is used, attacker reveals: they accessed the document containing it, when they accessed it, and where they used it from. Canary tokens (from canarytokens.org) even capture the attacker's IP when triggered."},
{ch:"Ch4",s:"Port Scanning",q:"An IDS alert fires when one IP connects to 25 different ports within 45 seconds. What attack does this indicate?",o:["DDoS attack overwhelming server resources with traffic","SQL injection attempting to extract database contents","Active port scanning — systematically probing for open services and vulnerabilities","DNS zone transfer attempting to retrieve all domain records"],a:2,e:"Connection threshold breach: 25 ports in 45 seconds is automated scanning behavior. Humans don't manually probe 25 ports in 45 seconds. Snort/Suricata rules alert on this pattern. Investigate source IP immediately."},
{ch:"Ch4",s:"Port Scanning",q:"A Coordinated Scan is harder to detect than a Sequential Scan because:",o:["Coordinated scans use encrypted packets that IDS cannot read","Coordinated scans run faster than sequential scans completing before IDS can analyze","Multiple source IPs each scan small port ranges — no single source triggers per-source threshold detection","Coordinated scans only target well-known ports reducing detection opportunities"],a:2,e:"Distributed/Coordinated scan: 10 attacker IPs each scan 100 ports. Each source stays below the 'alert at 20 ports' threshold. Individually each looks normal. Need correlation across sources — SIEM sees the pattern that per-IP IDS rules miss."},
{ch:"Ch4",s:"DNS Detection",q:"Unusually long DNS query strings with random-looking subdomains indicate which attack technique?",o:["DNS cache poisoning replacing legitimate DNS records","DNS amplification DDoS attack using open resolvers","DNS Tunneling — data being encoded and hidden inside DNS queries for covert exfiltration","DNS zone transfer extracting all records from the domain"],a:2,e:"DNS Tunneling signature: data is Base64 encoded and placed in subdomain portion of queries (random-looking strings of 50-100 characters). Detection: query length analysis, entropy analysis of subdomain strings, volume analysis (thousands of queries from one host)."},
{ch:"Ch4",s:"Web App Detection",q:"A web server log shows requests for /admin, /.git, /.env, and /wp-admin all from the same IP within 10 seconds. This indicates:",o:["A legitimate security audit being performed by the IT team","Normal search engine crawling of the website content","Automated web application reconnaissance scanning for common sensitive paths","A DDoS attack using common web paths to consume server resources"],a:2,e:"Common path enumeration: automated tools (Nikto, dirb, gobuster) scan for commonly exposed sensitive paths. /.git = source code leak. /.env = environment variables with credentials. /admin = admin panel. All in 10 seconds = automated tool."},
{ch:"Ch4",s:"Web App Detection",q:"The Apache configuration 'ServerTokens Prod' prevents attackers from obtaining:",o:["Access to the server's admin control panel","The server's SSL private key and certificate details","The exact server software name and version number from HTTP response headers","The IP addresses of other servers in the infrastructure"],a:2,e:"ServerTokens Prod: removes version info from Server header (returns 'Apache' instead of 'Apache/2.4.51 (Ubuntu)'). Attacker cannot look up CVEs for that specific version. Defense principle: minimize information disclosure to raise attacker's cost."},
{ch:"Ch4",s:"DLP",q:"Network DLP monitors data crossing network boundaries. Which content inspection method specifically identifies exact copies of protected database records?",o:["Pattern Matching using regular expressions for credit card formats","OCR technology extracting text from images and documents","Exact Data Matching (EDM) using hash-based comparison of specific database records","Document Fingerprinting creating unique signatures for sensitive documents"],a:2,e:"EDM: creates cryptographic hashes of protected records (specific customer entries). When that exact data appears in outbound traffic — even partially — hash matches and DLP acts. Very precise, low false positive rate. Used for protecting specific high-value records."},
{ch:"Ch4",s:"DLP",q:"Endpoint DLP clipboard monitoring prevents which specific data leakage method?",o:["Attacker installing keyloggers on employee computers remotely","Employee emailing sensitive files as attachments to personal email","Employee copying sensitive data from a secure application and pasting it into a personal messaging app","Attacker brute-forcing employee login credentials"],a:2,e:"Clipboard monitoring: intercepts copy/paste operations. Prevents: copying sensitive data from CRM → pasting into personal Gmail, Slack, or Notepad. Attacker who gains insider access cannot easily exfiltrate by copy-paste if clipboard is monitored and blocked."},
{ch:"Ch4",s:"DLP",q:"'Public' data classification means:",o:["Data can be shared with employees but not external parties","Data requires encryption when transmitted outside the organization","Data is approved for public disclosure with no sharing restrictions","Data requires manager approval before external transmission"],a:2,e:"Data classification: Public = approved for public release, freely shareable (press releases, marketing materials). Internal = employees only. Confidential = sensitive business data, restricted external. Restricted = highest sensitivity, need-to-know only."},
{ch:"Ch4",s:"Email Security",q:"SPF fails to prevent which email attack scenario?",o:["Domain spoofing from an unauthorized server","Impersonation of another organization's domain","Email modification by an attacker after it leaves the authorized server — SPF only verifies server authorization","Mass spam campaigns from compromised legitimate mail servers"],a:2,e:"SPF limitation: verifies the SENDING SERVER is authorized. Does not protect email CONTENT. Cannot detect: content modification in transit (DKIM handles this), look-alike domains (different from verified domain), compromised authorized servers sending malicious content."},
{ch:"Ch4",s:"Email Security",q:"DKIM cryptographic verification fails when:",o:["The email is sent from an unauthorized mail server","The email is delivered to a spam folder instead of inbox","The email content or headers were modified after signing — the signature no longer matches","The sending organization has not configured SPF records"],a:2,e:"DKIM: signing with private key creates a hash of email content + headers. Any modification of content or headers invalidates the signature. MITM who intercepts and modifies email → DKIM signature fails → receiving server knows email was tampered with."},
{ch:"Ch4",s:"Email Security",q:"A DMARC policy of 'none' is typically used when:",o:["The organization wants to block all fraudulent emails immediately","The organization has not yet configured SPF or DKIM records","Organizations first deploy DMARC — monitoring phase to understand email flow before enforcing block/quarantine","The organization only receives email and never sends any"],a:2,e:"DMARC deployment strategy: start with p=none (monitor only, collect reports on who sends email claiming to be from your domain) → analyze reports → fix legitimate sources → p=quarantine → verify → p=reject. Jumping straight to reject may block legitimate mail."},
{ch:"Ch4",s:"OSINT",q:"An attacker finds a GitHub commit from 6 months ago containing database credentials. What makes this discoverable?",o:["GitHub sends notifications when sensitive files are committed","All GitHub commits are indexed by Google search engines","Git version control retains full history — even deleted files and reverted commits remain in the repository history","GitHub automatically scans all code for credentials and publishes findings"],a:2,e:"Git history: even if developer deletes credentials and commits again, the original commit with credentials remains in git history. Tools like TruffleHog and GitLeaks scan ALL commits including historical ones. Never commit secrets — rotate any that were ever exposed."},
{ch:"Ch4",s:"OSINT",q:"Shodan differs from Google in that Shodan specifically indexes:",o:["Social media profiles and professional networks","Web page content and publicly accessible documents","Internet-connected devices and their open services, banners, and configurations","Code repositories and development project documentation"],a:2,e:"Shodan: search engine for internet-connected devices. Scans all IPs continuously — indexes: open ports, service banners, software versions, certificates, default credentials. Find: exposed webcams, industrial control systems, unsecured databases, misconfigured servers."},
{ch:"Ch4",s:"Social Engineering",q:"Why is 'whaling' considered the most high-value social engineering attack?",o:["Whaling targets a large number of employees simultaneously","Whaling uses physical access rather than digital techniques","Whaling targets C-level executives who have maximum data access and authority to approve large financial transactions","Whaling is harder to execute requiring specialized technical skills"],a:2,e:"Whaling (C-level targeting): CEO has access to all systems and can authorize actions. CFO can approve wire transfers. CIO can grant system access. BEC (Business Email Compromise) often impersonates CEO → emails CFO → requests urgent wire transfer. Billions lost annually."},
{ch:"Ch4",s:"Social Engineering",q:"Vishing differs from standard phishing by using which communication channel?",o:["SMS text messages targeting mobile phone users","Instant messaging platforms like Slack or Teams","Voice phone calls — attacker impersonates IT support, vendor, or executive in real-time conversation","Physical mail with official-looking letterhead and fake return addresses"],a:2,e:"Vishing (Voice Phishing): real-time phone conversation. Harder to scrutinize than email — no link to hover over. Attacker adapts in real-time based on victim's responses. Much harder for victim to fact-check during live conversation. Creates immediate pressure."},
{ch:"Ch4",s:"Social Engineering",q:"The 'Pretexting' social engineering technique creates:",o:["A fake website cloning a legitimate login portal","A physical device that injects malicious keystrokes when connected","A fabricated believable scenario to justify unusual information requests","A malicious email attachment exploiting document software vulnerabilities"],a:2,e:"Pretexting: build a believable false context. 'I'm from IT security and we detected suspicious login activity on your account — I need to verify your identity.' The pretext justifies the request. Victim focuses on the scenario's plausibility, not on verifying the caller's identity."},
{ch:"Ch4",s:"Defense",q:"The 'Information Minimisation' layer of Defence-in-Depth reduces the attack surface by:",o:["Blocking all internet access to reduce external exposure","Deploying honeypots to attract and detect reconnaissance activity","Removing unnecessary public information, classifying data, and enforcing need-to-know access","Installing IDS/IPS to detect and block reconnaissance attempts"],a:2,e:"Information Minimisation: remove data that gives attackers advantage. Audit search-indexed content, remove version strings from server headers, restrict employee public social media, minimize public DNS records, limit what job postings reveal about tech stack."},
{ch:"Ch4",s:"Recon Detection",q:"An email server configured to return identical error responses for both valid and invalid addresses prevents:",o:["Spam campaigns using the mail server as a relay","SMTP VRFY enumeration of valid employee email addresses","DKIM signature verification failures for incoming email","SPF policy enforcement for outgoing email messages"],a:1,e:"Standardized SMTP responses: if 'user@company.com' returns '550 No such user' but 'valid@company.com' returns '250 OK,' attackers distinguish valid from invalid. If BOTH return identical responses, attackers cannot determine which addresses exist."},
{ch:"Ch4",s:"Recon Detection",q:"Zone Transfer Monitoring detects which attacker reconnaissance technique?",o:["SQL injection against web application databases","Subdomain brute-forcing using dictionary word lists","Unauthorized AXFR requests — revealing complete DNS record sets including all subdomains and IPs","Certificate transparency log scraping for SSL certificate history"],a:2,e:"AXFR (DNS Zone Transfer): legitimate mechanism for DNS server synchronization. Attackers send unauthorized AXFR → get complete DNS zone = all A records (servers), MX records (mail), subdomains. Defense: only allow AXFR from authorized secondary DNS servers. Alert on all others."},
{ch:"Ch4",s:"Recon Detection",q:"Rate limiting on a web application directory search protects against:",o:["SQL injection attacks targeting the database backend","XSS attacks injecting malicious scripts into responses","Automated directory enumeration tools that send thousands of requests rapidly","DDoS attacks overwhelming server bandwidth"],a:2,e:"Rate limiting: limits requests per second/minute per IP. Automated scanners (gobuster, ffuf, dirbuster) send thousands of requests per second. Rate limiting slows them to human-speed making enumeration impractical. Too many requests → 429 Too Many Requests → temporary block."},
{ch:"Ch4",s:"OSINT",q:"CASB (Cloud Access Security Broker) provides visibility over 'Shadow IT' meaning:",o:["Backdoors installed by attackers in cloud infrastructure","IT projects conducted without management approval","Unauthorized cloud applications employees use without IT knowledge or approval","Dark web marketplaces selling stolen company data"],a:2,e:"Shadow IT: employees use unauthorized apps (personal Dropbox, free Slack, consumer Google Drive) to work more conveniently. IT has no visibility or control. Sensitive data can be uploaded unknowingly. CASB discovers and controls all cloud app usage."},
{ch:"Ch4",s:"Phishing",q:"An email from 'secure-paypal-update.com' claiming to be PayPal is identified as phishing by which indicator?",o:["The email uses HTML formatting which legitimate companies don't use","The email arrives during business hours when attacks typically occur","The displayed domain does not match PayPal's actual domain — spoofed display name or lookalike domain","The email contains a link which legitimate companies never include"],a:2,e:"Domain verification: always check the ACTUAL sending domain, not the display name. 'PayPal Support <help@secure-paypal-update.com>' — display says PayPal but domain is not paypal.com. Hover over links — displayed URL vs actual destination URL discrepancy is the key indicator."},
{ch:"Ch4",s:"Phishing",q:"A phishing email uses 'Dear Valued Customer' instead of your real name. What does this reveal?",o:["The attacker respects your privacy by not using your name","The email server stripped the personalization during delivery","Mass phishing campaign — not a targeted spear phish. No personalization = generic attack sent to thousands","The attacker has your email but not your name from the data breach"],a:2,e:"Generic greeting = mass phishing. Real organizations with your data use your name. Generic greetings reveal the attacker is sending the same email to thousands hoping someone clicks. Spear phishing uses your real name, role, and current projects for personalization."},
{ch:"Ch4",s:"Social Engineering",q:"Baiting using a USB drive labeled 'Employee Performance Reviews 2026' in a parking lot exploits which psychological principle?",o:["Authority — the label implies it came from management","Fear — employees worry about what the review says about them","Both curiosity and fear simultaneously — employees want to know what's inside","Reciprocity — employees feel obligated to return the USB to IT"],a:2,e:"Dual trigger: curiosity ('what's on this?') + fear/self-interest ('is my review negative? I need to see this'). Both override security training. The label is carefully chosen to maximize the emotional response driving the target to plug it in."},

// ══ CH5 (42) ══
{ch:"Ch5",s:"Recon Categories",q:"An attacker reads a company's quarterly SEC filing to find acquisition targets and key executives. Which intelligence category is this?",o:["OSINT — information from public internet sources","HUMINT — intelligence collected from human interactions","FININT — financial intelligence from official financial disclosures","GEOINT — geographical intelligence about company locations"],a:2,e:"FININT (Financial Intelligence): SEC filings (10-K, 10-Q), annual reports, acquisition announcements. Reveals: revenue, executive compensation, major investments, technology infrastructure costs, planned expansions. All legally required public disclosures."},
{ch:"Ch5",s:"Recon Categories",q:"A photo posted on LinkedIn by an executive shows their home office. What intelligence can an attacker extract from this photo?",o:["The executive's login credentials visible on their screen","The company's network topology from visible cable connections","GPS coordinates from photo EXIF metadata revealing the executive's home address","The company's security policies visible in printed documents"],a:2,e:"EXIF metadata: smartphones embed precise GPS coordinates in every photo by default. Extract with ExifTool: Latitude 25.2048, Longitude 55.2708. Now attacker knows home address. Defense: strip EXIF before posting (camera settings or image processing tools)."},
{ch:"Ch5",s:"Recon Categories",q:"HUMINT collected through eavesdropping at a conference refers to:",o:["Scanning for open WiFi networks at the conference venue","Recording conversations between company employees discussing internal projects","Photographing the company's booth displays and technical demonstrations","Collecting business cards from company representatives"],a:1,e:"HUMINT via eavesdropping: listening to conversations employees have in public (conference, coffee shop, elevator). Employees often discuss internal projects, problems, and technologies in public settings unaware of who might be listening. Active HUMINT: directly engaging employees."},
{ch:"Ch5",s:"Search Engine",q:"The Google Dork 'site:target.com ext:sql OR ext:db' is searching for:",o:["Subdomains of the target organization","SQL injection vulnerabilities in web applications","Database files accidentally exposed on the web server","Employee email addresses in SQL format"],a:2,e:"filetype/ext dorks: searching for .sql or .db files on the target domain. Developers sometimes accidentally commit database backup files to web directories. These files can contain: full table structures, all user records, hashed passwords, configuration data."},
{ch:"Ch5",s:"Search Engine",q:"An attacker sets up a Google Alert for 'target-company layoffs OR breach OR incident.' What is the intelligence value?",o:["Direct access to the company's security incident reports","Automatic notification when news about company problems appears — useful for timing attacks during vulnerabilities","Revealing the company's network infrastructure details","Identifying which employees are being laid off"],a:1,e:"Google Alerts for company problems: layoffs (reduced security staff, distracted IT), breaches (already compromised, security team overwhelmed), incidents (system instability). Attackers time attacks during organizational disruptions when defenders are distracted."},
{ch:"Ch5",s:"Search Engine",q:"The 'inurl:admin' operator combined with 'site:target.com' helps an attacker find:",o:["Employee names with admin privileges in the company","Cached versions of the company's administrative pages","Admin interface login pages accessible from the internet","Administrative email addresses for the company"],a:2,e:"Admin interface discovery: site:target.com inurl:admin finds pages where 'admin' appears in the URL (e.g., target.com/admin/login, target.com/wp-admin). Admin panels exposed to internet = high-value target. Many use default credentials."},
{ch:"Ch5",s:"Search Engine",q:"Scripting searches improves on manual Google searches by:",o:["Bypassing Google's content filters and safe search restrictions","Accessing Google's private internal search index","Automating repetitive queries from a prepared list — saving hours of manual work","Searching multiple search engines simultaneously with one query"],a:2,e:"Scripted search automation: prepare list of 50 target-specific search terms → script opens each in browser automatically. Manual: 50 separate searches taking 2+ hours. Scripted: same queries in minutes. Combine with operators for highly targeted intelligence."},
{ch:"Ch5",s:"HUMINT Personnel",q:"Why is identifying the Help Desk Manager valuable in the personnel directory harvest?",o:["Help Desk Managers always use weak passwords","They have the highest salary making them susceptible to bribery","Help Desk Managers can reset credentials and bypass security — impersonating them gives authority to request account access","Help Desk Managers are always available making them easy to reach"],a:2,e:"Help Desk Manager impersonation: 'Hi, I'm David Chen, Help Desk Manager. I need you to reset this user's password urgently.' The Help Desk team is trained to help and may comply without full verification especially when someone claims authority."},
{ch:"Ch5",s:"HUMINT Personnel",q:"Job postings for 'Senior Cisco Network Engineer — must know Palo Alto NGFW and Splunk SIEM' reveal:",o:["The specific salaries paid to network engineers","Which employees are leaving the company soon","The company uses Cisco networking, Palo Alto firewalls, and Splunk SIEM — providing a technology roadmap for exploitation","The company is planning to expand their network team"],a:2,e:"Tech stack intelligence: job postings reveal exact technologies in use. Attacker now knows: which Cisco vulnerabilities to research, Palo Alto CVEs to check, Splunk SIEM version specifics. Free technology intelligence without touching a single company system."},
{ch:"Ch5",s:"Directory Harvesting",q:"The alphabet-sweep technique works because many employee directory systems:",o:["Sort employees alphabetically making them easy to enumerate","Return ALL employees whose first or last name starts with the searched letter","Use the same password for all employee accounts","Display employee home addresses in search results"],a:1,e:"Alphabet sweep: search 'A' → all employees whose name starts with A (Adams, Ali, Anderson...). Search 'B' → all B names. Continue through Z. By completion, attacker has extracted the complete employee list systematically without raising automated alerts."},
{ch:"Ch5",s:"Directory Harvesting",q:"Why is analyzing HTML table structure from directory results important?",o:["HTML tables contain hidden metadata about the server configuration","Directory tables reveal the company's database schema structure","Tables provide structured fields (name, title, department, phone, email) making data extraction and organization straightforward","HTML analysis reveals which employees have admin privileges"],a:2,e:"HTML table parsing: directories return data in structured tables. Columns = Name, Title, Department, Phone, Email. Scripts parse these fields → clean structured data. Cross-referenced with LinkedIn confirms and enriches the data. Final output: complete personnel database."},
{ch:"Ch5",s:"Directory Harvesting",q:"When harvesting a POST-based directory, an attacker uses a proxy tool to:",o:["Encrypt their traffic to avoid detection by the company's IDS","Change their IP address to avoid rate limiting detection","Capture the HTTP POST request body, modify the search parameter, and replay requests with different values","Automatically submit directory results to a database"],a:2,e:"POST interception: Burp Suite or ZAP captures the POST request showing the body parameters (q=john). Attacker replays request changing parameter to q=a, q=b, etc. POST body is invisible in URL but proxy shows and modifies the raw request."},
{ch:"Ch5",s:"Email Harvesting",q:"theHarvester searches multiple sources simultaneously including all EXCEPT:",o:["Google and Bing search engines for email addresses in public pages","LinkedIn professional network for employee emails and names","The target organization's internal Active Directory","Shodan for technical infrastructure information"],a:2,e:"theHarvester sources: Google, Bing, LinkedIn, Twitter, Shodan, SecurityTrails, crt.sh. It does NOT access internal systems like Active Directory — that requires internal network access. theHarvester is purely passive OSINT from public sources."},
{ch:"Ch5",s:"Email Harvesting",q:"An out-of-office reply from 'sarah.chen@company.com' states 'I'm away until Feb 15. Contact john.davis@company.com for urgent matters.' What specific intelligence does this provide?",o:["The company's VPN gateway address and remote access procedures","Only the email format pattern for the organization","Sarah Chen's email, absence dates, a second valid employee email (John Davis), and their reporting relationship or team structure","The company's email server software and security configuration"],a:2,e:"OOO intelligence: 1) Confirms sarah.chen's email format. 2) Returns a second valid email (john.davis). 3) Sarah is absent Feb 15 = window to impersonate her. 4) John covers for Sarah = they work together = organizational relationship revealed. One email → multiple data points."},
{ch:"Ch5",s:"Email Harvesting",q:"Banner grabbing during an SMTP connection reveals which security-relevant information?",o:["The email credentials of all users on the mail server","The contents of emails waiting in the mail queue","The mail server software name, version, and sometimes OS — enabling targeted CVE research","The company's SPF and DKIM configuration details"],a:2,e:"SMTP banner: server announces itself upon connection (220 mail.company.com Microsoft ESMTP MAIL Service, Version: 15.0.1395). Attacker knows exact software and version → searches CVE database for known vulnerabilities → targeted exploitation."},
{ch:"Ch5",s:"Email Harvesting",q:"The student inquiry pretext email is classified as nontechnical email harvesting because:",o:["It uses social engineering rather than hacking techniques","It targets non-technical employees rather than IT staff","It exploits no software vulnerabilities — just sends a believable email to elicit a response containing intelligence","It uses a student's personal email rather than a professional one"],a:2,e:"Nontechnical = no exploits, no tools. Just a believable email → human reply containing: full signature (name, title, phone, email format), alternative contact, company email domain format. 'Exploitless exploit' — the human IS the vulnerability being exploited."},
{ch:"Ch5",s:"GEOINT",q:"An attacker uses BatchGeo to map 50 employee home addresses collected from LinkedIn profiles. The resulting map reveals:",o:["The exact GPS coordinates of the company's server room","Employee commute routes enabling physical surveillance planning","Geographic clustering showing residential areas where many employees live — useful for physical surveillance targeting","The company's satellite office locations and their security levels"],a:2,e:"BatchGeo clustering: 30 employees live in the same Doha neighborhood → that area has many targets for physical surveillance. Also reveals: remote workers' general areas, travel patterns to HQ, home-to-office distance (remote vs commuters)."},
{ch:"Ch5",s:"GEOINT",q:"Defense against EXIF metadata exploitation requires:",o:["Watermarking all company photos before publication","Using only DSLR cameras rather than smartphones for company photos","Stripping EXIF data using tools or settings before publishing any photos","Encrypting all photo files before uploading to company website"],a:2,e:"EXIF stripping: before publishing any photo, remove EXIF data. Options: camera settings (disable GPS tagging), image editing tools (File → Export stripping metadata), batch processing scripts, online tools. Policy: all published photos must have EXIF stripped first."},
{ch:"Ch5",s:"Individual Recon",q:"An attacker whose goal is physical access to a data center would primarily target which employee type?",o:["Chief Financial Officer — who controls budget approvals","System Administrator — who manages server configurations","Facilities Manager or Physical Security Staff — who control physical access credentials and badge systems","Chief Marketing Officer — who has broad external communication access"],a:2,e:"Target selection by goal: Physical access → target Facilities/Security staff (badge programming, visitor management, server room access). IT access → CIO/Sysadmin. Financial → CFO. Data → Analysts. Match target to specific attack objective."},
{ch:"Ch5",s:"Individual Recon",q:"LinkedIn is valuable in individual reconnaissance for all of the following EXCEPT:",o:["Org chart and reporting structure between employees","Technologies listed in employee skill sections","Employee authentication credentials and passwords","Conference presentations revealing technical details"],a:2,e:"LinkedIn does NOT reveal passwords (that's a breach database function). LinkedIn reveals: skills/technologies used, org structure (who reports to whom), previous employers, education, mutual connections, current projects (from posts), and who is connected to whom."},
{ch:"Ch5",s:"Nontraditional Sources",q:"The Better Business Bureau (BBB) provides attackers with which useful intelligence?",o:["Employee personal contact information and home addresses","Network infrastructure details and IP address ranges","Company reliability ratings, complaint history, and business relationship data","Detailed financial statements and tax filing information"],a:2,e:"BBB intelligence: complaint history (reveals customer service problems, unhappy employees, recurring issues), accreditation status (reveals business relationships), industry category (confirms business type). Also reveals: business address, phone, website, founding year."},
{ch:"Ch5",s:"Nontraditional Sources",q:"A forum post by an employee saying 'Anyone else having trouble with our Cisco ASA 5506 after last week's update?' reveals:",o:["The employee's home address and daily schedule","The exact firewall model and that a recent update caused problems — both useful for targeting","The employee's username and password for the firewall","The company's complete network topology"],a:1,e:"Watering hole intelligence: exact firewall model (Cisco ASA 5506), recent update = possible instability = vulnerability window, employee is technical (knows what the device is). Now attacker researches ASA 5506 CVEs and plans attack during update confusion window."},
{ch:"Ch5",s:"osintstalker",q:"geostalker collecting data from multiple image platforms allows an attacker to infer:",o:["The target's financial account details and transaction history","The target's professional qualifications and educational background","The target's daily routine, home location, workplace, and frequently visited places from GPS metadata across platforms","The target's login credentials for social media accounts"],a:2,e:"geostalker cross-platform: Instagram photo at coffee shop (GPS: 25.2101, 55.2765 = near office, weekday mornings). LinkedIn photo at home office (GPS: 25.1987, 55.3012 = home). Twitter photo at gym (GPS: regular morning timing). → daily routine mapped."},
{ch:"Ch5",s:"osintstalker",q:"fbstalker's collection of 'apps installed' on a target's social media profile reveals:",o:["The target's operating system and device hardware specifications","Which third-party applications have access to the target's social media account — potential attack vectors","The target's browsing history and frequently visited websites","The target's encrypted private messages and photos"],a:1,e:"App permissions intelligence: apps installed/connected to social media often have broad permissions (read posts, access contact list, post on behalf). These apps may have weaker security than the main platform — compromise the app to access the account."},
{ch:"Ch5",s:"Defense",q:"Adding CAPTCHA to a personnel directory specifically prevents:",o:["SQL injection attacks against the directory database","Phishing emails using directory information as pretexts","Automated alphabet-sweep harvesting — bots cannot solve CAPTCHAs forcing manual slow-speed queries","Cross-site scripting attacks injecting malicious code into directory pages"],a:2,e:"CAPTCHA target: automated scripts making A, B, C... Z searches rapidly. CAPTCHA requires human challenge solving. Bots cannot complete it → harvesting is blocked. Attacker would need to manually search — extremely slow and easily noticed by rate monitors."},
{ch:"Ch5",s:"Defense",q:"An organization publishes a policy that all company photos must have EXIF data removed before posting. This defends against:",o:["SQL injection attacks targeting photo upload functionality","Malware embedded in image files exploiting viewer vulnerabilities","GEOINT attacks mapping employee home locations and daily routines from photo GPS metadata","Steganography attacks hiding data inside company published images"],a:2,e:"EXIF defense policy: corporate policy requiring EXIF stripping protects against geolocation attacks. Training employees: 'All photos going to website/social media must be processed to remove metadata.' Technical control: image processing pipeline that strips EXIF automatically."},
{ch:"Ch5",s:"Defense",q:"robots.txt creates an unintended OSINT vulnerability because:",o:["robots.txt files contain server configuration and encryption keys","Search engines ignore robots.txt making it ineffective","Attackers read robots.txt to find sensitive paths the organization tried to hide from crawlers","robots.txt prevents DLP tools from monitoring uploaded files"],a:2,e:"robots.txt paradox: 'Disallow: /internal-docs' tells Google not to index it. But attackers READ robots.txt first — it's a roadmap to sensitive locations. Better: require authentication on sensitive paths rather than relying on robots.txt exclusion."},
{ch:"Ch5",s:"Defense",q:"Restricting out-of-office email replies to internal recipients only prevents:",o:["Phishing emails from reaching employees during their absence","Spam campaigns using the mail server for mass email","External attackers from harvesting absence schedules, substitute contacts, and organizational relationships","SQL injection attacks through email header manipulation"],a:2,e:"OOO restriction: external senders get generic response or no response. Internal colleagues get full OOO with details. This prevents: absence schedule harvesting, substitute contact enumeration, organizational relationship mapping, timing attacks during absences."},

// ══ CH6 (48) ══
{ch:"Ch6",s:"SE Foundation",q:"Social engineering is described as both an art and a science. What can ONLY be learned through real-world practice?",o:["The psychological theory behind why humans are susceptible to manipulation","The historical examples of social engineering attacks and their outcomes","The art — adapting to unpredictable human reactions, reading nonverbal signals, recovering from unexpected responses","The technical tools used to support social engineering operations"],a:2,e:"Art requires experience: theory explains WHY humans comply. Practice teaches HOW to adapt when the target goes off-script, how to read nonverbal signals in real-time, how to recover gracefully when something goes wrong. No book or lecture teaches this."},

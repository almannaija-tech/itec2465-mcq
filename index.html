<script>
const ALL_QUESTIONS = [

// ══════════════════════════════════════════
// CHAPTER 1 & 2
// ══════════════════════════════════════════
{ch:"Ch1-2",slide:"CIA Triad",q:"What does Confidentiality in the CIA Triad mean?",opts:["Data is available when needed","Only authorized people can view data","Data cannot be changed","All users have equal access"],ans:1,exp:"Confidentiality = keeping secrets. Only authorized people can view data. Breach example: stolen laptop, shoulder surfing. Fix: encryption, authentication."},
{ch:"Ch1-2",slide:"CIA Triad",q:"An attacker changes the amount in a bank transfer from $100 to $10,000. Which CIA principle is violated?",opts:["Availability","Confidentiality","Integrity","Authentication"],ans:2,exp:"Integrity = data must not be changed by unauthorized people. Fix: permissions (read-only), backups."},
{ch:"Ch1-2",slide:"CIA Triad",q:"A DoS attack brings down a company's server. Which CIA principle is violated?",opts:["Confidentiality","Integrity","Availability","Non-repudiation"],ans:2,exp:"Availability = data must be accessible when needed. Breach: server crash, power failure, DoS attack. Fix: backups, redundancy, maintenance."},
{ch:"Ch1-2",slide:"Attack Equation",q:"What is the Attack Equation?",opts:["Attack = Tool + Target + Time","Attack = Motive + Method + Vulnerability","Attack = Hacker + Network + Access","Attack = Skill + Speed + Stealth"],ans:1,exp:"Attack = Motive (why) + Method (how) + Vulnerability (the weakness). All three must be present for an attack to succeed."},
{ch:"Ch1-2",slide:"5 Phases",q:"What is the correct order of the 5 phases of hacking?",opts:["Scanning → Recon → Gaining Access → Maintaining → Clearing","Recon → Scanning → Gaining Access → Maintaining Access → Clearing Tracks","Gaining Access → Recon → Scanning → Maintaining → Clearing","Clearing → Maintaining → Gaining Access → Scanning → Recon"],ans:1,exp:"1. Reconnaissance, 2. Scanning, 3. Gaining Access, 4. Maintaining Access, 5. Clearing Tracks. Must be done in order."},
{ch:"Ch1-2",slide:"5 Phases",q:"Which phase involves installing backdoors and rootkits?",opts:["Reconnaissance","Scanning","Gaining Access","Maintaining Access"],ans:3,exp:"Maintaining Access = ensuring they can come back later. Methods: backdoors, rootkits, Trojans. Goal: continually steal data or use machine for future attacks."},
{ch:"Ch1-2",slide:"5 Phases",q:"Clearing Tracks involves:",opts:["Encrypting stolen data","Deleting logs, spoofing IP, overwriting evidence","Installing a firewall","Creating new user accounts"],ans:1,exp:"Clearing Tracks = hiding evidence to avoid prosecution. Methods: overwriting system logs, deleting command history, spoofing IP so it looks like attack came from elsewhere."},
{ch:"Ch1-2",slide:"Hacker Classes",q:"Which hacker type hacks WITHOUT permission but reports the bug instead of selling it?",opts:["Black Hat","White Hat","Gray Hat","Script Kiddie"],ans:2,exp:"Gray Hat: works offensively and defensively. Hacks without permission to find bugs, but reports them instead of exploiting them for personal gain."},
{ch:"Ch1-2",slide:"Hacker Classes",q:"Which hacker type is considered the MOST dangerous insider threat?",opts:["Black Hat","Script Kiddie","Insider Threat","Hacktivist"],ans:2,exp:"Insider Threat: a trusted employee or contractor who already has privileged access and uses it to violate rules or steal assets. Most dangerous because they already have access."},
{ch:"Ch1-2",slide:"Hacker Classes",q:"State-Sponsored hackers are characterized by:",opts:["Low skill and motivation","Working alone for financial gain","Unlimited time and funding, goal is intelligence gathering","Hacking for fun without a specific goal"],ans:2,exp:"State-Sponsored: employed by governments, unlimited time and funding. Goal: top-secret intelligence gathering or damaging enemy infrastructure."},
{ch:"Ch1-2",slide:"Hacker Classes",q:"A Hacktivist's common tactic is:",opts:["Ransomware deployment","Web Defacement","ATM skimming","SQL injection"],ans:1,exp:"Hacktivist: hacks to promote a political agenda. Common tactic: Web Defacement — changing a website's homepage to display a political message."},
{ch:"Ch1-2",slide:"Real World",q:"Stuxnet was significant because it:",opts:["Was the first email virus","Physically destroyed nuclear centrifuges using 4 zero-days","Stole credit card data from millions","Was created by a single hacker"],ans:1,exp:"Stuxnet: nation-state worm targeting Iran's nuclear centrifuges (Siemens industrial controllers). Used 4 zero-day vulnerabilities and physically destroyed the centrifuges. First known cyberweapon to cause physical damage."},
{ch:"Ch1-2",slide:"Real World",q:"How did Chris Chaney (Hollywood Hacker) access celebrity accounts?",opts:["He used advanced SQL injection","He bought stolen credentials on the dark web","He guessed security question answers using public information","He installed keyloggers on their computers"],ans:2,exp:"Chris Chaney had ZERO technical skills. He used 'Forgot Password' and guessed security question answers (like pet names) using publicly available info found online."},
{ch:"Ch1-2",slide:"Social Engineering",q:"What is the difference between Tailgating and Piggybacking?",opts:["They are the same thing","Tailgating is digital, Piggybacking is physical","Tailgating is WITHOUT the employee's knowledge, Piggybacking is WITH their knowledge/permission","Piggybacking uses a device, Tailgating uses a person"],ans:2,exp:"Tailgating: following through a secure door WITHOUT knowledge or permission. Piggybacking: same physical action BUT with the knowledge and permission of the employee."},
{ch:"Ch1-2",slide:"Attack Types",q:"Sniffing and eavesdropping are examples of:",opts:["Active attacks","Close-in attacks","Passive attacks","Supply chain attacks"],ans:2,exp:"Passive attacks: attacker does not change anything — only watches or listens. Goal: steal information quietly. Examples: sniffing, eavesdropping, monitoring network traffic."},
{ch:"Ch1-2",slide:"Data States",q:"A file currently open in Microsoft Word is an example of:",opts:["Data at Rest","Data in Transit","Data in Process","Data in Storage"],ans:2,exp:"Data in Process = currently being used by the user or CPU. Data at Rest = stored on hard drives/USB. Data in Transit = moving across a network."},

// ══════════════════════════════════════════
// CHAPTER 3 — APT
// ══════════════════════════════════════════
{ch:"Ch3",slide:"APT Definition",q:"What does 'Persistent' mean in APT?",opts:["The attack happens very fast","The attacker keeps long-term access and can return after partial cleanup","The malware is very large","The attack targets many organizations at once"],ans:1,exp:"Persistent: attacker tries to maintain access for a long time, creating backup paths like hidden admin accounts. The danger is long-term spying and repeated re-entry."},
{ch:"Ch3",slide:"APT Definition",q:"What is a Zero-Day vulnerability?",opts:["A vulnerability discovered exactly at midnight","A software weakness with no patch available yet","A vulnerability that only works once","An old unpatched vulnerability"],ans:1,exp:"Zero-Day: a software weakness with no patch available because it is new or not publicly known. Even fully updated systems can be attacked. Defense = behavior monitoring, not patching."},
{ch:"Ch3",slide:"APT Definition",q:"Why is Custom Malware undetectable by standard antivirus?",opts:["It is encrypted with AES-256","It runs only in RAM","It is brand new and written for one target — no signature exists in any antivirus database","It disguises itself as a system file"],ans:2,exp:"Custom Malware: written specifically for one target. Because it is unique, antivirus has no 'wanted poster' (signature) for it. Signature-based AV cannot detect what it has never seen."},
{ch:"Ch3",slide:"APT vs PenTest",q:"What is the key difference between APT and Penetration Testing regarding SCOPE?",opts:["Pen tests use more advanced tools","Pen tests have defined limits and exclude certain systems; APTs target anything valuable","APTs are shorter in duration","Pen tests are illegal"],ans:1,exp:"Scope: pen tests have a defined list of systems and actions included/excluded to protect business operations. APTs have no limits — they target anything valuable."},
{ch:"Ch3",slide:"Teams",q:"Which team turns attack techniques into immediate security improvements through collaboration?",opts:["Red Team","Blue Team","White Team","Purple Team"],ans:3,exp:"Purple Team: collaboration between Red and Blue to improve detection and defenses quickly. Instead of 'Red vs Blue' it becomes 'Red helps Blue learn.' After Red shows the method, Blue creates a detection rule."},
{ch:"Ch3",slide:"Teams",q:"The White Team's role during a security exercise is:",opts:["To attack the organization","To defend the organization","To control rules, safety, and communication so production is not harmed","To analyze malware samples"],ans:2,exp:"White Team: controls rules, safety, and communication during exercises. Ensures legal and ethical boundaries. Stops test actions that could crash production servers."},
{ch:"Ch3",slide:"APT Lifecycle",q:"In the APT lifecycle, what happens during the Enumeration phase?",opts:["The attacker gathers public OSINT","Active discovery of service versions, user accounts, open ports, and configurations","The attacker exfiltrates data","The attacker installs persistence mechanisms"],ans:1,exp:"Enumeration: active discovery of technical details — service versions, user accounts, shared resources, configurations. It answers 'exactly what is running and how is it set up?'"},
{ch:"Ch3",slide:"APT Lifecycle",q:"What is Pass-the-Hash (PtH)?",opts:["Cracking a password using a dictionary attack","Using a stolen credential hash to authenticate without knowing the actual password","Intercepting a login session in transit","Brute forcing an admin account"],ans:1,exp:"Pass-the-Hash: using a stolen credential HASH to authenticate to other systems without knowing the actual password. In some environments, the hash itself acts as a login token."},
{ch:"Ch3",slide:"APT Lifecycle",q:"DNS Tunneling is used for:",opts:["Speeding up DNS queries","Hiding data inside DNS queries for exfiltration — because DNS is usually allowed through firewalls","Poisoning DNS cache to redirect users","Blocking DNS traffic from attackers"],ans:1,exp:"DNS Tunneling: hides data inside DNS queries and responses. Attackers abuse DNS because it is almost always allowed through firewalls. Detected by long random subdomains or high query volume."},
{ch:"Ch3",slide:"APT Lifecycle",q:"Timestomping is used to:",opts:["Speed up file transfers","Encrypt file metadata","Change file timestamps so malicious files look older or normal to confuse investigators","Delete all files after exfiltration"],ans:2,exp:"Timestomping: changing file timestamps so malicious files look like they were created at a normal time. Defenders must cross-check with SIEM logs, backups, and endpoint telemetry."},
{ch:"Ch3",slide:"SOC & Tools",q:"What is the difference between SIEM and SOAR?",opts:["SIEM blocks attacks, SOAR detects them","SIEM collects and correlates logs into alerts; SOAR automates response actions using playbooks","SIEM is hardware, SOAR is software","They are the same tool"],ans:1,exp:"SIEM: collects logs from many sources, correlates events into meaningful alerts. SOAR: automates common response actions using playbooks. Example: SOAR auto-blocks a malicious IP and creates an incident ticket."},
{ch:"Ch3",slide:"SOC & Tools",q:"Dwell Time refers to:",opts:["How long it takes to detect an attack","How long it takes to respond to an attack","How long an attacker remains inside the network undetected","How long a system takes to reboot after an attack"],ans:2,exp:"Dwell Time: how long an attacker stays inside the network without being detected. Short dwell time = strong monitoring. Long dwell time = attacker can spy, move, and steal quietly."},
{ch:"Ch3",slide:"Blue Team",q:"What does a Threat Hunter do differently from a SOC Analyst?",opts:["Threat hunters only analyze malware","Threat hunters proactively SEARCH for hidden threats even when no alert has fired","Threat hunters only work after a confirmed breach","Threat hunters manage the SIEM"],ans:1,exp:"Threat Hunter: proactively searches for signs of attackers even when no security tool has raised an alert. APTs often avoid detection tools, so hunting finds stealthy activity early."},
{ch:"Ch3",slide:"Incident Response",q:"What is the correct order of the Incident Response lifecycle?",opts:["Detect → Prepare → Contain → Eradicate → Recover → Learn","Prepare → Detect → Contain → Eradicate → Recover → Lessons Learned","Contain → Detect → Prepare → Recover → Eradicate → Learn","Eradicate → Prepare → Detect → Contain → Recover → Learn"],ans:1,exp:"1. Preparation, 2. Detection, 3. Containment, 4. Eradication, 5. Recovery, 6. Lessons Learned. Preparation happens BEFORE the incident, not after."},
{ch:"Ch3",slide:"Frameworks",q:"NIST CSF organizes cybersecurity into 5 functions. Which is NOT one of them?",opts:["Identify","Protect","Audit","Recover"],ans:2,exp:"NIST CSF: Identify, Protect, Detect, Respond, Recover. 'Audit' is not one of the 5 functions. It ensures balanced security — not just prevention but also detection and recovery."},

// ══════════════════════════════════════════
// CHAPTER 4
// ══════════════════════════════════════════
{ch:"Ch4",slide:"Honeypots",q:"What type of honeypot uses full OS and is used to understand attacker TTPs in depth?",opts:["Low Interaction","Honeytoken","High Interaction","CASB"],ans:2,exp:"High Interaction honeypot: full OS, complete attacker interaction, comprehensive logging. Used to understand attacker TTPs, analyze malware, and research APT behavior."},
{ch:"Ch4",slide:"Honeypots",q:"A Honeytoken is:",opts:["A physical hardware trap","Fake data (API keys, credentials) that triggers alerts when accessed — no infrastructure needed","A full honeypot server with decoy services","A type of IDS signature"],ans:1,exp:"Honeytokens: fake data that triggers alerts when accessed. No infrastructure required. Used for data theft detection, credential monitoring, and detecting insider threats. Examples: canary tokens, fake API keys."},
{ch:"Ch4",slide:"Port Scanning Detection",q:"A host connects to 25 different ports within 60 seconds from a single IP. What detection method catches this?",opts:["Honeypot access alert","Connection Threshold Monitoring","Zone Transfer Monitoring","OCR Content Analysis"],ans:1,exp:"Connection Threshold Monitoring: alert when a host connects to 20+ different ports within 60 seconds from a single source IP. This pattern strongly indicates port scanning activity."},
{ch:"Ch4",slide:"DLP",q:"What is the correct order of DLP policy actions from least to most severe?",opts:["Block → Quarantine → Encrypt → Alert → Log","Log → Alert → Encrypt → Quarantine → Block","Alert → Log → Block → Quarantine → Encrypt","Quarantine → Block → Encrypt → Alert → Log"],ans:1,exp:"In escalating severity: Log → Alert → Encrypt → Quarantine → Block. Start with monitoring before enforcing blocking to reduce false positives."},
{ch:"Ch4",slide:"DLP",q:"What does CASB stand for and what does it provide?",opts:["Cyber Attack Security Broker; provides firewall management","Cloud Access Security Broker; provides visibility over shadow IT and DLP policy enforcement in cloud apps","Content Analysis Security Bot; provides email filtering","Centralized Authentication Security Baseline; provides MFA"],ans:1,exp:"CASB (Cloud Access Security Broker): visibility over shadow IT, DLP policy enforcement in O365/Workspace/Salesforce, threat protection, regulatory compliance (GDPR, HIPAA, PCI-DSS)."},
{ch:"Ch4",slide:"Email Security",q:"What does DKIM do?",opts:["Defines which mail servers are authorized to send on behalf of your domain","Adds a cryptographic signature to email headers to ensure it was not modified in transit","Tells receivers what to do when authentication fails","Blocks all spam emails automatically"],ans:1,exp:"DKIM (DomainKeys Identified Mail): adds a cryptographic signature to email headers. Receiving servers verify it using a public key in DNS. Ensures email was not modified in transit."},
{ch:"Ch4",slide:"Email Security",q:"DMARC policy 'reject' means:",opts:["Monitor and log SPF/DKIM failures","Move failed emails to spam folder","Block all emails that fail SPF/DKIM checks","Delete all external emails"],ans:2,exp:"DMARC policies: none = monitor only, quarantine = spam folder, reject = block completely. DMARC tells receivers what to do when SPF/DKIM fail and provides aggregate reports."},
{ch:"Ch4",slide:"OSINT",q:"Which OSINT tool is used for automated subdomain enumeration?",opts:["Wireshark","theHarvester","Amass","Nessus"],ans:2,exp:"Amass: performs comprehensive subdomain enumeration using multiple data sources. Part of the DNS & Domain category of OSINT tools. Also useful: Subfinder, DNSDumpster, SecurityTrails."},
{ch:"Ch4",slide:"Social Engineering",q:"Which social engineering type uses SMS phishing?",opts:["Vishing","SMiShing","Spear Phishing","Pretexting"],ans:1,exp:"SMiShing: SMS-based phishing. Vishing = voice phishing via phone calls. Spear Phishing = targeted email using personal info. Pretexting = fabricated scenario to extract info."},
{ch:"Ch4",slide:"Defense in Depth",q:"The 'Human Layer' in Defence-in-Depth for reconnaissance protection includes:",opts:["Firewalls and WAF","IDS/IPS and honeypots","Security awareness training, verification procedures, and phishing simulations","DLP and email security gateways"],ans:2,exp:"Human Layer: security awareness training, verification procedures (callback protocols), phishing simulations. Specifically defends against social engineering — the attack vector that bypasses all technical controls."},

// ══════════════════════════════════════════
// CHAPTER 5
// ══════════════════════════════════════════
{ch:"Ch5",slide:"Recon Categories",q:"What does HUMINT stand for?",opts:["Hardware Unified Machine Intelligence Network","Human Intelligence — collected from people via social engineering, phone calls, eavesdropping","Hybrid Unified Management Information Technology","High-value User Machine Intrusion Network Topology"],ans:1,exp:"HUMINT = Human Intelligence. Collected FROM people through social engineering, phone calls, eavesdropping, and direct interaction. Not the same as social engineering itself — it's the category of intelligence gathered through human sources."},
{ch:"Ch5",slide:"Recon Categories",q:"FININT provides what type of intelligence?",opts:["Location and GPS data","Financial records, SEC filings, quarterly reports, and acquisitions data","Network fingerprinting and IP ranges","Employee social media profiles"],ans:1,exp:"FININT = Financial Intelligence. Sources: SEC filings, quarterly reports, acquisitions, financial records. Useful for understanding company health, key investments, and financial relationships."},
{ch:"Ch5",slide:"Search Engine",q:"An attacker uses: site:target.com inurl:admin. What are they looking for?",opts:["PDF documents on the target domain","Admin interfaces accessible on the target domain","Cached versions of deleted pages","Subdomains of the target"],ans:1,exp:"inurl:admin = pages where 'admin' appears in the URL. Combined with site:target.com = only on the target domain. This finds exposed administrative interfaces that shouldn't be publicly accessible."},
{ch:"Ch5",slide:"Search Engine",q:"The cache: Google operator is used to:",opts:["Speed up search results","View an archived/cached copy of a page — useful when original is deleted or changed","Find files on a specific domain","Search within a specific file type"],ans:1,exp:"cache: shows the archived/cached copy of a page. Attackers use it to see old versions of pages that may contain information since removed — deleted job postings, old configs, removed employee directories."},
{ch:"Ch5",slide:"Search Engine",q:"What intelligence do job postings give an attacker?",opts:["Employee home addresses","The CEO's phone number","Technologies in use and department naming conventions","VPN credentials"],ans:2,exp:"Job postings reveal: 1) Technologies in use ('must know Cisco, Palo Alto, Azure') and 2) Department naming conventions. This tells attackers exactly what systems the company runs without touching their network."},
{ch:"Ch5",slide:"Directory Harvesting",q:"What is the first step in directory harvesting?",opts:["Build a spreadsheet","Save HTML pages","Search directory using A-Z alphabet queries","Remove duplicates"],ans:2,exp:"Step 1: Search directory using A-Z alphabet queries (search 'A', then 'B', etc.). Step 2: Save HTML pages. Step 3: Extract info. Step 4: Remove duplicates. Step 5: Build spreadsheet."},
{ch:"Ch5",slide:"Directory Harvesting",q:"Why does a stateful/cookie-based directory NOT stop an attacker from automating queries?",opts:["Because cookies expire immediately","Because attackers can replay valid cookies with different query payloads — the session is just copied","Because cookies don't work on directory pages","Because stateful sessions don't use authentication"],ans:1,exp:"Stateful design alone does NOT prevent automation. Attackers copy a valid session cookie and replay it with different search payloads (different letters A-Z). The server sees a valid session — it just doesn't know it's automated."},
{ch:"Ch5",slide:"Email Harvesting",q:"What is theHarvester?",opts:["A physical device for intercepting email","An automated tool that discovers email addresses and hostnames from multiple search engines","A Metasploit module for email spoofing","A Google Dork for finding email addresses"],ans:1,exp:"theHarvester: automated tool for email and hostname discovery from multiple sources simultaneously (Google, Bing, LinkedIn, Shodan). Used in technical email harvesting during recon phase."},
{ch:"Ch5",slide:"Email Harvesting",q:"An attacker sends this email: 'Hi, I am a finance student and found you on LinkedIn. Can you point me to the right contact for job opportunities?' What is this?",opts:["Spear phishing with a malicious attachment","Nontechnical email harvesting via pretexting","A watering hole attack","A baiting attack"],ans:1,exp:"Nontechnical email harvesting via pretexting. The reply reveals: full signature, title, phone number, email format, and who covers for them. It's an 'exploitless exploit' — no malware, just a believable innocent email."},
{ch:"Ch5",slide:"Email Harvesting",q:"What nontechnical intelligence can be obtained from out-of-office email replies?",opts:["The company's firewall rules","Employee absence schedules and substitute contact names","The mail server software version","The company's VPN gateway address"],ans:1,exp:"Out-of-office messages reveal: when the employee is away, when they return, and who to contact instead (substitute name and contact info). This is valuable for timing attacks and expanding the target list."},
{ch:"Ch5",slide:"GEOINT",q:"What hidden data source in photos gives attackers precise location information?",opts:["Pixel metadata","EXIF data (GPS coordinates embedded in photos)","Photo filename","Image resolution"],ans:1,exp:"EXIF metadata: GPS coordinates are automatically embedded in photos taken by smartphones. Attackers extract this data to find exact home/office/travel locations. Defense: strip EXIF metadata before publishing photos."},
{ch:"Ch5",slide:"GEOINT",q:"BatchGeo is used to:",opts:["Crack GPS encryption","Upload addresses and build a visual map with pins to visualize office and employee locations","Enumerate subdomains using geography-based DNS","Track employee social media posts in real time"],ans:1,exp:"BatchGeo: upload a list of addresses → automatically builds a visual map with pins. Used to map office locations, employee clusters, partner sites, and identify physical coverage gaps."},
{ch:"Ch5",slide:"Individual Recon",q:"If an attacker's goal is IT access, which employee do they primarily target?",opts:["CFO","CIO / Sysadmin / Help Desk","Receptionist","Marketing Manager"],ans:1,exp:"IT access goal → target CIO, Sysadmins, Help Desk. Financial goal → CFO. Physical access → Facilities/Security staff. Data exfiltration → Data owners/Analysts. Target selection depends on the attack objective."},
{ch:"Ch5",slide:"Nontraditional Sources",q:"What is a watering hole in the reconnaissance context?",opts:["A server honeypot designed to catch attackers","An employee-created forum or group that the organization doesn't know is public — contains internal info","A technique to infect a website the target frequently visits","A method of intercepting WiFi at coffee shops"],ans:1,exp:"Watering hole in recon context = employee-created forums, Reddit groups, or Slack communities that employees created without the company's knowledge. These often contain internal tech details, complaints, and sensitive information."},
{ch:"Ch5",slide:"Nontraditional Sources",q:"Which of the following is a nontraditional information repository for company data?",opts:["Google Dorks","SEC filings","DNS WHOIS records","LinkedIn"],ans:1,exp:"SEC filings: government-required financial disclosures for publicly traded companies. Available at sec.gov. Contain company structure, financial health, executive names, acquisitions, and technology investments."},
{ch:"Ch5",slide:"Partners",q:"Why do attackers research a company's partners and contractors?",opts:["To find their office addresses","Partners/contractors may have privileged access to the target's systems — compromising them gives a trusted entry point","To identify the company's revenue","To find the company's customer list"],ans:1,exp:"Partners/contractors with privileged access = supply chain entry point. This is why supply chain attacks (like SolarWinds) are so dangerous — the attacker enters through a trusted, already-authorized door."},
{ch:"Ch5",slide:"Defense",q:"Name 3 defensive countermeasures against directory harvesting.",opts:["SPF, DKIM, DMARC","CAPTCHA, rate limiting, and monitoring for alphabet-sweep query patterns","Firewall rules, IDS signatures, honeypots","robots.txt, noindex tags, HTTPS"],ans:1,exp:"Directory harvesting defenses: 1) CAPTCHA — prevents automated queries. 2) Rate limiting — slows bulk requests. 3) Monitor logs for alphabet-sweep patterns (A, B, C... D queries in sequence from same IP)."},
{ch:"Ch5",slide:"osintstalker",q:"What does geostalker do as part of the osintstalker toolset?",opts:["Stalks targets' financial transactions","Collects GPS metadata from images across multiple platforms and maps where the target goes","Monitors target's email communications","Scans the target's network for open ports"],ans:1,exp:"geostalker: automates geo-metadata acquisition from images, pulls location data from multiple platforms, maps where target goes and frequents, enables inference of home/work/vacation locations and daily routine."},

{ch:"Ch6",slide:"SE Definition",q:"Social engineering exploits:",opts:["Software vulnerabilities","Network protocol weaknesses","Human psychology","Hardware backdoors"],ans:2,exp:"Social engineering is the art of convincing people to reveal confidential information by exploiting HUMAN PSYCHOLOGY — not technology. Humans are often the weakest security link."},
{ch:"Ch6",slide:"SE Science vs Art",q:"The 'art' of social engineering can only be acquired through:",opts:["University courses and textbooks","Real-world practice — making mistakes and learning from people","Watching tutorial videos","Reading psychology books"],ans:1,exp:"Science = study of psychological triggers, learnable from theory. Art = can ONLY be acquired through real-world practice — actual human interaction, making mistakes, and adapting. No book can fully teach it."},
{ch:"Ch6",slide:"8 Strategies",q:"Which strategy means everything — story, appearance, behavior — must be perfectly consistent?",opts:["KISS","Don't Lie","Be Congruent","Preparation"],ans:2,exp:"Be Congruent: everything must match. Your story, appearance, email signature, body language, and supporting documents must all align perfectly. Any inconsistency triggers suspicion."},
{ch:"Ch6",slide:"8 Strategies",q:"Why does KISS (Keep It Simple Stupid) work better than a complex story?",opts:["Complex stories take too long to tell","Simple stories require less preparation","Complex stories have more points of failure — more details to contradict under pressure","KISS means using technical jargon to confuse the target"],ans:2,exp:"KISS works because complex stories have more points of failure. Under pressure, attackers must remember every detail. Simple stories feel natural, are easier to maintain, and easier to adapt when target goes off-script."},
{ch:"Ch6",slide:"8 Strategies",q:"The 'Don't Lie' strategy uses:",opts:["The full truth to build trust","Incomplete truths — letting the target's assumptions fill the gaps","Direct lies that are carefully rehearsed","Complete silence when challenged"],ans:1,exp:"Don't Lie: use incomplete truths and omissions. Let the target's own assumptions fill the gaps. Direct lies require exact wording and are easy to contradict. Incomplete truths are technically not lies and are much harder to catch."},
{ch:"Ch6",slide:"8 Strategies",q:"What is the 'Don't Get Caught' strategy?",opts:["Always wear a disguise","Always have a graceful exit line BEFORE entering any SE scenario — walk away if target gets suspicious","Never speak to more than one person","Use a fake name at all times"],ans:1,exp:"Don't Get Caught: prepare a graceful exit before every scenario. If a target becomes suspicious, do NOT push — walk away immediately. For every suspicious person, there are 4 cooperative ones. Preserve future attempts."},
{ch:"Ch6",slide:"Legitimacy Triggers",q:"Which of the following is a legitimacy trigger?",opts:["Speaking loudly and confidently","Knowing the target's manager's name","Wearing a uniform or badge with a corporate logo","Arriving before business hours"],ans:2,exp:"Legitimacy triggers = visual/contextual cues that make the attacker appear official. Examples: business card with logo, uniform/badge, corporate email domain, official envelope, clipboard, descriptive job title."},
{ch:"Ch6",slide:"Personality Types",q:"A 'Worker Bee' personality type is best approached by:",opts:["Building a long personal relationship first","Getting straight to the point — they are task-focused and just want to finish their job","Using fear and authority","Showing vulnerability and asking for help"],ans:1,exp:"Worker Bee: task-oriented, focused, just wants to complete their work. Best approach: be efficient, don't waste their time, frame your request as helping them complete their task faster."},
{ch:"Ch6",slide:"SE Phases",q:"In Phase 2 of a social engineering attack, the attacker:",opts:["Researches the organization extensively","Selects specific targets — identifying frustrated, overworked, or naive employees who are more susceptible","Builds rapport over multiple interactions","Extracts the actual sensitive information"],ans:1,exp:"Phase 2 = Select a Target. Choose employees who are more susceptible: frustrated (unhappy with company), overworked (too busy to think carefully), or naive (new employees who don't know all procedures)."},
{ch:"Ch6",slide:"3 Exploitation Methods",q:"Which of the following is NOT one of the 3 technical spear-phishing exploitation methods?",opts:["Phishing websites","Client-side exploits","Custom Trojan backdoor","Deauthentication attack"],ans:3,exp:"The 3 technical methods: 1) Phishing websites, 2) Client-side exploits, 3) Custom Trojan backdoor. Deauthentication is a wireless attack technique from Ch7, not a spear-phishing exploitation method."},
{ch:"Ch6",slide:"Phishing Website",q:"After a victim submits credentials on a phishing website, the attacker typically:",opts:["Shows an error message and closes the browser","Redirects the victim to the real website so they don't suspect anything","Sends an alert email to the victim","Locks the victim's real account"],ans:1,exp:"After capturing credentials, the attacker redirects the victim to the real website. The victim thinks it was a timeout or error and logs in again normally — never realizing their credentials were stolen."},
{ch:"Ch6",slide:"Client-Side Exploit",q:"A client-side exploit targets:",opts:["The organization's web server","The company's firewall","Software running on the victim's own machine (Word, PDF, browser)","The DNS server"],ans:2,exp:"Client-side exploit: attacks a vulnerability in software running on the VICTIM'S machine. Attacker sends a crafted file — victim opens it — malicious code executes. Server is never directly attacked."},
{ch:"Ch6",slide:"Custom Trojan",q:"Which delivery method relies on the victim's OWN curiosity to install the Trojan?",opts:["Email attachment","Bundled with pirated software — victim installs it themselves","File sharing services","USB drop in parking lot"],ans:1,exp:"Bundled with pirated software: victim downloads cracked software and installs it themselves. The Trojan is hidden inside the legitimate-looking installer. The victim is tricked into installing malware voluntarily."},
{ch:"Ch6",slide:"Custom Trojan",q:"Once installed, a custom Trojan backdoor enables all EXCEPT:",opts:["Remote shell access","Keylogging (capturing keystrokes)","Patching the victim's antivirus","Webcam/microphone activation"],ans:2,exp:"A Trojan enables: remote shell, keylogging, screenshot capture, webcam/mic activation, file upload/download, network pivot. It does NOT patch the victim's antivirus — that's not an attacker goal."},
{ch:"Ch6",slide:"SE Techniques",q:"Quid Pro Quo is:",opts:["Following someone through a secure door","Watching someone type their password","Offering a service in exchange for information or credentials ('free tech support' for credentials)","Searching trash for sensitive documents"],ans:2,exp:"Quid Pro Quo: 'something for something.' Attacker offers a service (usually 'free tech support') in return for credentials or access. Victim feels they're getting a good deal while being exploited."},
{ch:"Ch6",slide:"SE Techniques",q:"SMiShing is phishing via:",opts:["Social media platforms","Email with spoofed addresses","SMS text messages","Voice phone calls"],ans:2,exp:"SMiShing = SMS Phishing. Vishing = Voice phishing. Phishing = email. Spear phishing = targeted email. SMiShing targets mobile phone users with fake text messages that contain malicious links or requests."},
{ch:"Ch6",slide:"Targets",q:"Why is the Help Desk a prime target for social engineers?",opts:["They have the most money","They are trained to help people — making them vulnerable to social manipulation","They have physical access to all floors","They know the company's financial details"],ans:1,exp:"Help Desk: trained to help people. This helpfulness is weaponized. Attackers call claiming to be a distressed employee who needs urgent access restored. The help desk's job instinct is to assist — even if verification is skipped."},

{ch:"Ch7",slide:"Remote Recon",q:"Remote presence reconnaissance specifically targets:",opts:["Servers inside the corporate data center","Employees operating OUTSIDE the organization's physical security perimeter — remote workers, travelers, field staff","The company's cloud infrastructure","Executive email accounts"],ans:1,exp:"Remote presence recon: focuses on employees beyond direct corporate protection — remote workers on home WiFi, travelers in airports/hotels/cafes, field staff using personal devices. These people are outside enterprise security coverage."},
{ch:"Ch7",slide:"Remote Recon",q:"Why are cafes, airports, and hotels prime attack locations for wireless targeting?",opts:["They have weak physical security","Targets connect to public WiFi — prime environments for Evil Twin and MitM attacks","They are close to the corporate office","Attackers can easily steal physical devices there"],ans:1,exp:"Cafes, airports, hotels = locations where employees connect to public/unsecured WiFi. Attackers set up Evil Twin APs in these locations, knowing their targets will connect. Identified by profiling via social media and travel bookings."},
{ch:"Ch7",slide:"Wireless Phases",q:"What is the CORRECT order of the 3 wireless attack phases?",opts:["Attack APs → Recon → Attack Clients","Wireless Recon → Attack Access Points → Attack Wireless Clients","Attack Clients → Recon → Attack APs","Wireless Recon → Attack Clients → Attack APs"],ans:1,exp:"Phase 1: Wireless Reconnaissance (identify all networks, map APs, determine encryption). Phase 2: Attack Access Points (crack WEP/WPA, exploit WPS). Phase 3: Attack Wireless Clients (Evil Twin, deauth, captive portals)."},
{ch:"Ch7",slide:"Wireless Phases",q:"Why are Phase 3 client-side attacks often more successful than Phase 2 access point attacks?",opts:["Phase 3 uses more advanced tools","Users are the weakest link — easier to exploit than hardened infrastructure","Phase 3 requires less physical proximity","Phase 2 is illegal in most countries"],ans:1,exp:"Client attacks (Phase 3) target human behavior and automatic device behavior (auto-reconnect to strongest signal). Hardened WPA2 encryption may be uncrackable in reasonable time, but users will connect to a convincing Evil Twin."},
{ch:"Ch7",slide:"Wireless Tools",q:"Which tool performs PASSIVE wireless network discovery without transmitting any packets?",opts:["Aircrack-ng","Airodump-ng","Kismet","Nmap"],ans:2,exp:"Kismet: passive wireless network detector and sniffer. Discovers all networks including hidden SSIDs WITHOUT transmitting — completely invisible to standard wireless intrusion detection systems."},
{ch:"Ch7",slide:"Wireless Tools",q:"What hardware is specifically required for wireless attacks that regular laptop WiFi cards cannot do?",opts:["A 5G cellular modem","An external wireless adapter supporting monitor mode and packet injection (e.g., Alfa AWUS036ACH)","A directional Bluetooth antenna","A hardware keylogger"],ans:1,exp:"External wireless adapter with monitor mode + packet injection support is required. Built-in laptop WiFi cards cannot do packet injection. The Alfa AWUS036ACH is the most common example used in security testing."},
{ch:"Ch7",slide:"Wireless Tools",q:"EAPHammer is specifically used for:",opts:["WEP cracking","WPS PIN attacks","Targeted evil twin attacks against WPA2-Enterprise networks to steal RADIUS credentials","Passive network monitoring"],ans:2,exp:"EAPHammer: targeted evil twin attacks specifically against WPA2-Enterprise. Sets up a fake RADIUS server to capture credentials when clients reconnect from the legitimate enterprise network to the evil twin."},
{ch:"Ch7",slide:"Wireless Recon",q:"How can an attacker reveal a hidden SSID without actively transmitting?",opts:["It is impossible to reveal hidden SSIDs without transmitting","By monitoring probe requests from client devices that broadcast names of networks they've previously joined","By checking the router's manual","By scanning the 5GHz band"],ans:1,exp:"Probe Requests: client devices automatically broadcast SSIDs of networks they've connected to before (looking for them). Attackers in monitor mode capture these probe requests — revealing the hidden SSID without any active transmission."},
{ch:"Ch7",slide:"WEP Cracking",q:"WEP cracking works because:",opts:["WEP uses no encryption","WEP uses weak RC4 encryption with predictable Initialization Vectors (IVs) that can be statistically analyzed","WEP passwords are always short","WEP has a known backdoor installed by manufacturers"],ans:1,exp:"WEP uses RC4 encryption with predictable IVs. Attacker captures 40,000-85,000 IVs using airodump-ng, then uses aircrack-ng's statistical analysis to recover the key. Usually cracked within minutes. Difficulty: EASY."},
{ch:"Ch7",slide:"WPS Attack",q:"The WPS PIN design flaw reduces possible combinations from 100 million to approximately:",opts:["50,000","11,000","1,000","500,000"],ans:1,exp:"WPS PIN design flaw: verified in two halves (4 digits + 3 digits + 1 checksum digit). This reduces from 10^8 (100 million) to approximately 11,000 combinations. Tool: Reaver. Can crack in hours."},
{ch:"Ch7",slide:"Evil Twin",q:"An Evil Twin AP attack involves:",opts:["Physically replacing a legitimate router with a rogue one","Creating a rogue AP that clones a legitimate AP's SSID so all victim traffic passes through the attacker's machine","Jamming all WiFi signals in an area","Installing malware directly on the legitimate router"],ans:1,exp:"Evil Twin: rogue AP clones legitimate AP's SSID (and optionally BSSID/MAC). Victims connect — ALL traffic passes through attacker's machine enabling full MitM interception, credential harvesting, and malware delivery."},
{ch:"Ch7",slide:"Evil Twin",q:"What real-world APT group used a 'Nearest Neighbor Attack' through WiFi?",opts:["Lazarus Group","APT28 (Fancy Bear)","Cozy Bear","Carbanak"],ans:1,exp:"APT28 (Fancy Bear — Russian state-backed) breached a US organization by first compromising nearby businesses' WiFi, then daisy-chaining through dual-homed devices to reach the target's enterprise wireless — no physical proximity required."},
{ch:"Ch7",slide:"Getting Clients to Connect",q:"Why do devices automatically connect to an Evil Twin with a stronger signal?",opts:["Devices always trust known SSIDs","802.11 standard: wireless clients automatically prefer the access point with the best signal strength — no user action required","Attackers hack the device's WiFi settings first","The Evil Twin has a security certificate that devices trust"],ans:1,exp:"Signal Enticement: 802.11 protocol has clients automatically roam to the strongest signal with a known SSID. The attacker simply broadcasts stronger than the real AP — devices connect automatically without any user interaction."},
{ch:"Ch7",slide:"Getting Clients to Connect",q:"What does a deauthentication attack send?",opts:["Fake DHCP offers","Forged 802.11 deauthentication frames to forcibly disconnect clients from the real AP","ARP poisoning packets","ICMP redirect messages"],ans:1,exp:"Deauthentication attack: sends forged 802.11 deauth frames. The 802.11 standard has no authentication for management frames — so any device can send deauth frames. Clients get disconnected and reconnect to the (stronger) evil twin."},
{ch:"Ch7",slide:"WPA-Enterprise",q:"Why can't WPA-Enterprise's RADIUS server be directly attacked?",opts:["RADIUS uses unbreakable quantum encryption","RADIUS is not directly attackable — instead attackers exploit CLIENT-SIDE weaknesses (accepting invalid certificates)","RADIUS requires physical access to attack","RADIUS is always behind a firewall"],ans:1,exp:"RADIUS protocol itself is not directly hackable. The attack targets CLIENT devices — which often accept invalid certificates without warning (especially Android), or use weak EAP methods like GTC that transmit credentials in cleartext."},
{ch:"Ch7",slide:"WPA-Enterprise",q:"In a WPA-Enterprise Evil Twin attack, what does the fake RADIUS server capture?",opts:["The AP's WPA2 passphrase","Cleartext credentials (GTC) or MSCHAPv2 hashes from authenticating clients","The network's RADIUS shared secret","The victim's MAC address only"],ans:1,exp:"Fake RADIUS captures: cleartext credentials if EAP method is GTC, or MSCHAPv2 hashes if PEAP. GTC = immediate access. MSCHAPv2 hashes = cracked offline with hashcat, then used for VPN/email access."},
{ch:"Ch7",slide:"AP Components",q:"What does the DHCP server on a rogue AP give the attacker?",opts:["Access to the victim's files","Full control over network configuration — assigns IPs, gateway, and DNS server addresses to all victims","The victim's username and password","The ability to clone the victim's MAC address"],ans:1,exp:"DHCP server: assigns IP addresses, subnet mask, default gateway, and DNS server to victims. By controlling DNS assignment, the attacker routes ALL victim DNS queries to their own DNS server — enabling full DNS spoofing."},
{ch:"Ch7",slide:"AP Components",q:"What enables DNS spoofing on a rogue AP?",opts:["The DHCP server assigning fake IPs","The DNS server resolving all victim domain queries to attacker-controlled IPs","The HTTP server injecting scripts","The iptables FORWARD chain"],ans:1,exp:"DNS spoofing: the rogue AP's DNS server resolves ALL domain names to attacker-controlled IPs. Victim types 'bank.com' → DNS returns attacker's fake server IP → victim sees perfect clone → credentials captured."},
{ch:"Ch7",slide:"Commands",q:"What does this command do: echo 1 > /proc/sys/net/ipv4/ip_forward",opts:["Starts the DHCP server on the rogue AP interface","Enables IP forwarding — makes Linux act as a router, forwarding victim traffic transparently (MitM)","Redirects all TCP traffic to the attacker's IP","Starts packet capture on the rogue AP interface"],ans:1,exp:"By default Linux drops packets not destined for itself. echo 1 > /proc/sys/net/ipv4/ip_forward enables kernel IP forwarding — Linux now acts as a router. Victim traffic flows through attacker transparently. ESSENTIAL for MitM."},
{ch:"Ch7",slide:"Commands",q:"What does: dhcpd3 -cf /etc/dhcp3.conf at0 do?",opts:["Captures packets on the at0 interface","Assigns IP addresses to victims connecting to the rogue AP (at0 = rogue AP interface)","Starts DNS spoofing on the at0 interface","Redirects all HTTP traffic to the attacker"],ans:1,exp:"dhcpd3: DHCP server daemon. -cf = config file. /etc/dhcp3.conf = the DHCP config. at0 = the rogue AP interface. This starts the DHCP server so connecting victims automatically get valid IP addresses and use the attacker's DNS."},
{ch:"Ch7",slide:"Commands",q:"What does: dnsspoof -i at0 -f dns.hosts do?",opts:["Captures all DNS traffic for analysis","Blocks all DNS requests from victims","Resolves ALL victim DNS queries to attacker-controlled addresses specified in dns.hosts file","Starts a fake DNS server on the internet"],ans:2,exp:"dnsspoof: spoofs DNS responses. -i at0 = listen on rogue AP interface. -f dns.hosts = use this file to map domain names to attacker-controlled IPs. Any domain a victim queries gets redirected to attacker's fake server."},
{ch:"Ch7",slide:"Commands",q:"What does this iptables command do:\niptables -t nat -A PREROUTING -p tcp --dport 1:65535 -j DNAT --to-destination 10.0.0.1",opts:["Blocks all TCP connections from the rogue AP","Redirects ALL victim TCP connections on every port (1-65535) to the attacker's IP address 10.0.0.1","Encrypts all traffic between victim and attacker","Assigns a static IP to the at0 interface"],ans:1,exp:"DNAT (Destination NAT): rewrites the destination of ALL TCP packets on ALL ports to 10.0.0.1 (attacker). Every web request, email, database query, remote session is forced through attacker-controlled fake services. Complete traffic hijack."},
{ch:"Ch7",slide:"Commands",q:"What does: tcpdump -i at0 -w capture.pcap do?",opts:["Starts packet injection on the at0 interface","Captures ALL raw network traffic on the rogue AP interface and saves to a PCAP file for Wireshark analysis","Cracks WPA handshakes","Monitors for new device connections"],ans:1,exp:"tcpdump: packet capture tool. -i at0 = capture on rogue AP interface. -w capture.pcap = write to PCAP file. Every packet — HTTP requests, DNS queries, emails, file transfers — is recorded for offline analysis with Wireshark."},
{ch:"Ch7",slide:"Commands",q:"What does: msfconsole -r servers.rc do?",opts:["Starts a single fake SSH server","Deploys ALL fake protocol servers simultaneously (SMTP, FTP, SSH, RDP, MySQL, HTTP) using a Metasploit resource script","Launches a brute force attack against the victim","Scans for open ports on victim devices"],ans:1,exp:"msfconsole -r servers.rc: Metasploit resource script launches all fake server auxiliary modules at once. One command deploys: fake SMTP, FTP, SMB, SSH, RDP, MySQL, HTTP servers. Each captures credentials for that protocol."},
{ch:"Ch7",slide:"Fake Servers",q:"An attacker's fake SMTP server on a rogue AP captures:",opts:["File server credentials","Email login credentials as clients check their mail through the rogue AP","Database admin passwords","Remote desktop session data"],ans:1,exp:"Fake SMTP/IMAP/POP3 server captures email login credentials. When victim's email client tries to sync mail through the rogue AP, it authenticates to the attacker's fake server — username and password captured immediately."},
{ch:"Ch7",slide:"Fake Servers",q:"SSLstrip is used to:",opts:["Generate fake SSL certificates","Downgrade HTTPS connections to HTTP so the attacker can read the cleartext traffic","Block all HTTPS traffic","Encrypt victim traffic to hide it from the victim"],ans:1,exp:"SSLstrip: intercepts HTTPS redirects and downgrades them to HTTP. Victim's browser connects over HTTP (not HTTPS) to the attacker's proxy which then connects to the real server over HTTPS. Login credentials sent in cleartext — captured by attacker."},
// Scenario questions Ch7
{ch:"Ch7",slide:"SCENARIO: Coffee Shop",q:"SCENARIO: Ahmed works remotely from a coffee shop every Tuesday. An attacker has profiled him. The coffee shop uses WPA2-PSK WiFi. Which attack approach is MOST effective against Ahmed?",opts:["Crack the WPA2-PSK key and then monitor his traffic","Deploy an Evil Twin AP with a stronger signal, deauthenticate Ahmed, intercept all his traffic when he reconnects","Physically steal his laptop when he goes to the bathroom","Send him a spear phishing email"],ans:1,exp:"Evil Twin is most effective: 1) Create AP with same SSID, 2) Stronger signal, 3) Send deauth frames to disconnect Ahmed, 4) Ahmed auto-reconnects to Evil Twin, 5) Enable IP forwarding + DHCP + DNS spoofing, 6) Capture all credentials. WPA2 cracking may take days; Evil Twin works immediately."},
{ch:"Ch7",slide:"SCENARIO: Coffee Shop",q:"SCENARIO (continued): Ahmed has connected to the Evil Twin. The attacker wants to intercept ALL his traffic including email and bank logins. What is the CORRECT sequence of commands?",opts:["1) tcpdump 2) dhcpd3 3) dnsspoof 4) iptables 5) echo ip_forward","1) echo ip_forward 2) dhcpd3 3) dnsspoof 4) iptables DNAT 5) tcpdump 6) msfconsole","1) iptables 2) echo ip_forward 3) tcpdump 4) dhcpd3 5) dnsspoof","1) msfconsole 2) iptables 3) dnsspoof 4) dhcpd3 5) tcpdump"],ans:1,exp:"Correct order: 1) Enable IP forwarding (echo 1 > ip_forward) 2) Start DHCP (dhcpd3) 3) Start DNS spoofing (dnsspoof) 4) Redirect all traffic (iptables DNAT) 5) Capture packets (tcpdump) 6) Deploy fake servers (msfconsole -r servers.rc). IP forwarding MUST come first."},
{ch:"Ch7",slide:"SCENARIO: WPA-Enterprise",q:"SCENARIO: A company uses WPA2-Enterprise. An attacker parked outside cannot crack the RADIUS server directly. What is their attack path?",opts:["Give up — WPA-Enterprise is unbreakable","Jam all WiFi signals until employees call IT and reveal credentials","Create Evil Twin with fake RADIUS server (hostapd-wpe), send deauth frames, capture EAP credentials when clients reconnect","Use aircrack-ng to brute force the RADIUS password"],ans:2,exp:"WPA-Enterprise Evil Twin: 1) Clone SSID, 2) Configure fake RADIUS (hostapd-wpe), 3) Deauth clients from real AP, 4) Clients reconnect to Evil Twin, 5) Initiate EAP auth with fake RADIUS, 6) Capture cleartext GTC or MSCHAPv2 hash, 7) Crack hash offline or use immediately."},

{ch:"Ch8",slide:"Hardware SE",q:"What makes hardware-based social engineering different from regular social engineering?",opts:["It requires no physical presence","It bypasses SOFTWARE security entirely — antivirus cannot detect hardware-based attacks","It only works on older computers","It requires advanced programming skills"],ans:1,exp:"Hardware-based SE bypasses software security completely. The device looks and functions normally externally. Antivirus, firewalls, and IDS are useless against a physical hardware attack because they monitor software, not hardware."},
{ch:"Ch8",slide:"Hardware Trojans",q:"What is a Hardware Trojan?",opts:["A software program disguised as hardware drivers","Hidden malicious modifications made inside real hardware components — device looks and works normally but has a backdoor","A USB device that installs trojans when plugged in","Malware that damages physical hardware"],ans:1,exp:"Hardware Trojan: hidden malicious modification inside actual hardware (chips, PCBs). The device functions normally and passes all software security checks. The backdoor is physically built into the component — undetectable by software."},
{ch:"Ch8",slide:"Rubber Ducky",q:"A Rubber Ducky / Teensy device works by:",opts:["Acting as a wireless access point when plugged in","Physically destroying USB ports","Appearing as a keyboard to the computer and automatically injecting keystrokes to install malware in seconds","Cloning the computer's hard drive"],ans:2,exp:"Rubber Ducky/Teensy: looks like a USB drive but is recognized as a HID (Human Interface Device) keyboard. Injects pre-programmed keystrokes faster than any human typist. Malware installed in seconds before the user can react."},
{ch:"Ch8",slide:"Baiting",q:"A USB drive labeled 'Q1 Salary List - Confidential' is left in the company parking lot. This is a:",opts:["Pretexting attack","Phishing attack","Baiting attack","Vishing attack"],ans:2,exp:"Baiting: attacker drops infected USB drives in public places. The enticing label exploits human curiosity. The attack starts the moment the USB is plugged in — the operating system auto-runs or the user opens a malicious file."},
{ch:"Ch8",slide:"Cryptography",q:"What are the 4 core goals of cryptography?",opts:["Speed, Storage, Security, Scalability","Confidentiality, Integrity, Authentication, Non-repudiation","Encryption, Hashing, Signing, Compression","Privacy, Access, Backup, Recovery"],ans:1,exp:"4 goals of cryptography: 1) Confidentiality (only authorized can read), 2) Integrity (data not changed), 3) Authentication (verify identity), 4) Non-repudiation (sender cannot deny sending). These are the CIA Triad + Non-repudiation."},
{ch:"Ch8",slide:"Cryptography",q:"What is a digital signature used for?",opts:["Encrypting files for secure storage","Signing emails automatically","Proving data integrity, authenticating the sender, and providing non-repudiation","Replacing passwords for login"],ans:2,exp:"Digital signature: uses public/private keys. Provides: 1) Data Integrity (file not modified), 2) Authentication (proves who sent it), 3) Non-repudiation (sender cannot deny it). Used in: software updates, legal documents, email (S/MIME)."},
{ch:"Ch8",slide:"Symmetric vs Asymmetric",q:"What is the main difference between Symmetric and Asymmetric encryption?",opts:["Symmetric is newer and stronger","Symmetric uses ONE key for both encrypt/decrypt; Asymmetric uses TWO keys (public to encrypt, private to decrypt)","Asymmetric is faster than Symmetric","Symmetric cannot encrypt files larger than 1GB"],ans:1,exp:"Symmetric (AES): ONE key, very fast, both sides share the same secret key. Asymmetric (RSA, ECC): TWO keys — public key to encrypt, private key to decrypt. Asymmetric enables secure key exchange over the internet without prior shared secret."},
{ch:"Ch8",slide:"Hashing",q:"What is the key difference between hashing and encryption?",opts:["Hashing is faster","Hashing is ONE-WAY and cannot be reversed; encryption is reversible with the key","Hashing uses asymmetric keys","Encryption produces a fixed-length output; hashing does not"],ans:1,exp:"Hashing: one-way transformation — cannot be reversed to get original data. Used for password storage and file integrity. Encryption: reversible with the correct key. Example hash: 'password' → 5f4dcc3b5aa765d61d8327deb882cf99 (MD5)."},
{ch:"Ch8",slide:"Authentication Factors",q:"A fingerprint scan is an example of which authentication factor?",opts:["Something You Know","Something You Have","Something You Are","Something You Do"],ans:2,exp:"Something You ARE = biometric authentication: fingerprint, face recognition, iris scan, voice recognition. Something You KNOW = password/PIN. Something You HAVE = phone/token/smart card."},
{ch:"Ch8",slide:"Authentication Factors",q:"Multi-Factor Authentication (MFA) requires:",opts:["Using the same factor twice for double security","At least 2 different factor TYPES (e.g., something you know + something you have)","Using biometrics and password together only","Three or more factors always"],ans:1,exp:"MFA = at least 2 DIFFERENT factor types. Password + OTP from phone = knows + have = MFA. Two passwords = NOT MFA (same factor type twice). Even if attacker steals password, they still need the second factor."},
{ch:"Ch8",slide:"Access Control",q:"Which access control model uses security labels like 'Top Secret', 'Secret', and 'Confidential'?",opts:["RBAC (Role-Based Access Control)","ABAC (Attribute-Based Access Control)","MAC (Mandatory Access Control)","DAC (Discretionary Access Control)"],ans:2,exp:"MAC (Mandatory Access Control): very strict, system decides access based on security classification labels. Used in military and government. Users cannot change their own permissions. Example: Top Secret users can access Secret data but not vice versa."},
{ch:"Ch8",slide:"Access Control",q:"ABAC is most flexible because:",opts:["It uses job roles which are easy to manage","It uses multiple attributes simultaneously (who, when, where, what device) for fine-grained access decisions","It has the fewest access rules","It does not require authentication"],ans:1,exp:"ABAC (Attribute-Based Access Control): uses multiple context attributes. Example: 'Only HR staff (who), during work hours (when), from office computers (where), on company devices (what device) can access employee records.' Most flexible but most complex to manage."},
{ch:"Ch8",slide:"Access Control",q:"The Principle of Least Privilege means:",opts:["All users get read-only access by default","Users get only the minimum access they need to do their job — nothing more","Admins should have no access to production systems","Privileged accounts should be deleted after use"],ans:1,exp:"Least Privilege: give users ONLY the minimum permissions required for their specific job function. Limits blast radius if account is compromised — attacker inherits only the limited privileges of that account."},
{ch:"Ch8",slide:"Endpoint Security",q:"Which control specifically prevents Rubber Ducky / Teensy USB attacks?",opts:["Antivirus with real-time scanning","Firewall rules blocking USB traffic","Device control software that whitelist approved USB devices by serial number and block unknown HIDs","Disabling Bluetooth on all devices"],ans:2,exp:"Device control software (like Symantec DCS or Microsoft Intune) blocks unauthorized USB devices by serial number whitelist. Unknown HID devices (like Rubber Ducky) are blocked before they can inject keystrokes."},
{ch:"Ch8",slide:"Supply Chain",q:"Supply chain security focuses on:",opts:["Securing the company's delivery trucks","Ensuring hardware arrives without malicious modifications from untrusted vendors","Managing the company's inventory system","Monitoring partner companies' finances"],ans:1,exp:"Supply chain security: hardware can be modified BEFORE delivery (Hardware Trojans inserted during manufacturing or shipping). Mitigation: buy from trusted suppliers, verify hardware integrity on receipt, apply Zero Trust — trust nothing by default."},
{ch:"Ch8",slide:"Cryptography History",q:"Stuxnet used Zero-Day vulnerabilities. What makes a Zero-Day particularly dangerous?",opts:["It only targets specific operating systems","There is no patch available — even fully updated systems are vulnerable","It requires physical access to deploy","It is only effective against old hardware"],ans:1,exp:"Zero-Day: no patch exists because the vulnerability is unknown or newly discovered. Defenders cannot rely on patching alone. Defense requires behavior monitoring — detecting the abnormal action, not the known exploit signature."},
];

const CHAPTERS = ["All","Ch1-2","Ch3","Ch4","Ch5","Ch6","Ch7","Ch8"];
let activeChapter = "All";
let answers = {};
let correct = 0;
let wrong = 0;

function shuffle(arr){let a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

const SHUFFLED = shuffle([...ALL_QUESTIONS.map((q,i)=>({...q,_id:i}))]);

function getFiltered(){
  if(activeChapter==="All") return SHUFFLED;
  return SHUFFLED.filter(q=>q.ch===activeChapter);
}

function buildChapterBar(){
  const bar = document.getElementById("chapterBar");
  bar.innerHTML = CHAPTERS.map(ch=>`<button class="ch-btn${ch===activeChapter?" active":""}" onclick="setChapter('${ch}')">${ch}</button>`).join("");
}

function setChapter(ch){
  activeChapter = ch;
  buildChapterBar();
  render();
}

function buildOptions(q, qid){
  const letters = ["A","B","C","D"];
  return q.opts.map((opt,i)=>{
    const state = answers[qid];
    let cls = "option";
    if(state!==undefined){
      cls += " disabled";
      if(i===q.ans) cls += " reveal-correct";
      if(i===state && state!==q.ans) cls += " selected-wrong";
      if(i===state && state===q.ans) cls += " selected-correct";
    }
    const onclick = state===undefined?`onclick="answer(${qid},${i})"` :"";
    return `<div class="${cls}" ${onclick}><span class="opt-letter">${letters[i]}</span>${opt}</div>`;
  }).join("");
}

function render(){
  const qs = getFiltered();
  const container = document.getElementById("quizContainer");
  if(qs.length===0){container.innerHTML='<div class="no-q">No questions for this chapter yet.</div>';return;}
  
  container.innerHTML = qs.map(q=>{
    const qid = q._id;
    const state = answers[qid];
    const cardCls = state===undefined?"q-card":state===q.ans?"q-card answered-correct":"q-card answered-wrong";
    const codeBlock = q.q.includes("\n")?"":"";
    const qText = q.q.includes("\n")?
      q.q.split("\n").map((line,i)=>i===0?`<div class="q-text">${line}</div>`:`<div class="q-code">${line}</div>`).join("")
      :`<div class="q-text">${q.q}</div>`;
    const expShow = state!==undefined?"show":"";
    const isScenario = q.slide&&q.slide.startsWith("SCENARIO");
    
    return `<div class="${cardCls}" id="card-${qid}">
      <div class="q-meta">
        <span class="q-tag">${q.ch}</span>
        <span class="q-tag">${q.slide}</span>
      </div>
      ${qText}
      <div class="options">${buildOptions(q,qid)}</div>
      <div class="explanation ${expShow}"><strong>Explanation:</strong> ${q.exp}</div>
    </div>`;
  }).join("");
  
  updateStats();
}

function answer(qid, optIdx){
  if(answers[qid]!==undefined) return;
  const q = ALL_QUESTIONS[qid];
  answers[qid] = optIdx;
  if(optIdx===q.ans) correct++;
  else wrong++;
  
  const card = document.getElementById("card-"+qid);
  card.className = optIdx===q.ans?"q-card answered-correct":"q-card answered-wrong";
  
  card.querySelectorAll(".option").forEach((el,i)=>{
    el.classList.add("disabled");
    el.removeAttribute("onclick");
    if(i===q.ans) el.classList.add("reveal-correct");
    if(i===optIdx && optIdx!==q.ans) el.classList.add("selected-wrong");
    if(i===optIdx && optIdx===q.ans) el.classList.add("selected-correct");
  });
  
  card.querySelector(".explanation").classList.add("show");
  updateStats();
}

function updateStats(){
  const total = Object.keys(answers).length;
  const pct = total>0?Math.round(correct/total*100):0;
  document.getElementById("statTotal").textContent = total;
  document.getElementById("statCorrect").textContent = correct;
  document.getElementById("statWrong").textContent = wrong;
  document.getElementById("statScore").textContent = pct+"%";
  const allCount = getFiltered().length;
  const answered = getFiltered().filter(q=>answers[q._id]!==undefined).length;
  document.getElementById("progressFill").style.width = allCount>0?(answered/allCount*100)+"%":"0%";
}

function resetAll(){
  answers={};correct=0;wrong=0;
  render();
}

buildChapterBar();
render();
</script>
</body>
</html>
